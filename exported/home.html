<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" data-drawgle-font-preconnect="googleapis">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin data-drawgle-font-preconnect="gstatic">
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #A1A1A1;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #6B6B6B;
  --dg-color-action-primary: #1A1A1A;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #E8F5E9;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: rgba(0, 0, 0, 0.05);
  --dg-color-border-focused: #1A1A1A;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F9F9F7;
  --dg-color-background-secondary: #FFFFFF;
  --dg-color-functional-sky: #D1EAF0;
  --dg-color-functional-mint: #E8F5E9;
  --dg-color-functional-amber: #FFE082;
  --dg-color-functional-lavender: #E8EAF6;
  --dg-radii-app: 32px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 10px 40px rgba(0, 0, 0, 0.08);
  --dg-shadows-surface: 0px 4px 20px rgba(0, 0, 0, 0.02);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.10;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.40;
  --dg-typography-font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 32px;
  --dg-type-screen-title-weight: 800;
  --dg-type-screen-title-line-height: 38px;
  --dg-type-hero-title-size: 40px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 44px;
  --dg-type-section-title-size: 22px;
  --dg-type-section-title-weight: 700;
  --dg-type-section-title-line-height: 28px;
  --dg-type-metric-value-size: 36px;
  --dg-type-metric-value-weight: 500;
  --dg-type-metric-value-line-height: 40px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 600;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body { font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif); background: var(--dg-color-background-primary, #ffffff); }
      #drawgle-export-root { position: relative; min-height: 100vh; overflow-x: hidden; }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Plus Jakarta Sans', -apple-system, sans-serif">
  <!-- Top Navigation Bar -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] h-[64px]">
    <button class="w-[48px] h-[48px] flex items-center justify-start" aria-label="Go back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1 class="dg-type-nav-title text-[var(--dg-color-text-high-emphasis)]">Diagnostics</h1>
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <button class="w-[44px] h-[44px] flex items-center justify-center" aria-label="Documents">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
      <button class="w-[44px] h-[44px] flex items-center justify-center" aria-label="Filter">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content Scroll Area -->
  <main class="flex-1 flex flex-col px-[var(--dg-mobile-layout-screen-margin)] py-[var(--dg-mobile-layout-section-gap)] gap-[var(--dg-mobile-layout-section-gap)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+96px)]">
    
    <!-- Heartbeat ECG Card (Sky Blue) -->
    <section class="relative w-full bg-[#E3F2FD] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-xl)] overflow-hidden min-h-[240px] flex flex-col justify-between">
      <div class="flex flex-col gap-[var(--dg-spacing-xxs)]">
        <span class="dg-type-caption text-[var(--dg-color-text-high-emphasis)] opacity-60 uppercase tracking-wider">Heartbeat</span>
        <div class="flex items-baseline gap-1">
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">82</span>
          <span class="dg-type-body text-[var(--dg-color-text-high-emphasis)] opacity-60">bpm</span>
        </div>
      </div>

      <!-- ECG Waveform Visualization -->
      <div class="absolute right-0 bottom-0 left-0 h-[120px] overflow-hidden">
        <div class="w-[200%] h-full flex items-center">
          <svg class="w-full h-full" viewBox="0 0 800 120" preserveAspectRatio="none">
            <!-- Focus Area Highlight -->
            <rect x="180" y="0" width="100" height="120" fill="rgba(255,255,255,0.3)" />
            <!-- Waveform Path -->
            <path d="M0 60 L40 60 L45 50 L50 70 L55 60 L100 60 L105 20 L115 100 L125 60 L160 60 L165 55 L170 65 L175 60 L220 60 L225 20 L235 100 L245 60 L280 60 L285 55 L290 65 L295 60 L340 60 L345 20 L355 100 L365 60 L400 60 L405 55 L410 65 L415 60 L460 60 L465 20 L475 100 L485 60 L520 60 L525 55 L530 65 L535 60 L580 60 L585 20 L595 100 L605 60 L640 60 L645 55 L650 65 L655 60 L700 60 L705 20 L715 100 L725 60 L760 60 L765 55 L770 65 L775 60 L800 60" 
                  fill="none" stroke="#1A1A1A" stroke-width="1.5" />
          </svg>
        </div>
      </div>
    </section>

    <!-- R-R Interval Card (Mint Green) -->
    <section class="w-full bg-[var(--dg-color-action-secondary)] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-xl)] flex items-center justify-between min-h-[140px]">
      <div class="flex flex-col gap-[var(--dg-spacing-xxs)]">
        <span class="dg-type-caption text-[var(--dg-color-text-high-emphasis)] opacity-60 uppercase tracking-wider">R-R Interval</span>
        <div class="flex items-baseline gap-1">
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">851</span>
          <span class="dg-type-body text-[var(--dg-color-text-high-emphasis)] opacity-60">ms</span>
        </div>
      </div>
      
      <!-- Sparkline -->
      <div class="w-[120px] h-[40px]">
        <svg width="120" height="40" viewBox="0 0 120 40">
          <path d="M0 30 Q15 10 30 25 T60 15 T90 30 T120 10" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
    </section>

    <!-- Results Summary Card -->
    <section class="w-full dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-xl)] dg-shadow-surface flex flex-col gap-[var(--dg-spacing-md)]">
      <div class="flex items-center justify-between">
        <h2 class="dg-type-section-title">Results</h2>
        <span class="dg-type-caption px-3 py-1 bg-[var(--dg-color-background-primary)] rounded-full text-[var(--dg-color-text-medium-emphasis)]">Today</span>
      </div>

      <div class="flex items-center gap-[var(--dg-spacing-xl)]">
        <!-- Circular Status Graphic -->
        <div class="relative w-[80px] h-[80px] flex items-center justify-center">
          <!-- Outer Ring -->
          <svg class="absolute inset-0 w-full h-full -rotate-90">
            <circle cx="40" cy="40" r="36" stroke="rgba(0,0,0,0.05)" stroke-width="6" fill="none" />
            <circle cx="40" cy="40" r="36" stroke="#1A1A1A" stroke-width="6" fill="none" stroke-dasharray="226" stroke-dashoffset="60" stroke-linecap="round" />
          </svg>
          <!-- Inner Ring -->
          <svg class="absolute inset-0 w-full h-full p-4 -rotate-90">
            <circle cx="24" cy="24" r="20" stroke="rgba(0,0,0,0.05)" stroke-width="4" fill="none" />
            <circle cx="24" cy="24" r="20" stroke="#4CAF50" stroke-width="4" fill="none" stroke-dasharray="125" stroke-dashoffset="40" stroke-linecap="round" />
          </svg>
          <div class="w-2 h-2 bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
        </div>

        <!-- Summary Text -->
        <div class="flex-1 flex flex-col gap-1">
          <p class="dg-type-body font-semibold text-[var(--dg-color-text-high-emphasis)]">Optimal Balance</p>
          <p class="dg-type-supporting text-[var(--dg-color-text-medium-emphasis)]">Your heart rate variability indicates a healthy recovery state.</p>
        </div>
      </div>

      <!-- Expand Button -->
      <button class="w-full h-[var(--dg-sizing-standard-button-height)] mt-2 border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] flex items-center justify-center gap-2 hover:bg-[var(--dg-color-background-primary)] transition-colors">
        <span class="dg-type-button-label">View Full Report</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </section>

    <!-- Secondary Metrics Grid -->
    <div class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)]">
      <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] dg-shadow-surface">
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)] uppercase">Stress</span>
        <div class="flex items-baseline gap-1 mt-1">
          <span class="text-[24px] font-bold">Low</span>
        </div>
      </div>
      <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] dg-shadow-surface">
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)] uppercase">Recovery</span>
        <div class="flex items-baseline gap-1 mt-1">
          <span class="text-[24px] font-bold">92%</span>
        </div>
      </div>
    </div>

  </main>
</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-on-dark: #FFFFFF;
  --dg-color-text-low-emphasis: #999999;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #666666;
  --dg-color-action-primary: #FFC82C;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: rgba(255, 255, 255, 0.2);
  --dg-color-action-on-primary-text: #1A1A1A;
  --dg-color-border-divider: #F2F2F2;
  --dg-color-border-focused: #1A1A1A;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-accent: #FFC82C;
  --dg-color-background-primary: #B81D33;
  --dg-color-background-secondary: #7AA9C8;
  --dg-radii-lg: 24px;
  --dg-radii-md: 16px;
  --dg-radii-sm: 8px;
  --dg-radii-xl: 40px;
  --dg-radii-pill: 9999px;
  --dg-radii-sharp: 0px;
  --dg-radii-app: 24px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 80px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  --dg-shadows-md: 0 10px 30px rgba(0,0,0,0.1);
  --dg-shadows-sm: 0 2px 8px rgba(0,0,0,0.05);
  --dg-shadows-none: none;
  --dg-shadows-upward: 0 -10px 30px rgba(0,0,0,0.05);
  --dg-shadows-surface: 0 10px 30px rgba(0,0,0,0.1);
  --dg-shadows-overlay: 0 -10px 30px rgba(0,0,0,0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Inter', sans-serif;
  --dg-type-nav-title-size: 26px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 32px;
  --dg-type-screen-title-size: 26px;
  --dg-type-screen-title-weight: 600;
  --dg-type-screen-title-line-height: 32px;
  --dg-type-hero-title-size: 44px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 48px;
  --dg-type-section-title-size: 26px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 32px;
  --dg-type-metric-value-size: 44px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 48px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 600;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 14px;
  --dg-type-button-label-weight: 700;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-none: 0px;
  --dg-border-widths-thin: 2px;
  --dg-border-widths-thick: 4px;
  --dg-border-widths-hairline: 1px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 40px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#FFC82C] flex flex-col relative overflow-hidden" style="font-family: 'Inter', sans-serif">
  <!-- Background Leaf Patterns (Subtle Overlays) -->
  <div class="absolute inset-0 pointer-events-none opacity-10">
    <svg class="absolute top-[-5%] left-[-10%] w-[300px] h-[300px] rotate-12" viewBox="0 0 100 100" fill="currentColor">
      <path d="M50 0C50 0 80 20 80 50C80 80 50 100 50 100C50 100 20 80 20 50C20 20 50 0 50 0Z" />
    </svg>
    <svg class="absolute top-[40%] right-[-15%] w-[400px] h-[400px] -rotate-45" viewBox="0 0 100 100" fill="currentColor">
      <path d="M50 0C50 0 80 20 80 50C80 80 50 100 50 100C50 100 20 80 20 50C20 20 50 0 50 0Z" />
    </svg>
  </div>

  <!-- Header -->
  <header class="relative z-10 flex items-center justify-between px-[24px] pt-[16px] h-[64px]">
    <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-white/20 backdrop-blur-md border border-white/30">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    
    <span class="text-[24px] font-[700] tracking-tight text-white">xefag</span>
    
    <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-white/20 backdrop-blur-md border border-white/30">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </button>
  </header>

  <!-- Category Tabs -->
  <nav class="relative z-10 mt-[24px] px-[24px]">
    <div class="flex items-center justify-center gap-[8px] bg-black/5 p-[4px] rounded-full w-fit mx-auto">
      <button class="px-[20px] py-[8px] rounded-full text-[14px] font-[600] text-white/70">Sleep</button>
      <button class="px-[24px] py-[8px] rounded-full text-[14px] font-[700] text-[#1A1A1A] bg-white shadow-sm">Relax</button>
      <button class="px-[20px] py-[8px] rounded-full text-[14px] font-[600] text-white/70">Focus</button>
    </div>
  </nav>

  <!-- Hero Section -->
  <main class="flex-1 relative flex flex-col items-center justify-center px-[24px] pb-[120px]">
    <!-- Floating Product Bottle -->
    <div class="relative w-full max-w-[280px] aspect-[3/4] flex items-center justify-center">
      <!-- Soft Warm Shadow -->
      <div class="absolute bottom-[10%] w-[60%] h-[20px] bg-[#8B6E00]/30 blur-[30px] rounded-full"></div>
      
      <!-- Product Image Placeholder (Yellow Bottle) -->
      <div class="relative z-10 w-full h-full flex items-center justify-center transform hover:scale-105 transition-transform duration-700 ease-out">
        <img 
          src="https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?auto=format&fit=crop&q=80&w=600" 
          alt="Relax Supplement Bottle" 
          class="w-[85%] h-auto object-contain drop-shadow-[0_35px_35px_rgba(0,0,0,0.2)]"
          style="filter: hue-rotate(10deg) saturate(1.2);"
        />
      </div>
    </div>

    <!-- Dosage Rail (Vertical Stack) -->
    <div class="absolute right-[24px] top-1/2 -translate-y-1/2 flex flex-col gap-[16px] z-20">
      <button class="w-[48px] h-[48px] rounded-full bg-white flex items-center justify-center text-[#1A1A1A] font-[700] text-[14px] shadow-lg border-2 border-white">
        30
      </button>
      <button class="w-[48px] h-[48px] rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white font-[600] text-[14px] border border-white/30">
        60
      </button>
      <button class="w-[48px] h-[48px] rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white font-[600] text-[14px] border border-white/30">
        90
      </button>
    </div>
  </main>

  <!-- Bottom Sheet -->
  <section class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] pt-[32px] pb-[40px] px-[24px] shadow-[0_-10px_40px_rgba(0,0,0,0.08)] z-30">
    <!-- Handle -->
    <div class="absolute top-[12px] left-1/2 -translate-x-1/2 w-[40px] h-[4px] bg-[#F2F2F2] rounded-full"></div>
    
    <div class="flex flex-col gap-[24px]">
      <div class="flex justify-between items-start">
        <div class="flex flex-col gap-[4px]">
          <h1 class="text-[32px] font-[700] text-[#1A1A1A] leading-tight">Relax</h1>
          <p class="text-[16px] text-[#666666] font-[500]">30 Dissolvable Wafers</p>
        </div>
        <div class="text-right">
          <span class="text-[26px] font-[700] text-[#1A1A1A]">$25.50</span>
        </div>
      </div>

      <div class="flex flex-col gap-[16px]">
        <div class="flex items-center gap-[12px]">
          <div class="flex -space-x-2">
            <div class="w-[24px] h-[24px] rounded-full border-2 border-white bg-[#FFC82C]"></div>
            <div class="w-[24px] h-[24px] rounded-full border-2 border-white bg-[#FFD700]"></div>
            <div class="w-[24px] h-[24px] rounded-full border-2 border-white bg-[#FFF44F]"></div>
          </div>
          <span class="text-[12px] font-[600] text-[#999999] uppercase tracking-wider">Natural Lemon & Honey</span>
        </div>

        <p class="text-[14px] leading-[22px] text-[#666666]">
          Formulated with L-Theanine and Magnesium to help you unwind without drowsiness. Perfect for high-stress moments.
        </p>
      </div>

      <div class="flex gap-[12px] mt-[8px]">
        <div class="flex items-center bg-[#F2F2F2] rounded-full px-[8px] h-[56px]">
          <button class="w-[40px] h-[40px] flex items-center justify-center text-[#1A1A1A] font-[700] text-[20px]">-</button>
          <span class="w-[32px] text-center font-[700] text-[#1A1A1A]">1</span>
          <button class="w-[40px] h-[40px] flex items-center justify-center text-[#1A1A1A] font-[700] text-[20px]">+</button>
        </div>
        
        <button class="flex-1 h-[56px] bg-[#FFC82C] hover:bg-[#F5B800] active:scale-[0.98] transition-all rounded-full flex items-center justify-center gap-[8px] shadow-[0_4px_14px_rgba(255,200,44,0.4)] border-b-4 border-[#E6B427]">
          <span class="text-[16px] font-[700] text-[#1A1A1A]">Buy Now</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- Floating Decorative Elements -->
  <div class="absolute top-[20%] left-[10%] w-[12px] h-[12px] rounded-full bg-white/40 blur-[1px]"></div>
  <div class="absolute top-[60%] left-[15%] w-[8px] h-[8px] rounded-full bg-white/20 blur-[2px]"></div>
  <div class="absolute top-[35%] right-[20%] w-[16px] h-[16px] rounded-full bg-white/30 blur-[1px]"></div>
</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #999999;
  --dg-color-text-high-emphasis: #000000;
  --dg-color-text-medium-emphasis: #666666;
  --dg-color-action-primary: #FFD600;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #000000;
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: rgba(0, 0, 0, 0.05);
  --dg-color-border-focused: #000000;
  --dg-color-palette-sky: #E3F2FD;
  --dg-color-palette-mint: #E0F2F1;
  --dg-color-palette-lemon: #FFF9C4;
  --dg-color-palette-lavender: #E6E6FA;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F5F5FA;
  --dg-color-background-secondary: #FFFFFF;
  --dg-radii-app: 32px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 20px 40px rgba(0, 0, 0, 0.12);
  --dg-shadows-surface: 0px 10px 30px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 34px;
  --dg-type-screen-title-weight: 800;
  --dg-type-screen-title-line-height: 41px;
  --dg-type-hero-title-size: 24px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 30px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 700;
  --dg-type-section-title-line-height: 25px;
  --dg-type-metric-value-size: 18px;
  --dg-type-metric-value-weight: 600;
  --dg-type-metric-value-line-height: 22px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 400;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif)">

  <!-- Status bar -->
  <div class="w-full flex items-center justify-between px-[24px] pt-[20px] pb-[var(--dg-spacing-xs)]">
    <span class="dg-type-supporting text-[var(--dg-color-text-high-emphasis)] font-semibold">9:41</span>
    <div class="flex items-center gap-[6px] text-[var(--dg-color-text-high-emphasis)]">
      <i data-lucide="signal" style="width:var(--dg-type-metric-value-size);height:var(--dg-type-metric-value-size)"></i>
      <i data-lucide="wifi" style="width:var(--dg-type-metric-value-size);height:var(--dg-type-metric-value-size)"></i>
      <i data-lucide="battery-full" style="width:var(--dg-type-nav-title-line-height);height:var(--dg-type-metric-value-size)"></i>
    </div>
  </div>

  <!-- Header -->
  <header class="w-full flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[12px] pb-[var(--dg-spacing-xs)]">
    <h1 class="dg-type-screen-title text-[var(--dg-color-text-high-emphasis)]">Journal</h1>
    <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full" aria-label="Profile">
      <i data-lucide="more-horizontal" style="width:var(--dg-type-hero-title-size);height:var(--dg-type-hero-title-size)" class="text-[var(--dg-color-text-high-emphasis)]"></i>
    </button>
  </header>

  <!-- Main scrollable content -->
  <main class="w-full flex flex-col gap-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-spacing-xs)] pb-[120px]">

    <!-- Calories Summary Card -->
    <section class="w-full dg-surface-card rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] p-[20px] flex flex-col gap-[16px]">

      <!-- Calories header row -->
      <div class="w-full flex items-center justify-between">
        <div class="flex items-center gap-[12px]">
          <div class="w-[40px] h-[40px] rounded-full flex items-center justify-center" style="background: rgba(255, 214, 0, 0.18);">
            <span style="font-size:var(--dg-type-section-title-size);line-height:1">🔥</span>
          </div>
          <div class="flex flex-col">
            <span class="dg-type-section-title text-[var(--dg-color-text-high-emphasis)]">Calories</span>
            <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Week Days</span>
          </div>
        </div>
        <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full" aria-label="Open date picker">
          <i data-lucide="calendar" style="width:var(--dg-type-nav-title-line-height);height:var(--dg-type-nav-title-line-height)" class="text-[var(--dg-color-text-high-emphasis)]"></i>
        </button>
      </div>

      <!-- Consumed / Remaining rows -->
      <div class="w-full flex flex-col gap-[10px]">
        <div class="w-full flex items-center justify-between rounded-[18px] px-[16px] py-[12px]" style="background: var(--dg-color-background-primary);">
          <span class="dg-type-supporting text-[var(--dg-color-text-medium-emphasis)]">Consumed</span>
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">00 cal</span>
        </div>
        <div class="w-full flex items-center justify-between rounded-[18px] px-[16px] py-[12px]" style="background: var(--dg-color-background-primary);">
          <span class="dg-type-supporting text-[var(--dg-color-text-medium-emphasis)]">Remaining</span>
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">00 cal</span>
        </div>
        <div class="w-full flex items-center justify-between rounded-[18px] px-[16px] py-[12px] relative overflow-hidden" style="background: repeating-linear-gradient(45deg, #EDEDF3 0 6px, #E2E2EA 6px 12px);">
          <span class="dg-type-supporting text-[var(--dg-color-text-low-emphasis)]">Remaining</span>
          <span class="dg-type-metric-value text-[var(--dg-color-text-low-emphasis)]">00 cal</span>
        </div>
      </div>

      <!-- Three progress gauges -->
      <div class="w-full grid grid-cols-3 gap-[12px] mt-[var(--dg-spacing-xxs)]">
        <!-- Power Carbs -->
        <div class="flex flex-col items-center gap-[6px]">
          <div class="relative w-[72px] h-[72px] flex items-center justify-center">
            <svg width="72" height="72" viewBox="0 0 72 72" class="-rotate-90">
              <circle cx="36" cy="36" r="28" fill="none" stroke="var(--dg-color-border-divider)" stroke-width="8"/>
              <circle cx="36" cy="36" r="28" fill="none" stroke="#FF9A1F" stroke-width="8" stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="176"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <span class="dg-type-metric-value text-[13px] text-[var(--dg-color-text-high-emphasis)]"><span class="font-bold">0</span><span class="text-[10px] text-[var(--dg-color-text-medium-emphasis)]">/150</span></span>
              <span class="dg-type-caption text-[10px] text-[var(--dg-color-text-low-emphasis)]">gr</span>
            </div>
          </div>
          <div class="flex flex-col items-center">
            <span class="dg-type-supporting text-[var(--dg-color-text-high-emphasis)]">Power</span>
            <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Carbs</span>
          </div>
        </div>

        <!-- Protein Power -->
        <div class="flex flex-col items-center gap-[6px]">
          <div class="relative w-[72px] h-[72px] flex items-center justify-center">
            <svg width="72" height="72" viewBox="0 0 72 72" class="-rotate-90">
              <circle cx="36" cy="36" r="28" fill="none" stroke="var(--dg-color-border-divider)" stroke-width="8"/>
              <circle cx="36" cy="36" r="28" fill="none" stroke="#FF9A1F" stroke-width="8" stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="176"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <span class="dg-type-metric-value text-[13px] text-[var(--dg-color-text-high-emphasis)]"><span class="font-bold">0</span><span class="text-[10px] text-[var(--dg-color-text-medium-emphasis)]">/113</span></span>
              <span class="dg-type-caption text-[10px] text-[var(--dg-color-text-low-emphasis)]">gr</span>
            </div>
          </div>
          <div class="flex flex-col items-center">
            <span class="dg-type-supporting text-[var(--dg-color-text-high-emphasis)]">Protein</span>
            <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Power</span>
          </div>
        </div>

        <!-- Healthy Fat -->
        <div class="flex flex-col items-center gap-[6px]">
          <div class="relative w-[72px] h-[72px] flex items-center justify-center">
            <svg width="72" height="72" viewBox="0 0 72 72" class="-rotate-90">
              <circle cx="36" cy="36" r="28" fill="none" stroke="var(--dg-color-border-divider)" stroke-width="8"/>
              <circle cx="36" cy="36" r="28" fill="none" stroke="#FF9A1F" stroke-width="8" stroke-linecap="round" stroke-dasharray="176" stroke-dashoffset="176"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <span class="dg-type-metric-value text-[13px] text-[var(--dg-color-text-high-emphasis)]"><span class="font-bold">0</span><span class="text-[10px] text-[var(--dg-color-text-medium-emphasis)]">/50</span></span>
              <span class="dg-type-caption text-[10px] text-[var(--dg-color-text-low-emphasis)]">gr</span>
            </div>
          </div>
          <div class="flex flex-col items-center">
            <span class="dg-type-supporting text-[var(--dg-color-text-high-emphasis)]">Healthy</span>
            <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Fat</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Meal Grid 2x2 -->
    <section class="w-full grid grid-cols-2 gap-[12px]">

      <!-- Breakfast card (lavender) -->
      <article class="relative overflow-hidden rounded-[var(--dg-radii-app)] p-[16px] flex flex-col gap-[12px] min-h-[180px]" style="background:#D8D2FF;">
        <div class="flex items-center justify-between">
          <div class="w-[56px] h-[56px] rounded-full overflow-hidden flex items-center justify-center" style="background:rgba(255,255,255,0.55);">
            <img src="https://pub-7c8c3c7444724a39ba3eeb8accbbca4a.r2.dev/visual-assets/b8041495-1552-4079-9c20-80bd656e240f/display_1024.png" alt="Small bowl of cereal or breakfast food" class="w-full h-full object-contain" />
          </div>
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">631 kcal</span>
        </div>
        <div class="flex items-end justify-between mt-auto">
          <span class="dg-type-section-title text-[var(--dg-color-text-high-emphasis)]">Breakfast</span>
          <button class="w-[36px] h-[36px] rounded-full bg-white flex items-center justify-center shadow-[var(--dg-shadows-surface)]" aria-label="Add breakfast entry">
            <i data-lucide="plus" style="width:var(--dg-type-metric-value-size);height:var(--dg-type-metric-value-size)" class="text-[var(--dg-color-text-high-emphasis)]"></i>
          </button>
        </div>
      </article>

      <!-- Lunch card (yellow) -->
      <article class="relative overflow-hidden rounded-[var(--dg-radii-app)] p-[16px] flex flex-col gap-[12px] min-h-[180px]" style="background:#FFE680;">
        <div class="flex items-center justify-between">
          <div class="w-[56px] h-[56px] rounded-full overflow-hidden flex items-center justify-center" style="background:rgba(255,255,255,0.55);">
            <i data-lucide="salad" style="width:var(--dg-spacing-xl);height:var(--dg-spacing-xl)" class="text-[#7A6B2E]"></i>
          </div>
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">486 kcal</span>
        </div>
        <div class="flex items-end justify-between mt-auto">
          <span class="dg-type-section-title text-[var(--dg-color-text-high-emphasis)]">Lunch</span>
          <button class="w-[36px] h-[36px] rounded-full bg-white flex items-center justify-center shadow-[var(--dg-shadows-surface)]" aria-label="Add lunch entry">
            <i data-lucide="plus" style="width:var(--dg-type-metric-value-size);height:var(--dg-type-metric-value-size)" class="text-[var(--dg-color-text-high-emphasis)]"></i>
          </button>
        </div>
      </article>

      <!-- Dinner card (mint) -->
      <article class="relative overflow-hidden rounded-[var(--dg-radii-app)] p-[16px] flex flex-col gap-[12px] min-h-[180px]" style="background:#B6F1C8;">
        <div class="flex items-center justify-between">
          <div class="w-[56px] h-[56px] rounded-full overflow-hidden flex items-center justify-center" style="background:rgba(255,255,255,0.55);">
            <i data-lucide="utensils" style="width:28px;height:28px" class="text-[#2F6A47]"></i>
          </div>
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">359 kcal</span>
        </div>
        <div class="flex items-end justify-between mt-auto">
          <span class="dg-type-section-title text-[var(--dg-color-text-high-emphasis)]">Dinner</span>
          <button class="w-[36px] h-[36px] rounded-full bg-white flex items-center justify-center shadow-[var(--dg-shadows-surface)]" aria-label="Add dinner entry">
            <i data-lucide="plus" style="width:var(--dg-type-metric-value-size);height:var(--dg-type-metric-value-size)" class="text-[var(--dg-color-text-high-emphasis)]"></i>
          </button>
        </div>
      </article>

      <!-- Snack card (orange) -->
      <article class="relative overflow-hidden rounded-[var(--dg-radii-app)] p-[16px] flex flex-col gap-[12px] min-h-[180px]" style="background:#FFCBA4;">
        <div class="flex items-center justify-between">
          <div class="w-[56px] h-[56px] rounded-full overflow-hidden flex items-center justify-center" style="background:rgba(255,255,255,0.55);">
            <i data-lucide="cookie" style="width:var(--dg-type-hero-title-line-height);height:var(--dg-type-hero-title-line-height)" class="text-[#7A4521]"></i>
          </div>
          <span class="dg-type-metric-value text-[var(--dg-color-text-high-emphasis)]">193 kcal</span>
        </div>
        <div class="flex items-end justify-between mt-auto">
          <span class="dg-type-section-title text-[var(--dg-color-text-high-emphasis)]">Snack</span>
          <button class="w-[36px] h-[36px] rounded-full bg-white flex items-center justify-center shadow-[var(--dg-shadows-surface)]" aria-label="Add snack entry">
            <i data-lucide="plus" style="width:var(--dg-type-metric-value-size);height:var(--dg-type-metric-value-size)" class="text-[var(--dg-color-text-high-emphasis)]"></i>
          </button>
        </div>
      </article>

    </section>
  </main>

  <!-- Bottom Tab Navigation (glassmorphism) -->
  

</div>

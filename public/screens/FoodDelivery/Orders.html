    <style>

  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 36px;
  --dg-type-section-title-size: 16px;
  --dg-type-section-title-weight: 700;
  --dg-type-section-title-line-height: 20px;
  --dg-type-metric-value-size: 22px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 28px;

#root {

}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }

.dg-type-nav-title {

  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {

.dg-type-metric-value {

  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {

  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

}

.dg-type-button-label {

  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }

  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Plus Jakarta Sans', sans-serif">
    <!-- Top Bar -->
    <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)] sticky top-0 bg-white/80 backdrop-blur-md z-20">
        <h1 class="dg-type-nav-title">Orders</h1>
        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors" aria-label="More options">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-more-horizontal"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
    </header>

    <!-- Main Content Scroll Area -->
    <main class="flex-1 flex flex-col px-[var(--dg-mobile-layout-screen-margin)] gap-[var(--dg-mobile-layout-section-gap)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+112px)]">
        
        <!-- Active Order Card: Burger -->
        <div class="relative w-full rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col overflow-hidden" style="background-color: var(--dg-color-action-secondary);">
            <!-- Top Row -->
            <div class="flex justify-between items-start z-10">
                <div class="flex flex-col">
                    <div class="flex items-center gap-[var(--dg-spacing-xs)] mb-1">
                        <div class="w-6 h-6 flex items-center justify-center bg-white/40 rounded-full">
                            <span class="text-[12px]">🍔</span>
                        </div>
                        <span class="dg-type-section-title">Beef Burger</span>
                    </div>
                    <span class="dg-type-metric-value">$12.40</span>
                </div>
                <div class="bg-white rounded-full px-3 py-1 flex items-center justify-center shadow-sm">
                    <span class="dg-type-caption font-bold text-black">Active</span>
                </div>
            </div>

            <!-- Food Cutout & Discount Badge -->
            <div class="relative h-48 w-full flex items-center justify-center my-2">
                <!-- Discount Badge -->
                <div class="absolute top-4 right-0 w-16 h-16 bg-black rounded-full flex flex-col items-center justify-center text-white rotate-12 shadow-lg z-10 border-2 border-white">
                    <span class="text-[14px] font-extrabold leading-none">40%</span>
                    <span class="text-[8px] uppercase tracking-tighter">OFF</span>
                </div>
                <!-- Placeholder for Burger Cutout -->
                <div class="w-40 h-40 bg-black/5 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="text-black/20"><path d="M11 20H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h5c1.1 0 2 .9 2 2v1"/><path d="M16 14V2h6v12a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2Z"/><path d="M16 8h6"/><path d="M3 10h10"/><path d="M3 14h10"/><path d="M3 18h10"/></svg>
                </div>
            </div>

            <!-- Courier Sub-card -->
            <div class="dg-surface-card rounded-[var(--dg-radii-pill)] p-3 flex items-center justify-between shadow-[var(--dg-shadows-surface)] mt-auto">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border-2 border-white">
                        <div class="w-full h-full flex items-center justify-center bg-slate-300 text-slate-600 font-bold text-xs">JD</div>
                    </div>
                    <div class="flex flex-col">
                        <span class="dg-type-supporting font-bold">John Doe</span>
                        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Courier • 5 mins away</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center text-black active:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </button>
                    <button class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center text-black active:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Active Order Card: Pizza -->
        <div class="relative w-full rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col overflow-hidden" style="background-color: #D0E1F9;">
            <!-- Top Row -->
            <div class="flex justify-between items-start z-10">
                <div class="flex flex-col">
                    <div class="flex items-center gap-[var(--dg-spacing-xs)] mb-1">
                        <div class="w-6 h-6 flex items-center justify-center bg-white/40 rounded-full">

                        </div>
                        <span class="dg-type-section-title">Pepperoni Pizza</span>
                    </div>
                    <span class="dg-type-metric-value">$18.50</span>
                </div>
                <div class="bg-white rounded-full px-3 py-1 flex items-center justify-center shadow-sm">
                    <span class="dg-type-caption font-bold text-black">Active</span>
                </div>
            </div>

            <!-- Food Cutout & Discount Badge -->
            <div class="relative h-48 w-full flex items-center justify-center my-2">
                <!-- Discount Badge -->
                <div class="absolute top-4 right-0 w-16 h-16 bg-black rounded-full flex flex-col items-center justify-center text-white -rotate-6 shadow-lg z-10 border-2 border-white">
                    <span class="text-[14px] font-extrabold leading-none">25%</span>
                    <span class="text-[8px] uppercase tracking-tighter">OFF</span>
                </div>
                <!-- Placeholder for Pizza Cutout -->
                <div class="w-40 h-40 bg-black/5 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="text-black/20"><path d="M15 11h.01"/><path d="M11 15h.01"/><path d="M16 16h.01"/><path d="m2 16 20 6-6-20A20 20 0 0 0 2 16Z"/><path d="M5.71 17.11a17.04 17.04 0 0 1 11.4-11.4"/></svg>
                </div>
            </div>

            <!-- Courier Sub-card -->
            <div class="dg-surface-card rounded-[var(--dg-radii-pill)] p-3 flex items-center justify-between shadow-[var(--dg-shadows-surface)] mt-auto">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border-2 border-white">
                        <div class="w-full h-full flex items-center justify-center bg-amber-200 text-amber-700 font-bold text-xs">AS</div>
                    </div>
                    <div class="flex flex-col">
                        <span class="dg-type-supporting font-bold">Alex Smith</span>
                        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Courier • 12 mins away</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center text-black active:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </button>
                    <button class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center text-black active:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </button>

            </div>

            <h2 class="dg-type-section-title">Past Orders</h2>
            
            <!-- Past Order Row -->

      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="dg-nav-shell" aria-label="Primary navigation">
<style>
[data-drawgle-primary-nav].dg-nav-shell {
  position: fixed;
  bottom: var(--dg-mobile-layout-safe-area-bottom);
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - (var(--dg-mobile-layout-screen-margin) * 2));
  max-width: 350px;
  height: 68px;
  background: var(--dg-color-action-primary);
  border-radius: var(--dg-radii-pill);
  box-shadow: var(--dg-shadows-overlay);
  padding: 6px;
  z-index: 1000;
  box-sizing: border-box;
}

[data-drawgle-primary-nav] .dg-nav-shell-inner {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  height: 100%;
  align-items: center;
}

[data-drawgle-primary-nav] .dg-nav-item {
  appearance: none;
  border: none;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: rgba(255, 255, 255, 0.5);
  height: 100%;
  border-radius: var(--dg-radii-pill);
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  padding: 0 4px;
  cursor: pointer;
}

[data-drawgle-primary-nav] .dg-nav-item[] {
  color: var(--dg-color-action-on-primary-text);
  background: rgba(255, 255, 255, 0.12);
}

[data-drawgle-primary-nav] .dg-nav-icon {
  width: var(--dg-sizing-icon-standard);
  height: var(--dg-sizing-icon-standard);
  display: flex;
  align-items: center;
  justify-content: center;
}

[data-drawgle-primary-nav] .dg-nav-icon i,
[data-drawgle-primary-nav] .dg-nav-icon svg {
  width: 22px;
  height: 22px;
  stroke-width: 2px;
}

[data-drawgle-primary-nav] .dg-nav-label {
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: 1;
  letter-spacing: 0.02em;
}

[data-drawgle-primary-nav] .dg-nav-item:active {
  transform: scale(0.92);
  opacity: 0.8;

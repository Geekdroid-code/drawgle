<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #4D4D4D;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #999999;
  --dg-color-action-primary: #FFFFFF;
  --dg-color-action-disabled: #2A2A2A;
  --dg-color-action-secondary: #262626;
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: rgba(255, 255, 255, 0.08);
  --dg-color-border-focused: rgba(255, 255, 255, 0.2);
  --dg-color-surface-card: #1A1A1A;
  --dg-color-surface-modal: #1C1C1C;
  --dg-color-surface-bottom-sheet: #161616;
  --dg-color-background-primary: #0D0D0D;
  --dg-color-background-secondary: #141414;
  --dg-radii-app: 28px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 12px 48px rgba(0, 0, 0, 0.6);
  --dg-shadows-surface: inset 0px 1px 1px rgba(255, 255, 255, 0.05), 0px 4px 24px rgba(0, 0, 0, 0.4);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.15;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 20px;
  --dg-type-screen-title-weight: 600;
  --dg-type-screen-title-line-height: 28px;
  --dg-type-hero-title-size: 34px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 41px;
  --dg-type-section-title-size: 16px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 20px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 34px;
  --dg-type-body-size: 15px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 20px;
  --dg-type-supporting-size: 13px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 11px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 13px;
  --dg-type-button-label-size: 14px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 18px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif">
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <h1 class="dg-type-screen-title">Insights</h1>
    <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full dg-bg-secondary dg-border-divider border-[var(--dg-border-widths-standard)]">
      <i data-lucide="sliders-horizontal"></i>
    </button>
  </header>

  <main class="flex-1 px-[var(--dg-mobile-layout-screen-margin)] pb-[120px]">
    <section class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] mb-[var(--dg-mobile-layout-section-gap)]">
      <div class="flex flex-col mb-[var(--dg-spacing-xl)]">
        <span class="dg-type-supporting dg-text-medium mb-[var(--dg-spacing-xxs)]">Total spent</span>
        <div class="flex items-baseline gap-[var(--dg-spacing-xs)]">
          <span class="dg-type-metric-value">$2,480.50</span>
          <span class="dg-type-caption text-[#4ADE80]">+12%</span>
        </div>
      </div>

      <div class="flex items-end justify-between h-[160px] w-full gap-[var(--dg-spacing-xs)] px-[var(--dg-spacing-xs)]">
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full bg-white/5 rounded-t-full rounded-b-[4px] h-[60%] relative overflow-hidden"></div>
          <span class="dg-type-caption dg-text-low">M</span>
        </div>
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full rounded-t-full rounded-b-[4px] h-[90%] relative" style="background: linear-gradient(180deg, #3B82F6 0%, #1D4ED8 100%); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);"></div>
          <span class="dg-type-caption dg-text-high font-bold">T</span>
        </div>
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full bg-white/5 rounded-t-full rounded-b-[4px] h-[45%] relative overflow-hidden"></div>
          <span class="dg-type-caption dg-text-low">W</span>
        </div>
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full bg-white/5 rounded-t-full rounded-b-[4px] h-[75%] relative overflow-hidden"></div>
          <span class="dg-type-caption dg-text-low">T</span>
        </div>
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full bg-white/5 rounded-t-full rounded-b-[4px] h-[55%] relative overflow-hidden"></div>
          <span class="dg-type-caption dg-text-low">F</span>
        </div>
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full bg-white/5 rounded-t-full rounded-b-[4px] h-[30%] relative overflow-hidden"></div>
          <span class="dg-type-caption dg-text-low">S</span>
        </div>
        <div class="flex flex-col items-center flex-1 gap-[var(--dg-spacing-xs)]">
          <div class="w-full bg-white/5 rounded-t-full rounded-b-[4px] h-[40%] relative overflow-hidden"></div>
          <span class="dg-type-caption dg-text-low">S</span>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)] mb-[var(--dg-mobile-layout-section-gap)]">
      <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)]">
        <div class="w-[32px] h-[32px] rounded-full bg-blue-500/10 flex items-center justify-center mb-[var(--dg-spacing-md)]">
          <i data-lucide="trending-up" style="color: #3B82F6; width: var(--dg-spacing-md); height: var(--dg-spacing-md);"></i>
        </div>
        <span class="dg-type-supporting dg-text-medium block mb-[var(--dg-spacing-xxs)]">Daily average</span>
        <span class="dg-type-section-title">$82.40</span>
      </div>
      <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)]">
        <div class="w-[32px] h-[32px] rounded-full bg-purple-500/10 flex items-center justify-center mb-[var(--dg-spacing-md)]">
          <i data-lucide="zap" style="color: #A855F7; width: var(--dg-spacing-md); height: var(--dg-spacing-md);"></i>
        </div>
        <span class="dg-type-supporting dg-text-medium block mb-[var(--dg-spacing-xxs)]">Highest spend</span>
        <span class="dg-type-section-title">$412.00</span>
      </div>
    </div>

    <section>
      <div class="flex items-center justify-between mb-[var(--dg-mobile-layout-element-gap)]">
        <h2 class="dg-type-section-title">Top categories</h2>
      </div>
      <div class="w-full h-[12px] flex rounded-full overflow-hidden mb-[var(--dg-spacing-xl)]">
        <div class="h-full bg-blue-500" style="width: 45%;"></div>
        <div class="h-full bg-purple-500" style="width: 25%;"></div>
        <div class="h-full bg-emerald-500" style="width: 15%;"></div>
        <div class="h-full bg-orange-500" style="width: 10%;"></div>
        <div class="h-full bg-white/20" style="width: 5%;"></div>
      </div>
      <div class="flex flex-col gap-[var(--dg-spacing-md)]">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[48px] h-[48px] rounded-[16px] dg-bg-secondary flex items-center justify-center border-[var(--dg-border-widths-standard)] dg-border-divider">
              <div class="w-[12px] h-[12px] rounded-full bg-blue-500"></div>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body font-semibold">Shopping</span>
              <span class="dg-type-caption dg-text-medium">45%</span>
            </div>
          </div>
          <span class="dg-type-body font-bold">$1,116.22</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[48px] h-[48px] rounded-[16px] dg-bg-secondary flex items-center justify-center border-[var(--dg-border-widths-standard)] dg-border-divider">
              <div class="w-[12px] h-[12px] rounded-full bg-purple-500"></div>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body font-semibold">Entertainment</span>
              <span class="dg-type-caption dg-text-medium">25%</span>
            </div>
          </div>
          <span class="dg-type-body font-bold">$620.12</span>
        </div>
      </div>
    </section>
  </main>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 z-[100] flex items-center justify-between p-[6px] bg-[var(--dg-color-background-primary)]/60 backdrop-blur-[24px] border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] shadow-[var(--dg-shadows-overlay)] min-w-[320px] h-[68px] ring-1 ring-white/5">
  
  <!-- Home -->
  <button 
    data-nav-item-id="home" 
    class="group relative flex items-center justify-center transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) h-full px-5 rounded-[var(--dg-radii-pill)] data-[active=true]:bg-[var(--dg-color-action-primary)] data-[active=true]:shadow-[0_8px_20px_rgba(255,255,255,0.15)]">
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <i data-lucide="home" class="w-[20px] h-[20px] transition-all duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] group-data-[active=true]:scale-110 text-[var(--dg-color-text-medium-emphasis)]"></i>
      <span class="max-w-0 overflow-hidden opacity-0 group-data-[active=true]:max-w-[80px] group-data-[active=true]:opacity-100 transition-all duration-500 ease-in-out text-[var(--dg-color-action-on-primary-text)] font-[var(--dg-type-button-label-weight)] text-[var(--dg-type-button-label-size)] leading-none whitespace-nowrap">
        Home
      </span>
    </div>
  </button>

  <!-- Insights -->
  <button 
    data-nav-item-id="insights" 
    class="group relative flex items-center justify-center transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) h-full px-5 rounded-[var(--dg-radii-pill)] data-[active=true]:bg-[var(--dg-color-action-primary)] data-[active=true]:shadow-[0_8px_20px_rgba(255,255,255,0.15)]">
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <i data-lucide="bar-chart-2" class="w-[20px] h-[20px] transition-all duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] group-data-[active=true]:scale-110 text-[var(--dg-color-text-medium-emphasis)]"></i>
      <span class="max-w-0 overflow-hidden opacity-0 group-data-[active=true]:max-w-[80px] group-data-[active=true]:opacity-100 transition-all duration-500 ease-in-out text-[var(--dg-color-action-on-primary-text)] font-[var(--dg-type-button-label-weight)] text-[var(--dg-type-button-label-size)] leading-none whitespace-nowrap">
        Insights
      </span>
    </div>
  </button>

  <!-- Card -->
  <button 
    data-nav-item-id="card" 
    class="group relative flex items-center justify-center transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) h-full px-5 rounded-[var(--dg-radii-pill)] data-[active=true]:bg-[var(--dg-color-action-primary)] data-[active=true]:shadow-[0_8px_20px_rgba(255,255,255,0.15)]">
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <i data-lucide="credit-card" class="w-[20px] h-[20px] transition-all duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] group-data-[active=true]:scale-110 text-[var(--dg-color-text-medium-emphasis)]"></i>
      <span class="max-w-0 overflow-hidden opacity-0 group-data-[active=true]:max-w-[80px] group-data-[active=true]:opacity-100 transition-all duration-500 ease-in-out text-[var(--dg-color-action-on-primary-text)] font-[var(--dg-type-button-label-weight)] text-[var(--dg-type-button-label-size)] leading-none whitespace-nowrap">
        Card
      </span>
    </div>
  </button>

  <!-- Settings -->
  <button 
    data-nav-item-id="settings" 
    class="group relative flex items-center justify-center transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) h-full px-5 rounded-[var(--dg-radii-pill)] data-[active=true]:bg-[var(--dg-color-action-primary)] data-[active=true]:shadow-[0_8px_20px_rgba(255,255,255,0.15)]">
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <i data-lucide="settings" class="w-[20px] h-[20px] transition-all duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] group-data-[active=true]:scale-110 text-[var(--dg-color-text-medium-emphasis)]"></i>
      <span class="max-w-0 overflow-hidden opacity-0 group-data-[active=true]:max-w-[80px] group-data-[active=true]:opacity-100 transition-all duration-500 ease-in-out text-[var(--dg-color-action-on-primary-text)] font-[var(--dg-type-button-label-weight)] text-[var(--dg-type-button-label-size)] leading-none whitespace-nowrap">
        Settings
      </span>
    </div>
  </button>

</nav>

<style>
  [data-drawgle-primary-nav] {
    -webkit-user-select: none;
    user-select: none;
  }

  [data-drawgle-primary-nav] button {
    -webkit-tap-highlight-color: transparent;
    outline: none;
    flex-shrink: 1;
    flex-basis: auto;
  }
  
  [data-drawgle-primary-nav] button[] {
    flex-grow: 2;
  }
  
  [data-drawgle-primary-nav] button[] {
    flex-grow: 1;
  }

  /* Subtle inner glow for the dock itself */
  [data-drawgle-primary-nav]::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
</style></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700;800&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #666666;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #A1A1A1;
  --dg-color-action-primary: #FFFFFF;
  --dg-color-action-disabled: rgba(255, 255, 255, 0.20);
  --dg-color-action-secondary: rgba(255, 255, 255, 0.12);
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: rgba(255, 255, 255, 0.10);
  --dg-color-border-focused: #FFFFFF;
  --dg-color-surface-card: rgba(255, 255, 255, 0.08);
  --dg-color-surface-modal: rgba(28, 28, 28, 0.98);
  --dg-color-surface-bottom-sheet: rgba(18, 18, 18, 0.94);
  --dg-color-background-primary: #000000;
  --dg-color-background-secondary: #0A0A0A;
  --dg-radii-lg: 24px;
  --dg-radii-md: 16px;
  --dg-radii-sm: 8px;
  --dg-radii-xl: 32px;
  --dg-radii-pill: 9999px;
  --dg-radii-sharp: 0px;
  --dg-radii-app: 24px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 44px;
  --dg-shadows-lg: 0 12px 48px rgba(0,0,0,0.8);
  --dg-shadows-md: 0 8px 24px rgba(0,0,0,0.7);
  --dg-shadows-sm: 0 4px 12px rgba(0,0,0,0.5);
  --dg-shadows-none: none;
  --dg-shadows-upward: 0 -4px 20px rgba(0,0,0,0.4);
  --dg-shadows-surface: 0 8px 24px rgba(0,0,0,0.7);
  --dg-shadows-overlay: 0 -4px 20px rgba(0,0,0,0.4);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.15;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.60;
  --dg-typography-font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --dg-type-nav-title-size: 22px;
  --dg-type-nav-title-weight: 700;
  --dg-type-nav-title-line-height: 28px;
  --dg-type-screen-title-size: 22px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 28px;
  --dg-type-hero-title-size: 34px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 41px;
  --dg-type-section-title-size: 22px;
  --dg-type-section-title-weight: 700;
  --dg-type-section-title-line-height: 28px;
  --dg-type-metric-value-size: 34px;
  --dg-type-metric-value-weight: 800;
  --dg-type-metric-value-line-height: 41px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 300;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 14px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 14px;
  --dg-border-widths-none: 0px;
  --dg-border-widths-thin: 1px;
  --dg-border-widths-thick: 2px;
  --dg-border-widths-hairline: 0.5px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 16px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#000000] flex flex-col relative overflow-hidden" style="font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  
  <!-- Header Section -->
  <header class="pt-[16px] px-[20px] flex justify-between items-start z-10">
    <h1 class="text-[34px] font-[800] leading-[41px] text-[#FFFFFF] tracking-tight">Explore</h1>
    <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-[#0A0A0A] border border-[rgba(255,255,255,0.10)]">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </header>

  <!-- 3D Orbital Carousel Container -->
  <!-- The container uses perspective to create the 3D depth effect -->
  <main class="flex-1 relative flex items-center justify-start overflow-visible" style="perspective: 1200px;">
    
    <!-- The Arc/Wheel -->
    <div class="relative flex flex-col items-start gap-[32px] pl-[20px] w-full max-w-[400px]">
      
      <!-- Item: Soul Sessions (Top, Faded, Tilted) -->
      <div class="flex items-center gap-[16px] opacity-[0.2] transition-all duration-700" style="transform: rotateX(25deg) rotateY(35deg) translateZ(-120px) translateX(-20px);">
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border border-[rgba(255,255,255,0.1)]">
          <img src="https://images.unsplash.com/photo-1514525253361-bee8718a340b?auto=format&fit=crop&q=80&w=128" alt="Soul Sessions" class="w-full h-full object-cover grayscale opacity-60" />
        </div>
        <div class="text-left">
          <p class="text-[18px] font-[700] text-[#FFFFFF]">Soul Sessions</p>
          <p class="text-[12px] text-[#A1A1A1]">Liam P.</p>
        </div>
      </div>

      <!-- Item: From Zero -->
      <div class="flex items-center gap-[16px] opacity-[0.4] transition-all duration-700" style="transform: rotateX(15deg) rotateY(25deg) translateZ(-60px) translateX(-10px);">
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border border-[rgba(255,255,255,0.1)]">
          <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&q=80&w=128" alt="From Zero" class="w-full h-full object-cover" />
        </div>
        <div class="text-left">
          <p class="text-[20px] font-[700] text-[#FFFFFF]">From Zero</p>
          <p class="text-[13px] text-[#A1A1A1]">Marcus S.</p>
        </div>
      </div>

      <!-- Item: Inner Voice -->
      <div class="flex items-center gap-[16px] opacity-[0.7] transition-all duration-700" style="transform: rotateX(8deg) rotateY(15deg) translateZ(-30px) translateX(-5px);">
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border border-[rgba(255,255,255,0.2)]">
          <img src="https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&fit=crop&q=80&w=128" alt="Inner Voice" class="w-full h-full object-cover" />
        </div>
        <div class="text-left">
          <p class="text-[22px] font-[700] text-[#FFFFFF]">Inner Voice</p>
          <p class="text-[14px] text-[#A1A1A1]">Noah R.</p>
        </div>
      </div>

      <!-- ACTIVE ITEM: Vox Journal -->
      <div class="relative flex items-center gap-[16px] z-20 transition-all duration-700" style="transform: rotateX(0deg) rotateY(0deg) translateZ(40px) translateX(0px);">
        <!-- Active Background Glow/Highlight -->
        <div class="absolute inset-y-[-12px] left-[-20px] right-[-40px] bg-gradient-to-r from-[rgba(255,255,255,0.15)] to-transparent rounded-full -z-10"></div>
        
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border-[2px] border-[#FFFFFF] shadow-[0_0_20px_rgba(255,255,255,0.2)]">
          <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&q=80&w=128" alt="Vox Journal" class="w-full h-full object-cover" />
        </div>

        <div class="text-left">
          <p class="text-[22px] font-[700] leading-[28px] text-[#FFFFFF]">Vox Journal</p>
          <p class="text-[14px] leading-[20px] text-[#A1A1A1]">Rayan C.</p>
        </div>

        <!-- Play Button -->
        <button class="ml-[8px] px-[20px] h-[36px] flex items-center justify-center rounded-full bg-[rgba(255,255,255,0.12)] border border-[rgba(255,255,255,0.1)] backdrop-blur-sm active:scale-95 transition-transform">
          <span class="text-[14px] font-[600] text-[#FFFFFF] mr-2">Play</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#FFFFFF" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
      </div>

      <!-- Item: Day Light -->
      <div class="flex items-center gap-[16px] opacity-[0.7] transition-all duration-700" style="transform: rotateX(-8deg) rotateY(15deg) translateZ(-30px) translateX(-5px);">
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border border-[rgba(255,255,255,0.2)]">
          <img src="https://images.unsplash.com/photo-1459749411177-042180ce673c?auto=format&fit=crop&q=80&w=128" alt="Day Light" class="w-full h-full object-cover" />
        </div>
        <div class="text-left">
          <p class="text-[22px] font-[700] text-[#FFFFFF]">Day Light</p>
          <p class="text-[14px] text-[#A1A1A1]">Daniel B.</p>
        </div>
      </div>

      <!-- Item: Bold Strategy -->
      <div class="flex items-center gap-[16px] opacity-[0.4] transition-all duration-700" style="transform: rotateX(-15deg) rotateY(25deg) translateZ(-60px) translateX(-10px);">
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border border-[rgba(255,255,255,0.1)]">
          <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=128" alt="Bold Strategy" class="w-full h-full object-cover" />
        </div>
        <div class="text-left">
          <p class="text-[20px] font-[700] text-[#FFFFFF]">Bold Strategy</p>
          <p class="text-[13px] text-[#A1A1A1]">Chloe M.</p>
        </div>
      </div>

      <!-- Item: DayLight (Bottom, Faded, Tilted) -->
      <div class="flex items-center gap-[16px] opacity-[0.2] transition-all duration-700" style="transform: rotateX(-25deg) rotateY(35deg) translateZ(-120px) translateX(-20px);">
        <div class="w-[64px] h-[64px] rounded-full overflow-hidden border border-[rgba(255,255,255,0.1)]">
          <img src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3c?auto=format&fit=crop&q=80&w=128" alt="DayLight" class="w-full h-full object-cover grayscale opacity-60" />
        </div>
        <div class="text-left">
          <p class="text-[18px] font-[700] text-[#FFFFFF]">DayLight</p>
          <p class="text-[12px] text-[#A1A1A1]">Jack R.</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Bottom Navigation Bar -->

  <!-- Background Decorative Elements -->
  <div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-[#FFFFFF] opacity-[0.03] blur-[100px] rounded-full pointer-events-none"></div>
  <div class="absolute bottom-[20%] left-[-10%] w-[200px] h-[200px] bg-[#FFFFFF] opacity-[0.02] blur-[80px] rounded-full pointer-events-none"></div>

</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

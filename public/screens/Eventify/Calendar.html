<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #C2C2C2;
  --dg-color-text-high-emphasis: #D6D6D6;
  --dg-color-text-medium-emphasis: #CFCFCF;
  --dg-color-action-primary: #FF1A1A;
  --dg-color-action-disabled: #534A4A;
  --dg-color-action-secondary: #000000;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #747474;
  --dg-color-border-focused: #FF1A1A;
  --dg-color-surface-card: #1E1E1E;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FDFDFD;
  --dg-color-background-primary: #0A0A0A;
  --dg-color-background-secondary: #2A2A2A;
  --dg-radii-app: 20px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 10px 40px rgba(0, 0, 0, 0.12);
  --dg-shadows-surface: 0px 4px 20px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Plus Jakarta Sans', sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 32px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 18px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 24px;
  --dg-type-metric-value-size: 20px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 26px;
  --dg-type-body-size: 15px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 20px;
  --dg-type-supporting-size: 13px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 11px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 14px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Plus Jakarta Sans', sans-serif">
  <!-- Top Bar -->
  <header class="w-full pt-[var(--dg-mobile-layout-safe-area-top)] px-[var(--dg-mobile-layout-screen-margin)] flex items-center justify-between h-[64px]">
    <h1 class="dg-type-screen-title">Calendar</h1>
    <button class="w-[40px] h-[40px] flex items-center justify-center dg-bg-secondary rounded-full dg-shadow-surface" aria-label="Search">
      <i data-lucide="search" class="w-[20px] h-[20px] text-[var(--dg-color-text-high-emphasis)]"></i>
    </button>
  </header>

  <!-- Calendar Card Section -->
  <section class="px-[var(--dg-mobile-layout-screen-margin)] mt-[var(--dg-mobile-layout-element-gap)]">
    <div class="dg-surface-card dg-radius-app dg-shadow-surface p-[var(--dg-spacing-md)]">
      <!-- Month Navigation -->
      <div class="flex items-center justify-between mb-[var(--dg-spacing-md)]">
        <h2 class="dg-type-section-title">April 2026</h2>
        <div class="flex gap-[var(--dg-spacing-xs)]">
          <button class="w-[32px] h-[32px] flex items-center justify-center rounded-full hover:bg-[var(--dg-color-action-secondary)] transition-colors">
            <i data-lucide="chevron-left" class="w-[20px] h-[20px]"></i>
          </button>
          <button class="w-[32px] h-[32px] flex items-center justify-center rounded-full hover:bg-[var(--dg-color-action-secondary)] transition-colors">
            <i data-lucide="chevron-right" class="w-[20px] h-[20px]"></i>
          </button>
        </div>
      </div>

      <!-- Calendar Grid -->
      <div class="grid grid-cols-7 gap-y-[var(--dg-spacing-xs)]">
        <!-- Day Headers -->
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">MO</div>
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">TU</div>
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">WE</div>
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">TH</div>
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">FR</div>
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">SA</div>
        <div class="text-center dg-type-caption text-[var(--dg-color-text-low-emphasis)] py-[var(--dg-spacing-xxs)]">SU</div>

        <!-- Row 1 (Previous Month / Start) -->
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body text-[var(--dg-color-text-low-emphasis)]">30</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body text-[var(--dg-color-text-low-emphasis)]">31</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">1</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">2</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">3</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">4</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">5</div>

        <!-- Row 2 -->
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">6</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">7</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">8</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">9</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">10</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">11</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">12</div>

        <!-- Row 3 (Selected State Example) -->
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">13</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">14</div>
        <div class="flex items-center justify-center py-[var(--dg-spacing-xs)]">
          <div class="w-[36px] h-[36px] flex items-center justify-center bg-[var(--dg-color-action-primary)] text-white rounded-full dg-type-body font-bold">15</div>
        </div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">16</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">17</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">18</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">19</div>

        <!-- Row 4 -->
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">20</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">21</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">22</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">23</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">24</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">25</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">26</div>

        <!-- Row 5 -->
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">27</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">28</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">29</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body">30</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body text-[var(--dg-color-text-low-emphasis)]">1</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body text-[var(--dg-color-text-low-emphasis)]">2</div>
        <div class="text-center py-[var(--dg-spacing-xs)] dg-type-body text-[var(--dg-color-text-low-emphasis)]">3</div>
      </div>
    </div>
  </section>

  <!-- Empty State & CTA Section -->
  <section class="flex-1 flex flex-col items-center justify-center px-[var(--dg-mobile-layout-screen-margin)] py-[var(--dg-mobile-layout-section-gap)]">
    <div class="flex flex-col items-center text-center mb-[var(--dg-mobile-layout-section-gap)]">
      <div class="w-[64px] h-[64px] bg-[var(--dg-color-action-secondary)] rounded-full flex items-center justify-center mb-[var(--dg-spacing-md)]">
        <i data-lucide="calendar-x" class="w-[32px] h-[32px] text-[var(--dg-color-text-medium-emphasis)]"></i>
      </div>
      <p class="dg-type-body text-[var(--dg-color-text-medium-emphasis)]">No event this month</p>
    </div>

    <!-- Primary CTA -->
    <button class="w-full max-w-[280px] h-[var(--dg-sizing-standard-button-height)] dg-action-primary dg-radius-pill dg-type-button-label flex items-center justify-center gap-[var(--dg-spacing-xs)] dg-shadow-overlay">
      <i data-lucide="plus" class="w-[20px] h-[20px]"></i>
      Create Event
    </button>
  </section>

  <!-- Spacer for Bottom Nav -->
  <div class="h-[var(--dg-sizing-bottom-nav-height)]"></div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="dg-bg-secondary border-t dg-border-divider flex items-center justify-between w-full h-[var(--dg-sizing-bottom-nav-height)] pb-[var(--dg-mobile-layout-safe-area-bottom)] px-[var(--dg-mobile-layout-screen-margin)] fixed bottom-0 left-0 z-[100]">
  <style>
    [data-drawgle-primary-nav] button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      height: 100%;
      background: transparent;
      border: none;
      padding: 0;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    [data-drawgle-primary-nav] .nav-icon-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-drawgle-primary-nav] button:active .nav-icon-wrapper {
      transform: scale(0.85);
    }

    /* Active State: High energy Red indicator dot as per creative direction */
    [data-drawgle-primary-nav] button[]::after {
      content: '';
      position: absolute;
      top: 8px;
      right: 25%;
      width: 6px;
      height: 6px;
      background-color: var(--dg-color-action-primary);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255, 26, 26, 0.4);
    }

    [data-drawgle-primary-nav] .nav-icon {
      stroke-width: 1.5px;
      transition: color 0.2s ease, stroke-width 0.2s ease;
    }

    [data-drawgle-primary-nav] button[] .nav-icon {
      color: var(--dg-color-text-high-emphasis);
      stroke-width: 2px;
    }

    [data-drawgle-primary-nav] button[] .nav-icon {
      color: var(--dg-color-text-low-emphasis);
    }

    [data-drawgle-primary-nav] .nav-label {
      font-family: inherit;
      font-size: var(--dg-type-caption-size);
      font-weight: var(--dg-type-caption-weight);
      line-height: var(--dg-type-caption-line-height);
      letter-spacing: 0.01em;
      transition: color 0.2s ease, font-weight 0.2s ease;
    }

    [data-drawgle-primary-nav] button[] .nav-label {
      color: var(--dg-color-text-high-emphasis);
      font-weight: 700;
    }

    [data-drawgle-primary-nav] button[] .nav-label {
      color: var(--dg-color-text-low-emphasis);
    }
  </style>

  <button data-nav-item-id="home">
    <div class="nav-icon-wrapper">
      <i data-lucide="home" class="nav-icon w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)]"></i>
    </div>
    <span class="nav-label">Home</span>
  </button>

  <button data-nav-item-id="events">
    <div class="nav-icon-wrapper">
      <i data-lucide="layout-list" class="nav-icon w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)]"></i>
    </div>
    <span class="nav-label">Events</span>
  </button>

  <button data-nav-item-id="calendar">
    <div class="nav-icon-wrapper">
      <i data-lucide="calendar" class="nav-icon w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)]"></i>
    </div>
    <span class="nav-label">Calendar</span>
  </button>

  <button data-nav-item-id="profile">
    <div class="nav-icon-wrapper">
      <i data-lucide="user" class="nav-icon w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)]"></i>
    </div>
    <span class="nav-label">Profile</span>
  </button>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

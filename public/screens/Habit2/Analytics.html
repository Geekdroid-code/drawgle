<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #A1A1A1;
  --dg-color-text-high-emphasis: #000000;
  --dg-color-text-medium-emphasis: #6B6B6B;
  --dg-color-action-primary: #000000;
  --dg-color-action-disabled: #E5E5E5;
  --dg-color-action-secondary: #007AFF;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #F0F0F0;
  --dg-color-border-focused: #000000;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F8F8F8;
  --dg-color-background-secondary: #FFFFFF;
  --dg-color-functional-gym: #42A5F5;
  --dg-color-functional-work: #FF8A65;
  --dg-color-functional-academics: #66BB6A;
  --dg-color-functional-nutrition: #FF5252;
  --dg-radii-app: 24px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 64px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 10px 30px rgba(0, 0, 0, 0.12);
  --dg-shadows-surface: 0px 4px 20px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Inter', -apple-system, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 32px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 500;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 16px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 20px;
  --dg-type-metric-value-size: 22px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 28px;
  --dg-type-body-size: 15px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 20px;
  --dg-type-supporting-size: 13px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 400;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 14px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 18px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 24px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Inter', -apple-system, sans-serif">
  <!-- Top Bar -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] h-[56px]">
    <button class="w-[40px] h-[40px] flex items-center justify-start" aria-label="Go back">
      <i data-lucide="chevron-left" class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)]"></i>
    </button>
    <h1 class="dg-type-nav-title">Analytics</h1>
    <div class="w-[40px] h-[40px] flex items-center justify-end">
      <div class="px-[var(--dg-spacing-xs)] py-[2px] bg-white border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] dg-type-caption font-semibold">7D</div>
    </div>
  </header>

  <!-- Category Chip Scroller -->
  <div class="mt-[var(--dg-mobile-layout-element-gap)]">
    <div class="flex overflow-x-auto no-scrollbar px-[var(--dg-mobile-layout-screen-margin)] gap-[var(--dg-spacing-xs)]">
      <button class="dg-action-primary text-white px-[20px] h-[36px] rounded-[var(--dg-radii-pill)] dg-type-button-label whitespace-nowrap">Work</button>
      <button class="bg-white border border-[var(--dg-color-border-divider)] dg-text-medium px-[20px] h-[36px] rounded-[var(--dg-radii-pill)] dg-type-button-label whitespace-nowrap">Gym</button>
      <button class="bg-white border border-[var(--dg-color-border-divider)] dg-text-medium px-[20px] h-[36px] rounded-[var(--dg-radii-pill)] dg-type-button-label whitespace-nowrap">Nutrition</button>
      <button class="bg-white border border-[var(--dg-color-border-divider)] dg-text-medium px-[20px] h-[36px] rounded-[var(--dg-radii-pill)] dg-type-button-label whitespace-nowrap">Sleep</button>
    </div>
  </div>

  <!-- Main Content Scroll Area -->
  <main class="flex-1 flex flex-col gap-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)] mt-[var(--dg-mobile-layout-section-gap)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+116px)]">
    
    <!-- Chart Section -->
    <section class="dg-surface-card dg-shadow-surface rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col gap-[var(--dg-spacing-md)]" style="box-shadow: var(--dg-shadows-none)">
      <!-- Chart Header/Tooltip -->
      <div class="flex flex-col">
        <span class="dg-type-caption dg-text-medium">Wednesday, Oct 24</span>
        <div class="flex items-baseline gap-[var(--dg-spacing-xxs)]">
          <span class="dg-type-metric-value">60%</span>
          <span class="dg-type-supporting dg-text-medium">/ 6 hrs</span>
        </div>
      </div>

      <!-- Bar Chart Visualization -->
      <div class="relative h-[160px] w-full flex items-end justify-between px-[var(--dg-spacing-xs)]">
        <!-- 60% Threshold Line -->
        <div class="absolute bottom-[60%] left-0 right-0 border-t border-dashed border-[var(--dg-color-text-low-emphasis)] opacity-30 z-0"></div>
        
        <!-- Bars -->
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end">
          <div class="w-[8px] bg-[var(--dg-color-action-disabled)] rounded-t-full" style="height: 45%"></div>
          <span class="dg-type-caption text-[10px] dg-text-low">M</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end">
          <div class="w-[8px] bg-[var(--dg-color-action-disabled)] rounded-t-full" style="height: 70%"></div>
          <span class="dg-type-caption text-[10px] dg-text-low">T</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end">
          <div class="w-[8px] dg-action-primary rounded-t-full" style="height: 60%"></div>
          <span class="dg-type-caption text-[10px] dg-text-high font-bold">W</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end">
          <div class="w-[8px] bg-[var(--dg-color-action-disabled)] rounded-t-full" style="height: 85%"></div>
          <span class="dg-type-caption text-[10px] dg-text-low">T</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end">
          <div class="w-[8px] bg-[var(--dg-color-action-disabled)] rounded-t-full" style="height: 40%"></div>
          <span class="dg-type-caption text-[10px] dg-text-low">F</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end" style="font-weight: var(--dg-type-button-label-weight)">
          <div class="w-[8px] bg-[var(--dg-color-action-disabled)] rounded-t-full" style="height: 55%"></div>
          <span class="dg-type-caption text-[10px] dg-text-low">S</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] h-full justify-end">
          <div class="w-[8px] bg-[var(--dg-color-action-disabled)] rounded-t-full" style="height: 30%"></div>
          <span class="dg-type-caption text-[10px] dg-text-low">S</span>
        </div>
      </div>
    </section>

    <!-- Insight Card -->
    <section class="bg-[#F0F7FF] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex gap-[var(--dg-spacing-md)] items-start">
      <div class="w-[32px] h-[32px] rounded-full bg-white flex items-center justify-center flex-shrink-0 shadow-sm">
        <i data-lucide="lightbulb" class="w-[18px] h-[18px] text-[var(--dg-color-action-secondary)]"></i>
      </div>
      <div class="flex flex-col gap-[var(--dg-spacing-xxs)]">
        <h3 class="dg-type-section-title text-[14px]">Performance Insight</h3>
        <p class="dg-type-body text-[13px] dg-text-medium leading-relaxed">Your deep work sessions are 15% more effective on Tuesday mornings. Consider scheduling complex tasks then.</p>
      </div>
    </section>

    <!-- History Section -->
    <section class="flex flex-col gap-[var(--dg-mobile-layout-element-gap)]">
      <div class="flex items-center justify-between">
        <h2 class="dg-type-section-title">History</h2>
        <button class="dg-type-button-label dg-text-medium">See all</button>
      </div>

      <div class="flex flex-col gap-[var(--dg-spacing-xs)]">
        <!-- History Item 1 -->
        <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] flex items-center justify-between border border-[var(--dg-color-border-divider)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-[12px] bg-[var(--dg-color-background-primary)] flex items-center justify-center">
              <i data-lucide="briefcase" class="w-[20px] h-[20px] dg-text-high"></i>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body font-semibold">Deep Work</span>
              <span class="dg-type-caption dg-text-low">Oct 23 • 4h 20m</span>
            </div>
          </div>
          <span class="dg-type-supporting font-semibold dg-text-medium">Good</span>
        </div>

        <!-- History Item 2 -->
        <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] flex items-center justify-between border border-[var(--dg-color-border-divider)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-[12px] bg-[var(--dg-color-background-primary)] flex items-center justify-center">
              <i data-lucide="briefcase" class="w-[20px] h-[20px] dg-text-high"></i>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body font-semibold">Client Meeting</span>
              <span class="dg-type-caption dg-text-low">Oct 22 • 1h 15m</span>
            </div>
          </div>
          <span class="dg-type-supporting font-semibold dg-text-low">Average</span>
        </div>

        <!-- History Item 3 -->
        <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] flex items-center justify-between border border-[var(--dg-color-border-divider)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-[12px] bg-[var(--dg-color-background-primary)] flex items-center justify-center">
              <i data-lucide="briefcase" class="w-[20px] h-[20px] dg-text-high"></i>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body font-semibold">Email Triage</span>
              <span class="dg-type-caption dg-text-low">Oct 21 • 45m</span>
            </div>
          </div>
          <span class="dg-type-supporting font-semibold dg-text-medium">Good</span>
        </div>
      </div>
    </section>
  </main>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 flex items-center justify-center w-fit h-[var(--dg-sizing-bottom-nav-height)] bg-[var(--dg-color-surface-card)] dg-radius-pill dg-shadow-overlay border border-[var(--dg-color-border-divider)] px-[var(--dg-spacing-xs)] z-[100] backdrop-blur-md">
  <div class="flex items-center justify-center gap-[var(--dg-spacing-xs)]">
    
    <!-- Home Item -->
    <button 
      data-nav-item-id="home" 
      class="group relative flex items-center justify-center w-[56px] h-[48px] dg-radius-pill transition-all duration-300 ease-out data-[active=true]:bg-[var(--dg-color-action-primary)] active:scale-95">
      <i 
        data-lucide="home" 
        class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1.5px] transition-colors duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] text-[var(--dg-color-text-medium-emphasis)]"
      ></i>
      <span class="sr-only">Home</span>
    </button>

    <!-- Analytics Item -->
    <button 
      data-nav-item-id="analytics" 
      class="group relative flex items-center justify-center w-[56px] h-[48px] dg-radius-pill transition-all duration-300 ease-out data-[active=true]:bg-[var(--dg-color-action-primary)] active:scale-95">
      <i 
        data-lucide="bar-chart-2" 
        class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1.5px] transition-colors duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] text-[var(--dg-color-text-medium-emphasis)]"
      ></i>
      <span class="sr-only">Analytics</span>
    </button>

    <!-- Schedule Item -->
    <button 
      data-nav-item-id="schedule" 
      class="group relative flex items-center justify-center w-[56px] h-[48px] dg-radius-pill transition-all duration-300 ease-out data-[active=true]:bg-[var(--dg-color-action-primary)] active:scale-95">
      <i 
        data-lucide="calendar" 
        class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1.5px] transition-colors duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] text-[var(--dg-color-text-medium-emphasis)]"
      ></i>
      <span class="sr-only">Schedule</span>
    </button>

  </div>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

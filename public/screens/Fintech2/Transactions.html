<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #A0A0A0;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #6B6B6B;
  --dg-color-action-primary: #121212;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #8B80F9;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #F0F0F0;
  --dg-color-border-focused: #8B80F9;
  --dg-color-accents-sage: #A8D5BA;
  --dg-color-accents-apricot: #FFB36D;
  --dg-color-accents-periwinkle: #8B80F9;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F4F4F9;
  --dg-color-background-secondary: #E8E8F2;
  --dg-radii-app: 32px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 20px 50px rgba(0, 0, 0, 0.12);
  --dg-shadows-surface: 0px 10px 30px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --dg-type-nav-title-size: 18px;
  --dg-type-nav-title-weight: 700;
  --dg-type-nav-title-line-height: 24px;
  --dg-type-screen-title-size: 28px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 34px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 40px;
  --dg-type-section-title-size: 16px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 22px;
  --dg-type-metric-value-size: 36px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 44px;
  --dg-type-body-size: 15px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 13px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 11px;
  --dg-type-caption-weight: 600;
  --dg-type-caption-line-height: 14px;
  --dg-type-button-label-size: 14px;
  --dg-type-button-label-weight: 700;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Plus Jakarta Sans', -apple-system, sans-serif">
  <!-- Top Bar -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <button class="w-[48px] h-[48px] flex items-center justify-start" aria-label="Go back">
      <div class="w-[40px] h-[40px] rounded-full dg-bg-secondary flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </div>
    </button>
    <h1 class="dg-type-nav-title">Transactions</h1>
    <button class="w-[48px] h-[48px] flex items-center justify-end" aria-label="Menu">
      <div class="w-[40px] h-[40px] rounded-full dg-bg-secondary flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </div>
    </button>
  </header>

  <!-- Segmented Control -->
  <div class="px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
    <div class="dg-bg-secondary p-[var(--dg-spacing-xxs)] rounded-[var(--dg-radii-pill)] flex items-center">
      <button class="flex-1 h-[44px] rounded-[var(--dg-radii-pill)] dg-type-button-label dg-text-medium">Income</button>
      <button class="flex-1 h-[44px] rounded-[var(--dg-radii-pill)] dg-bg-primary shadow-sm dg-type-button-label dg-text-high font-bold">Expense</button>
    </div>
  </div>

  <!-- Hero Metric -->
  <div class="flex flex-col items-center justify-center mb-[var(--dg-mobile-layout-section-gap)]">
    <span class="dg-type-supporting dg-text-medium mb-[var(--dg-spacing-xxs)]">Total Spending</span>
    <div class="dg-type-metric-value text-[40px] tracking-tight">$4,250.00</div>
  </div>

  <!-- Bar Chart Card with Notched Top -->
  <div class="relative mt-[var(--dg-spacing-sm)]">
    <!-- The "Tab" Notch Effect -->
    <div class="absolute -top-[12px] left-[var(--dg-mobile-layout-screen-margin)] bg-white h-[24px] w-[100px] rounded-t-[16px] z-0"></div>
    
    <div class="mx-[var(--dg-mobile-layout-screen-margin)] dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] relative z-10">
      <div class="flex items-center justify-between mb-[var(--dg-spacing-xl)]">
        <h3 class="dg-type-section-title">Weekly Analysis</h3>
        <span class="dg-type-supporting dg-text-medium">Jun 12 - 18</span>
      </div>

      <!-- Chart Area -->
      <div class="flex items-end justify-between h-[160px] px-[var(--dg-spacing-xxs)] relative">
        <!-- Floating Value Bubble (Active Day: Friday) -->
        <div class="absolute bottom-[145px] left-[calc(71.4%-28px)] bg-[var(--dg-color-action-primary)] text-white px-[10px] py-[var(--dg-spacing-xxs)] rounded-[8px] text-[12px] font-bold after:content-[''] after:absolute after:top-full after:left-1/2 after:-translate-x-1/2 after:border-4 after:border-transparent after:border-t-[var(--dg-color-action-primary)]">
          $2,135
        </div>

        <!-- Bars -->
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-background-secondary)] rounded-t-[6px] h-[40px]"></div>
          <span class="dg-type-caption dg-text-low">Mon</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-background-secondary)] rounded-t-[6px] h-[65px]"></div>
          <span class="dg-type-caption dg-text-low">Tue</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-background-secondary)] rounded-t-[6px] h-[55px]"></div>
          <span class="dg-type-caption dg-text-low">Wed</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-background-secondary)] rounded-t-[6px] h-[90px]"></div>
          <span class="dg-type-caption dg-text-low">Thu</span>
        </div>
        <!-- Active Bar -->
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-action-primary)] rounded-t-[6px] h-[130px]"></div>
          <span class="dg-type-caption dg-text-high font-bold">Fri</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-background-secondary)] rounded-t-[6px] h-[75px]"></div>
          <span class="dg-type-caption dg-text-low">Sat</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] w-[10%]">
          <div class="w-full bg-[var(--dg-color-background-secondary)] rounded-t-[6px] h-[45px]"></div>
          <span class="dg-type-caption dg-text-low">Sun</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Transfer Card -->
  <div class="mt-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)] pb-[120px]">
    <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)]">
      <div class="flex items-center justify-between mb-[var(--dg-spacing-md)]">
        <h3 class="dg-type-section-title">Transfer to</h3>
        <button class="text-[var(--dg-color-action-secondary)] dg-type-button-label">View All</button>
      </div>

      <!-- Recipient Profile -->
      <div class="flex items-center gap-[var(--dg-mobile-layout-element-gap)] mb-[var(--dg-spacing-md)]">
        <div class="w-[52px] h-[52px] rounded-full overflow-hidden bg-slate-200">
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=120&h=120" alt="Recipient" class="w-full h-full object-cover">
        </div>
        <div class="flex flex-col">
          <span class="dg-type-body font-bold">Alex Thompson</span>
          <span class="dg-type-supporting dg-text-medium">Bank of America • 4829</span>
        </div>
      </div>

      <!-- Amount Input -->
      <div class="relative mb-[var(--dg-spacing-md)]">
        <div class="absolute left-[16px] top-1/2 -translate-y-1/2 dg-type-body font-bold dg-text-medium">$</div>
        <input type="number" placeholder="0.00" class="w-full h-[var(--dg-sizing-standard-input-height)] pl-[32px] pr-[var(--dg-spacing-md)] rounded-[16px] dg-bg-secondary border-none focus:ring-2 focus:ring-[var(--dg-color-border-focused)] dg-type-metric-value text-[24px]">
      </div>

      <!-- Note Field (Subtle Inset) -->
      <div class="dg-bg-secondary rounded-[16px] p-[var(--dg-spacing-sm)] mb-[var(--dg-spacing-md)]">
        <input type="text" placeholder="Add a note..." class="w-full bg-transparent border-none focus:ring-0 dg-type-body p-0">
      </div>

      <!-- Save Checkbox -->
      <label class="flex items-center gap-[var(--dg-spacing-xs)] mb-[var(--dg-spacing-md)] cursor-pointer">
        <div class="w-[20px] h-[20px] rounded-[6px] border-[2px] border-[var(--dg-color-border-divider)] flex items-center justify-center">
          <div class="w-[10px] h-[10px] rounded-[2px] bg-[var(--dg-color-action-secondary)]"></div>
        </div>
        <span class="dg-type-supporting dg-text-medium">Save this account for future transfers</span>
      </label>

      <!-- Action Button -->
      <button class="w-full h-[var(--dg-sizing-standard-button-height)] dg-bg-primary rounded-[var(--dg-radii-pill)] text-white dg-type-button-label flex items-center justify-center gap-[var(--dg-spacing-xs)]" style="background-color: #000000">
        <span>Send Money</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
      </button>
    </div>
  </div>

  <!-- Bottom Spacer for Shared Nav -->
  <div class="h-[var(--dg-sizing-bottom-nav-height)]"></div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 z-[100] w-[calc(100%-40px)] max-w-[420px]">
  <style>
    [data-drawgle-primary-nav] .nav-container {
      background-color: var(--dg-color-action-primary);
      height: var(--dg-sizing-bottom-nav-height);
      border-radius: var(--dg-radii-pill);
      box-shadow: var(--dg-shadows-overlay);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      position: relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [data-drawgle-primary-nav] .nav-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex: 1;
      height: 48px;
      margin: 0 4px;
      color: var(--dg-color-text-low-emphasis);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: var(--dg-radii-pill);
      overflow: hidden;
    }

    [data-drawgle-primary-nav] .nav-item[] {
      color: var(--dg-color-action-on-primary-text);
      flex: 1.8;
      background: rgba(255, 255, 255, 0.1);
      gap: var(--dg-spacing-xs);
    }

    [data-drawgle-primary-nav] .nav-item i {
      width: var(--dg-sizing-icon-standard);
      height: var(--dg-sizing-icon-standard);
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    [data-drawgle-primary-nav] .nav-item[] i {
      color: var(--dg-color-action-secondary);
    }

    [data-drawgle-primary-nav] .nav-label {
      font-family: inherit;
      font-size: var(--dg-type-button-label-size);
      font-weight: var(--dg-type-button-label-weight);
      line-height: 1;
      white-space: nowrap;
      display: none;
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.3s ease;
    }

    [data-drawgle-primary-nav] .nav-item[] .nav-label {
      display: block;
      opacity: 1;
      transform: translateX(0);
    }

    /* Subtle Lavender Glow for Active State */
    [data-drawgle-primary-nav] .nav-item[]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(139, 128, 249, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Tap Target Comfort */
    [data-drawgle-primary-nav] .nav-item:active {
      opacity: 0.7;
      transform: scale(0.95);
    }
  </style>

  <div class="nav-container">
    <button class="nav-item" data-nav-item-id="home">
      <i data-lucide="home"></i>
      <span class="nav-label">Home</span>
    </button>

    <button class="nav-item" data-nav-item-id="wallet">
      <i data-lucide="wallet"></i>
      <span class="nav-label">Wallet</span>
    </button>

    <button class="nav-item" data-nav-item-id="stats">
      <i data-lucide="bar-chart-2"></i>
      <span class="nav-label">Stats</span>
    </button>

    <button class="nav-item" data-nav-item-id="profile">
      <i data-lucide="user"></i>
      <span class="nav-label">Profile</span>
    </button>
  </div>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #444444;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #888888;
  --dg-color-action-primary: #FFFFFF;
  --dg-color-action-disabled: #222222;
  --dg-color-action-secondary: #1A1A1A;
  --dg-color-action-on-primary-text: #0A0A0A;
  --dg-color-border-divider: #262626;
  --dg-color-border-focused: #FFFFFF;
  --dg-color-surface-card: #1A1A1A;
  --dg-color-surface-modal: #1A1A1A;
  --dg-color-surface-bottom-sheet: #121212;
  --dg-color-background-primary: #0A0A0A;
  --dg-color-background-secondary: #000000;
  --dg-radii-app: 12px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0 12px 32px rgba(0,0,0,0.8);
  --dg-shadows-surface: 0 4px 12px rgba(0,0,0,0.5);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: 'Inter', -apple-system, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 28px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 34px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 40px;
  --dg-type-section-title-size: 12px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 16px;
  --dg-type-metric-value-size: 36px;
  --dg-type-metric-value-weight: 500;
  --dg-type-metric-value-line-height: 44px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 11px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 14px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, 'Inter', -apple-system, sans-serif)">
  <!-- Header -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] h-[64px]">
    <div class="w-[32px] h-[32px] rounded-full overflow-hidden bg-[var(--dg-color-surface-card)] border border-[var(--dg-color-border-divider)]">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar" class="w-full h-full object-cover" />
    </div>
    <button class="w-[40px] h-[40px] flex items-center justify-center rounded-full active:opacity-[var(--dg-opacities-pressed)] transition-opacity">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="dg-text-high"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>
    </button>
  </header>

  <!-- Main Content Scroll Area -->
  <main class="flex-1 flex flex-col pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+96px)]">
    
    <!-- Hero Metric Section -->
    <section class="px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-spacing-xl)] flex flex-col gap-[var(--dg-spacing-xxs)]">
      <span class="dg-type-supporting dg-text-medium uppercase tracking-wider">Total Balance</span>
      <div class="flex items-baseline gap-[var(--dg-spacing-xs)]">
        <h1 class="dg-type-metric-value dg-text-high">$142,850.42</h1>
        <span class="dg-type-caption text-[#10B981] font-semibold">+2.4%</span>
      </div>
    </section>

    <!-- Action Row (Horizontal Scroll) -->
    <section class="mt-[var(--dg-mobile-layout-section-gap)]">
      <div class="flex overflow-x-hidden no-scrollbar gap-[var(--dg-mobile-layout-element-gap)] px-[var(--dg-mobile-layout-screen-margin)]">
        <!-- Send -->
        <button class="flex items-center gap-[var(--dg-spacing-xs)] px-[20px] h-[48px] dg-bg-secondary border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] active:opacity-[var(--dg-opacities-pressed)] shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"></path><path d="M12 19V5"></path></svg>
          <span class="dg-type-button-label">Send</span>
        </button>
        <!-- Receive -->
        <button class="flex items-center gap-[var(--dg-spacing-xs)] px-[20px] h-[48px] dg-bg-secondary border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] active:opacity-[var(--dg-opacities-pressed)] shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 12-7 7-7-7"></path><path d="M12 5v14"></path></svg>
          <span class="dg-type-button-label">Receive</span>
        </button>
        <!-- Swap -->
        <button class="flex items-center gap-[var(--dg-spacing-xs)] px-[20px] h-[48px] dg-bg-secondary border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] active:opacity-[var(--dg-opacities-pressed)] shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"></path><path d="M20 7H4"></path><path d="m8 21-4-4 4-4"></path><path d="M4 17h16"></path></svg>
          <span class="dg-type-button-label">Swap</span>
        </button>
        <!-- Buy -->
        <button class="flex items-center gap-[var(--dg-spacing-xs)] px-[20px] h-[48px] dg-bg-secondary border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] active:opacity-[var(--dg-opacities-pressed)] shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"></rect><line x1="2" x2="22" y1="10" y2="10"></line></svg>
          <span class="dg-type-button-label">Buy</span>
        </button>
      </div>
    </section>

    <!-- Performance Card -->
    <section class="mt-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)]">
      <div class="dg-surface-card border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col gap-[var(--dg-spacing-md)] active:opacity-[var(--dg-opacities-pressed)] transition-opacity">
        <div class="flex justify-between items-start">
          <div>
            <h3 class="dg-type-section-title dg-text-medium uppercase">Portfolio Performance</h3>
            <p class="dg-type-body dg-text-high mt-1">Growth Index</p>
          </div>
          <div class="text-right">
            <p class="dg-type-body dg-text-high">+$3,412.00</p>
            <p class="dg-type-caption text-[#10B981]">Last 30 days</p>
          </div>
        </div>
        <!-- Sparkline Chart Construction -->
        <div class="h-[60px] w-full flex items-end gap-[2px]">
          <div class="flex-1 bg-white/10 rounded-t-[2px]" style="height: 40%"></div>
          <div class="flex-1 bg-white/10 rounded-t-[2px]" style="height: 55%"></div>
          <div class="flex-1 bg-white/10 rounded-t-[2px]" style="height: 45%"></div>
          <div class="flex-1 bg-white/10 rounded-t-[2px]" style="height: 70%"></div>
          <div class="flex-1 bg-white/10 rounded-t-[2px]" style="height: 65%"></div>
          <div class="flex-1 bg-white/20 rounded-t-[2px]" style="height: 85%"></div>
          <div class="flex-1 bg-white/20 rounded-t-[2px]" style="height: 75%"></div>
          <div class="flex-1 bg-white/30 rounded-t-[2px]" style="height: 90%"></div>
          <div class="flex-1 bg-white/40 rounded-t-[2px]" style="height: 80%"></div>
          <div class="flex-1 bg-white/60 rounded-t-[2px]" style="height: 95%"></div>
          <div class="flex-1 bg-white/80 rounded-t-[2px]" style="height: 85%"></div>
          <div class="flex-1 bg-white rounded-t-[2px]" style="height: 100%"></div>
        </div>
      </div>
    </section>

    <!-- Recent Activity List -->
    <section class="mt-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)]">
      <div class="flex justify-between items-center mb-[var(--dg-mobile-layout-element-gap)]">
        <h2 class="dg-type-section-title dg-text-medium uppercase">Recent Activity</h2>
        <button class="dg-type-caption dg-text-medium hover:dg-text-high">View All</button>
      </div>
      
      <div class="flex flex-col gap-[var(--dg-spacing-xs)]">
        <!-- Activity Row 1 -->
        <div class="flex items-center justify-between p-[var(--dg-spacing-md)] dg-surface-card border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-app)] active:opacity-[var(--dg-opacities-pressed)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-white/5 flex items-center justify-center border border-white/10">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 2H2v10h10V2z"></path><path d="m17 22 5-5-5-5"></path><path d="M22 17H12"></path></svg>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body dg-text-high">Apple Inc.</span>
              <span class="dg-type-supporting dg-text-medium">Stock Purchase</span>
            </div>
          </div>
          <div class="text-right">
            <span class="dg-type-body dg-text-high">-$1,240.00</span>
            <span class="dg-type-caption dg-text-low block">Today, 10:45 AM</span>
          </div>
        </div>

        <!-- Activity Row 2 -->
        <div class="flex items-center justify-between p-[var(--dg-spacing-md)] dg-surface-card border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-app)] active:opacity-[var(--dg-opacities-pressed)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-white/5 flex items-center justify-center border border-white/10">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></svg>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body dg-text-high">Dividend Payout</span>
              <span class="dg-type-supporting dg-text-medium">Passive Income</span>
            </div>
          </div>
          <div class="text-right">
            <span class="dg-type-body text-[#10B981]">+$42.50</span>
            <span class="dg-type-caption dg-text-low block">Yesterday</span>
          </div>
        </div>

        <!-- Activity Row 3 -->
        <div class="flex items-center justify-between p-[var(--dg-spacing-md)] dg-surface-card border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-app)] active:opacity-[var(--dg-opacities-pressed)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-white/5 flex items-center justify-center border border-white/10">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 18V6"></path></svg>
            </div>
            <div class="flex flex-col">
              <span class="dg-type-body dg-text-high">Bitcoin</span>
              <span class="dg-type-supporting dg-text-medium">Crypto Swap</span>
            </div>
          </div>
          <div class="text-right">
            <span class="dg-type-body dg-text-high">0.024 BTC</span>
            <span class="dg-type-caption dg-text-low block">Oct 24, 2023</span>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-0 left-0 right-0 flex justify-center items-end pb-[var(--dg-mobile-layout-safe-area-bottom)] pointer-events-none z-[100]">
  <div class="pointer-events-auto flex items-center justify-around w-[calc(100%-48px)] max-w-[342px] h-[68px] mb-[var(--dg-mobile-layout-safe-area-bottom)] px-2 bg-[var(--dg-color-surface-bottom-sheet)] border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] shadow-[var(--dg-shadows-overlay)] backdrop-blur-2xl">
    
    <!-- Home / Dashboard -->
    <button data-nav-item-id="dashboard" class="group relative flex flex-col items-center justify-center min-w-[64px] h-full transition-all duration-300 ease-out active:scale-90">
      <div class="flex flex-col items-center gap-1">
        <i data-lucide="layout-dashboard" class="w-[22px] h-[22px] stroke-[1.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300"></i>
        <span class="text-[10px] uppercase tracking-wider font-[var(--dg-type-caption-weight)] leading-[var(--dg-type-caption-line-height)] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300">Home</span>
      </div>
      <div class="absolute bottom-1.5 w-1 h-1 rounded-full bg-[var(--dg-color-text-high-emphasis)] scale-0 opacity-0 group-data-[active=true]:scale-100 group-data-[active=true]:opacity-100 transition-all duration-300 ease-out"></div>
    </button>

    <!-- Portfolio -->
    <button data-nav-item-id="portfolio" class="group relative flex flex-col items-center justify-center min-w-[64px] h-full transition-all duration-300 ease-out active:scale-90">
      <div class="flex flex-col items-center gap-1">
        <i data-lucide="pie-chart" class="w-[22px] h-[22px] stroke-[1.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300"></i>
        <span class="text-[10px] uppercase tracking-wider font-[var(--dg-type-caption-weight)] leading-[var(--dg-type-caption-line-height)] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300">Assets</span>
      </div>
      <div class="absolute bottom-1.5 w-1 h-1 rounded-full bg-[var(--dg-color-text-high-emphasis)] scale-0 opacity-0 group-data-[active=true]:scale-100 group-data-[active=true]:opacity-100 transition-all duration-300 ease-out"></div>
    </button>

name: Deploy Trigger.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: trigger-deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy tasks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
      TRIGGER_PROJECT_REF: ${{ secrets.TRIGGER_PROJECT_REF }}
      TRIGGER_API_URL: ${{ secrets.TRIGGER_API_URL || 'https://api.trigger.dev' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Trigger.dev secrets
        shell: bash
        run: |
          test -n "$TRIGGER_ACCESS_TOKEN" || { echo "Missing TRIGGER_ACCESS_TOKEN repository secret"; exit 1; }
          test -n "$TRIGGER_PROJECT_REF" || { echo "Missing TRIGGER_PROJECT_REF repository secret"; exit 1; }

      - name: Run checks
        run: pnpm run check

      - name: Resolve Trigger.dev CLI version
        id: trigger_cli
        shell: bash
        run: |
          version=$(node -p "const pkg = require('./package.json'); const raw = pkg.dependencies?.['@trigger.dev/sdk']; const match = typeof raw === 'string' ? raw.match(/[0-9]+(?:\.[0-9]+){2}/) : null; if (!match) throw new Error('Unable to resolve @trigger.dev/sdk version from package.json'); match[0]")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Deploy Trigger.dev tasks
        run: pnpm dlx "trigger.dev@${{ steps.trigger_cli.outputs.version }}" deploy --env prod --skip-update-check --log-level info
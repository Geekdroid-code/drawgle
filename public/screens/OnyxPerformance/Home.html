    <style>
:root {
  --dg-color-text-low-emphasis: #48484A;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #8E8E93;
  --dg-color-action-primary: #32D74B;
  --dg-color-action-disabled: #2C2C2E;

  --dg-color-action-on-primary-text: #000000;

  --dg-color-surface-bottom-sheet: #161616;

  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 44px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0 12px 32px rgba(0,0,0,0.8);
  --dg-shadows-surface: 0 4px 12px rgba(0,0,0,0.5), inset 0 0.5px 0 rgba(255,255,255,0.1);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.15;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 34px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 41px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 13px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 18px;
  --dg-type-metric-value-size: 24px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 28px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 21px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif)">
  <!-- Top Bar -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-mobile-layout-element-gap)]">
    <div class="w-10 h-10 rounded-full overflow-hidden border border-[var(--dg-color-border-divider)]">
      <img src="https://images.pexels.com/photos/27663571/pexels-photo-27663571.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940" alt="Profile" class="w-full h-full object-cover">
    </div>
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <button class="w-10 h-10 flex items-center justify-center rounded-full dg-surface-card border border-[var(--dg-color-border-divider)]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      </button>
      <button class="w-10 h-10 flex items-center justify-center rounded-full dg-surface-card border border-[var(--dg-color-border-divider)]">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      </button>
    </div>
  </header>

  <!-- Main Scrollable Content -->
  <main class="flex-1 flex flex-col gap-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)] pb-[calc(var(--dg-sizing-bottom-nav-height)+40px)]">
    
    <!-- Hero Greeting -->
    <section class="mt-4">
      <h1 class="dg-type-hero-title leading-tight">
        Olá, Nathan.<br>
        <span class="text-[var(--dg-color-text-medium-emphasis)]">Hoje é quarta-feira, dia de</span> treinar peito e bíceps.
      </h1>
    </section>

    <!-- Day Selector -->
    <section class="flex justify-between items-center">
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Dom</span>
        <div class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--dg-color-text-low-emphasis)]"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)]">1</span>
      </div>
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Seg</span>
        <div class="w-10 h-10 rounded-full bg-[var(--dg-color-text-low-emphasis)] flex items-center justify-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)]">2</span>
      </div>
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Ter</span>
        <div class="w-10 h-10 rounded-full bg-[var(--dg-color-text-low-emphasis)] flex items-center justify-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)]">3</span>
      </div>
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-high-emphasis)] font-bold">Qua</span>
        <div class="w-10 h-10 rounded-full border-2 border-[var(--dg-color-action-primary)] flex items-center justify-center relative">
          <div class="w-1.5 h-1.5 rounded-full bg-[var(--dg-color-action-primary)] absolute -top-1"></div>
          <span class="text-[var(--dg-color-action-primary)] font-bold text-sm">4</span>
        </div>
        <span class="dg-type-caption text-[var(--dg-color-action-primary)] font-bold">4</span>
      </div>
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Qui</span>
        <div class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center"></div>
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)]">5</span>
      </div>
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Sex</span>
        <div class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center"></div>
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)]">6</span>
      </div>
      <div class="flex flex-col items-center gap-2">
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Sab</span>
        <div class="w-10 h-10 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center"></div>
        <span class="dg-type-caption text-[var(--dg-color-text-low-emphasis)]">7</span>
      </div>
    </section>

    <!-- Metric Grid -->
    <section class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)]">
      <!-- Tempo Card -->
      <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col gap-3 shadow-[var(--dg-shadows-surface)]">
        <div class="flex items-center gap-2">
          <div class="text-blue-400">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </div>
          <span class="dg-type-section-title text-[var(--dg-color-text-medium-emphasis)] uppercase tracking-wider">Tempo</span>
        </div>
        <div>
          <div class="flex items-baseline gap-1">
            <span class="dg-type-metric-value">43</span>
            <span class="dg-type-body text-[var(--dg-color-text-medium-emphasis)]">min</span>
          </div>
          <p class="dg-type-caption text-[var(--dg-color-text-low-emphasis)] mt-1 leading-tight">Por sessão de exercícios</p>
        </div>
      </div>

      <!-- Calorias Card -->
      <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col gap-3 shadow-[var(--dg-shadows-surface)]">
        <div class="flex items-center gap-2">
          <div class="text-orange-500">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
          </div>
          <span class="dg-type-section-title text-[var(--dg-color-text-medium-emphasis)] uppercase tracking-wider">Calorias</span>
        </div>
        <div>
          <div class="flex items-baseline gap-1">
            <span class="dg-type-metric-value">824</span>
            <span class="dg-type-body text-[var(--dg-color-text-medium-emphasis)]">kcal</span>
          </div>
          <p class="dg-type-caption text-[var(--dg-color-text-low-emphasis)] mt-1 leading-tight">Por sessão de exercícios</p>
        </div>
      </div>
    </section>

    <!-- Daily Streaks Card -->
    <section class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] relative overflow-hidden">
      <div class="flex justify-between items-start mb-4">
        <div class="flex items-center gap-2">
          <div class="text-[var(--dg-color-action-primary)]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </div>
          <span class="dg-type-section-title text-[var(--dg-color-text-medium-emphasis)] uppercase tracking-wider">Daily streaks</span>
        </div>
        <button class="flex items-center gap-1.5 bg-[var(--dg-color-background-primary)] px-3 py-1.5 rounded-full border border-[var(--dg-color-border-divider)]">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          <span class="text-[10px] font-bold uppercase tracking-tight">Add widget</span>
        </button>
      </div>
      
      <div class="flex flex-col">
        <div class="flex items-baseline gap-2">
          <span class="text-[48px] font-bold leading-none">23</span>
          <span class="dg-type-metric-value text-[var(--dg-color-text-medium-emphasis)]">dias</span>
        </div>
        <p class="dg-type-caption text-[var(--dg-color-text-low-emphasis)] mt-1">Iniciou em 23 de JAN de 2026</p>
      </div>

      <!-- Subtle background decoration -->
      <div class="absolute -right-4 -bottom-4 opacity-10">
        <svg width="120" height="120" viewBox="0 0 24 24" fill="currentColor"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
      </div>
    </section>

  </main>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="dg-nav-shell" aria-label="Primary navigation">
  <style>
    [data-drawgle-primary-nav].dg-nav-shell {
      position: fixed;
      bottom: var(--dg-mobile-layout-safe-area-bottom, 16px);
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - (var(--dg-mobile-layout-screen-margin, 20px) * 2));
      max-width: 350px;
      height: 72px;
      background: rgba(18, 18, 18, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: var(--dg-radii-pill, 9999px);
      border: 1px solid var(--dg-color-border-divider, rgba(255, 255, 255, 0.08));
      box-shadow: var(--dg-shadows-overlay);
      padding: 6px;
      z-index: 1000;
      display: flex;
      align-items: center;
      box-sizing: border-box;
    }

    [data-drawgle-primary-nav] .dg-nav-shell-inner {
      display: flex;
      width: 100%;
      height: 100%;
      justify-content: space-between;
      align-items: center;
    }

    [data-drawgle-primary-nav] .dg-nav-item {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: transparent;
      border: none;
      padding: 0;
      margin: 0;
      color: var(--dg-color-text-medium-emphasis, #8E8E93);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    [data-drawgle-primary-nav] .dg-nav-icon {
      width: var(--dg-sizing-icon-standard, 24px);
      height: var(--dg-sizing-icon-standard, 24px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    [data-drawgle-primary-nav] .dg-nav-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.5px;
    }

    [data-drawgle-primary-nav] .dg-nav-label {
      font-size: var(--dg-type-caption-size, 11px);
      font-weight: var(--dg-type-caption-weight, 500);
      line-height: var(--dg-type-caption-line-height, 1);
      letter-spacing: 0.02em;
    }

    /* Active State for Standard Tabs */
    [data-drawgle-primary-nav] .dg-nav-item[]:not([data-nav-item-id="active-session"]) {
      color: var(--dg-color-text-high-emphasis, #FFFFFF);

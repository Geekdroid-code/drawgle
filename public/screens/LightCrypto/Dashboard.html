<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #999999;
  --dg-color-text-high-emphasis: #121212;
  --dg-color-text-medium-emphasis: #666666;
  --dg-color-accent-info: #E0D7F0;
  --dg-color-accent-success: #D1E8E2;
  --dg-color-accent-warning: #E6C994;
  --dg-color-action-primary: #D1E8E2;
  --dg-color-action-disabled: #D1D1CB;
  --dg-color-action-secondary: #E0D7F0;
  --dg-color-action-on-primary-text: #121212;
  --dg-color-border-divider: #E0E0DA;
  --dg-color-border-focused: #121212;
  --dg-color-surface-card: #121212;
  --dg-color-surface-modal: #121212;
  --dg-color-surface-bottom-sheet: #E7E7E7;
  --dg-color-background-primary: #F9F9F9;
  --dg-color-background-secondary: #E7E7E7;
  --dg-radii-app: 28px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 60px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0 20px 40px rgba(0,0,0,0.12);
  --dg-shadows-surface: inset 0 0 0 1px rgba(0,0,0,0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Inter', 'JetBrains Mono', sans-serif;
  --dg-type-nav-title-size: 18px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 24px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 32px;
  --dg-type-hero-title-size: 40px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 48px;
  --dg-type-section-title-size: 14px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 20px;
  --dg-type-metric-value-size: 32px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 40px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 13px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 11px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 14px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Inter', 'JetBrains Mono', sans-serif">
  <!-- Main Scrollable Content -->
  <div class="flex-1 flex flex-col pt-[var(--dg-mobile-layout-safe-area-top)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+116px)]">
    
    <!-- Header Section -->
    <header class="px-[var(--dg-mobile-layout-screen-margin)] flex justify-between items-center mb-[var(--dg-spacing-md)]">
      <div class="flex flex-col">
        <span class="dg-type-section-title dg-text-medium">Hey, Steve!</span>
        <span class="dg-type-body dg-text-low flex items-center gap-1">Good morning! 👋</span>
      </div>
      <div class="w-12 h-12 rounded-full border border-[var(--dg-color-border-divider)] p-0.5 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=120&auto=format&fit=crop" alt="Profile" class="w-full h-auto rounded-full grayscale">
      </div>
    </header>

    <!-- Balance Section -->
    <section class="px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
      <span class="dg-type-caption dg-text-low uppercase tracking-wider">Current Value</span>
      <div class="flex items-baseline gap-2 mt-1">
        <h1 class="dg-type-metric-value">$12,788.56</h1>
        <span class="dg-type-supporting text-emerald-600 font-semibold">+0.2% (+$25.6)</span>
      </div>
    </section>

    <!-- Action Rail with Boolean Subtraction Connector -->
    <section class="px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
      <div class="relative flex items-center justify-between h-[var(--dg-sizing-standard-button-height)]">
        <!-- Transfer Button -->
        <button class="flex-1 h-full bg-white border border-[var(--dg-color-border-divider)] rounded-l-[var(--dg-radii-pill)] flex items-center px-6 gap-3">
          <div class="w-8 h-8 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center">
            <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
          </div>
          <span class="dg-type-button-label">Transfer</span>
        </button>

        <!-- Central Boolean Connector -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
          <div class="w-12 h-12 bg-[var(--dg-color-background-primary)] rounded-full flex items-center justify-center">
            <button class="w-9 h-9 bg-black rounded-full flex items-center justify-center text-white active:scale-95 transition-transform">
              <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <!-- Receive Button -->
        <button class="flex-1 h-full bg-white border border-[var(--dg-color-border-divider)] rounded-r-[var(--dg-radii-pill)] flex items-center justify-end px-6 gap-3">
          <span class="dg-type-button-label">Receive</span>
          <div class="w-8 h-8 rounded-full border border-[var(--dg-color-border-divider)] flex items-center justify-center">
            <i data-lucide="arrow-down-left" class="w-4 h-4"></i>
          </div>
        </button>
      </div>
    </section>

    <!-- Mint Green Modular Panel (Chart) -->
    <section class="px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
      <div class="bg-[var(--dg-color-action-primary)] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] border border-[rgba(0,0,0,0.05)]">
        <div class="flex justify-between items-center mb-6">
          <div class="flex items-center gap-2 bg-white/40 px-3 py-1.5 rounded-full border border-white/20">
            <div class="w-4 h-4 bg-black rounded-full flex items-center justify-center">
              <i data-lucide="diamond" class="w-2.5 h-2.5 text-white"></i>
            </div>
            <span class="dg-type-caption font-bold">ETH</span>
            <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </div>
          <div class="flex gap-2">
            <span class="dg-type-caption px-2 py-1 bg-white/40 rounded-md">1D</span>
            <span class="dg-type-caption px-2 py-1 bg-black text-white rounded-md">7D</span>
            <span class="dg-type-caption px-2 py-1 bg-white/40 rounded-md">1M</span>
          </div>
        </div>

        <!-- Simplified Bar Chart -->
        <div class="h-32 flex items-end justify-between gap-2 px-2">
          <div class="flex-1 bg-black/10 rounded-t-sm h-[40%]"></div>
          <div class="flex-1 bg-black/10 rounded-t-sm h-[55%]"></div>
          <div class="flex-1 bg-black rounded-t-sm h-[85%]"></div>
          <div class="flex-1 bg-black/10 rounded-t-sm h-[65%]"></div>
          <div class="flex-1 bg-black/10 rounded-t-sm h-[75%]"></div>
          <div class="flex-1 bg-black rounded-t-sm h-[95%]"></div>
          <div class="flex-1 bg-black/10 rounded-t-sm h-[50%]"></div>
        </div>
        
        <div class="flex justify-between mt-4 px-2">
          <span class="dg-type-caption dg-text-low">Mon</span>
          <span class="dg-type-caption dg-text-low">Wed</span>
          <span class="dg-type-caption dg-text-low">Fri</span>
          <span class="dg-type-caption dg-text-low">Sun</span>
        </div>
      </div>
    </section>

    <!-- Matte Black Asset List Card -->
    <section class="flex-1 px-[var(--dg-mobile-layout-screen-margin)]">
      <div class="dg-surface-card rounded-t-[var(--dg-radii-app)] min-h-[400px] flex flex-col relative overflow-hidden">
        
        <!-- Header of Black Card -->
        <div class="p-[var(--dg-spacing-md)] flex justify-between items-center border-b border-white/10">
          <span class="dg-type-section-title text-white">Assets</span>
          <span class="dg-type-caption text-white/50">View All</span>
        </div>

        <!-- Asset Rows -->
        <div class="flex flex-col">
          <!-- Bitcoin -->
          <div class="p-[var(--dg-spacing-md)] flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                <i data-lucide="bitcoin" class="w-5 h-5 text-white"></i>
              </div>
              <div class="flex flex-col">
                <span class="dg-type-body text-white font-semibold">Bitcoin</span>
                <span class="dg-type-caption text-white/40 uppercase">BTC</span>
              </div>
            </div>
            <div class="flex flex-col items-end">
              <span class="dg-type-body text-white font-bold">$26,068.090</span>
              <span class="dg-type-caption text-emerald-400">+0.08%</span>
            </div>
          </div>

          <!-- Ethereum -->
          <div class="p-[var(--dg-spacing-md)] flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                <i data-lucide="diamond" class="w-5 h-5 text-white"></i>
              </div>
              <div class="flex flex-col">
                <span class="dg-type-body text-white font-semibold">Ethereum</span>
                <span class="dg-type-caption text-white/40 uppercase">ETH</span>
              </div>
            </div>
            <div class="flex flex-col items-end">
              <span class="dg-type-body text-white font-bold">$1,648.170</span>
              <span class="dg-type-caption text-rose-400">-0.23%</span>
            </div>
          </div>

          <!-- Solana -->
          <div class="p-[var(--dg-spacing-md)] flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                <i data-lucide="zap" class="w-5 h-5 text-white"></i>
              </div>
              <div class="flex flex-col">
                <span class="dg-type-body text-white font-semibold">Solana</span>
                <span class="dg-type-caption text-white/40 uppercase">SOL</span>
              </div>
            </div>
            <div class="flex flex-col items-end">
              <span class="dg-type-body text-white font-bold">$19.42</span>
              <span class="dg-type-caption text-emerald-400">+1.45%</span>
            </div>
          </div>
        </div>

        <!-- Concave Docking Curve for Bottom Nav -->
        <div class="absolute bottom-0 left-0 right-0 h-24 bg-transparent pointer-events-none">
          <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-24 h-12 bg-[var(--dg-color-background-primary)] rounded-t-full border-t border-x border-[var(--dg-color-border-divider)]"></div>
        </div>
      </div>
    </section>
  </div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="relative w-full bg-[var(--dg-color-background-primary)] border-t border-[var(--dg-color-border-divider)] flex items-stretch justify-between px-[var(--dg-mobile-layout-screen-margin)] pb-[var(--dg-mobile-layout-safe-area-bottom)] h-[var(--dg-sizing-bottom-nav-height)] overflow-visible" style="font-weight: var(--dg-type-supporting-weight); background-color: var(--dg-color-background-primary)">
  <style>
    [data-drawgle-primary-nav] {
      contain: layout;
      background-color: var(--dg-color-background-primary);
    }
    [data-drawgle-primary-nav] button {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    /* The Concave Dock: Boolean Subtraction Geometry */
    .nav-concave-mask {
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 44px;
      background: var(--dg-color-background-primary);
      pointer-events: none;
      mask-image: radial-gradient(circle at 50% 0%, transparent 42px, black 43px);
      -webkit-mask-image: radial-gradient(circle at 50% 0%, transparent 42px, black 43px);
      border-top: 1px solid var(--dg-color-border-divider);
      z-index: 1;
    }
    /* Active State: Industrial Mint Indicator */
    .nav-indicator {
      position: absolute;
      top: 12px;
      width: 32px;
      height: 2px;
      background: var(--dg-color-action-primary);
      border-radius: var(--dg-radii-pill);
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }
    [] .nav-indicator {
      opacity: 1;
      transform: translateY(0);
    }
    [] i {
      color: var(--dg-color-text-high-emphasis);
      stroke-width: 1.5px !important;
    }
    [] span {
      color: var(--dg-color-text-high-emphasis);
    }
    /* Machined Hub Button */
    .hub-button {
      box-shadow: 0 0 0 6px var(--dg-color-background-primary);
      background: var(--dg-color-surface-card);
    }
  </style>

  <!-- Left Rail -->
  <div class="flex flex-1 items-center justify-between pr-4 z-10">
    <button data-nav-item-id="dashboard" class="relative flex flex-col items-center justify-center flex-1 h-full group">
      <div class="nav-indicator"></div>
      <i data-lucide="layout-grid" class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1px] text-[var(--dg-color-text-medium-emphasis)] transition-colors"></i>
      <span class="mt-1.5 text-[var(--dg-type-caption-size)] leading-none font-medium tracking-tight text-[var(--dg-color-text-low-emphasis)] transition-colors">Home</span>
    </button>

    <button data-nav-item-id="market" class="relative flex flex-col items-center justify-center flex-1 h-full group">
      <div class="nav-indicator"></div>
      <i data-lucide="line-chart" class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1px] text-[var(--dg-color-text-medium-emphasis)] transition-colors"></i>
      <span class="mt-1.5 text-[var(--dg-type-caption-size)] leading-none font-medium tracking-tight text-[var(--dg-color-text-low-emphasis)] transition-colors">Market</span>
    </button>
  </div>

  <!-- Central Geometric Hub -->
  <div class="relative w-20 flex flex-col items-center z-20">
    <div class="nav-concave-mask"></div>
    <div class="absolute -top-7 flex flex-col items-center">
      <button data-nav-item-id="swap" class="hub-button w-[64px] h-[64px] rounded-full flex items-center justify-center border border-[var(--dg-color-border-divider)] active:scale-95 transition-transform duration-200">
        <i data-lucide="repeat" class="w-6 h-6 stroke-[1.25px] text-[var(--dg-color-action-primary)]"></i>
      </button>
      <span class="mt-2.5 text-[var(--dg-type-caption-size)] leading-none font-bold tracking-widest text-[var(--dg-color-text-high-emphasis)]"></span>
    </div>
  </div>

  <!-- Right Rail -->
  <div class="flex flex-1 items-center justify-between pl-4 z-10">
    <button data-nav-item-id="vaults" class="relative flex flex-col items-center justify-center flex-1 h-full group">
      <div class="nav-indicator"></div>
      <i data-lucide="shield-check" class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1px] text-[var(--dg-color-text-medium-emphasis)] transition-colors"></i>
      <span class="mt-1.5 text-[var(--dg-type-caption-size)] leading-none font-medium tracking-tight text-[var(--dg-color-text-low-emphasis)] transition-colors">Vaults</span>

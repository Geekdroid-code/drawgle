<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DIN+Next+Round:wght@600;700;800;900&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #AFAFAF;
  --dg-color-text-high-emphasis: #4B4B4B;
  --dg-color-text-medium-emphasis: #777777;
  --dg-color-action-primary: #58CC02;
  --dg-color-action-disabled: #E5E5E5;
  --dg-color-action-secondary: #1CB0F6;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #E5E5E5;
  --dg-color-border-focused: #84D8FF;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #FFFFFF;
  --dg-color-background-secondary: #F7F7F7;
  --dg-radii-app: 16px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 50px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px -4px 0px 0px rgba(0,0,0,0.05);
  --dg-shadows-surface: 0px 2px 0px 0px #E5E5E5;
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'DIN Next Round', 'Nunito', sans-serif;
  --dg-type-nav-title-size: 18px;
  --dg-type-nav-title-weight: 800;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 800;
  --dg-type-screen-title-line-height: 28px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 900;
  --dg-type-hero-title-line-height: 36px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 800;
  --dg-type-section-title-line-height: 24px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 900;
  --dg-type-metric-value-line-height: 32px;
  --dg-type-body-size: 17px;
  --dg-type-body-weight: 600;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 15px;
  --dg-type-supporting-weight: 600;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 13px;
  --dg-type-caption-weight: 700;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 800;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 24px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 16px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'DIN Next Round', 'Nunito', sans-serif">
  <!-- Header: Progress & Stats -->
  <header class="flex items-center px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] h-[64px] gap-[var(--dg-mobile-layout-element-gap)]">
    <button class="w-[40px] h-[40px] flex items-center justify-start text-[var(--dg-color-text-low-emphasis)]" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    
    <div class="flex-1 h-[16px] bg-[var(--dg-color-action-disabled)] rounded-full overflow-hidden">
      <div class="h-full w-[45%] bg-[var(--dg-color-action-primary)] rounded-full relative">
        <!-- Progress Highlight Shine -->
        <div class="absolute top-[3px] left-[8px] right-[8px] h-[4px] bg-white/30 rounded-full"></div>
      </div>
    </div>

    <div class="flex items-center gap-[var(--dg-spacing-xs)] pl-[var(--dg-spacing-xs)]">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#FF4B4B" stroke="#FF4B4B" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></svg>
      <span class="text-[#FF4B4B] font-[800] text-[18px]">5</span>
    </div>
  </header>

  <!-- Main Exercise Content -->
  <main class="flex-1 flex flex-col px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-section-gap)]">
    <!-- Instruction -->
    <h1 class="dg-type-screen-title mb-[var(--dg-mobile-layout-section-gap)]">
      Select the correct image
    </h1>

    <!-- Audio Prompt -->
    <div class="flex items-center gap-[var(--dg-spacing-md)] mb-[var(--dg-mobile-layout-section-gap)]">
      <button class="w-[48px] h-[48px] bg-[var(--dg-color-action-secondary)] rounded-[12px] flex items-center justify-center shadow-[0px_4px_0px_0px_#1899D6] active:translate-y-[2px] active:shadow-[0px_2px_0px_0px_#1899D6] transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
      </button>
      <span class="dg-type-section-title border-b-2 border-dotted border-[var(--dg-color-border-divider)] pb-1">la femme</span>
    </div>

    <!-- 2x2 Grid of Image Cards -->
    <div class="grid grid-cols-2 gap-[16px] mb-[var(--dg-mobile-layout-section-gap)]">
      <!-- Card 1: Unselected -->
      <div class="relative dg-surface-card border-2 border-[#FFD700] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col items-center gap-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] cursor-pointer active:bg-[var(--dg-color-background-secondary)] transition-colors">
        <div class="absolute top-2 right-2 text-[#FFD700]"><i data-lucide="crown" class="w-4 h-4"></i></div>
        <div class="w-full aspect-square bg-[#F0F0F0] rounded-[12px] flex items-center justify-center relative overflow-hidden">
          <!-- Character Illustration Placeholder (The Boy) -->
          <div class="w-[80%] h-[80%] bg-[#FFD966] rounded-full relative">
            <div class="absolute top-[30%] left-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute top-[30%] right-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute bottom-[25%] left-[35%] w-[30%] h-[10%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
          </div>
          <div class="absolute top-2 left-2 w-[24px] h-[24px] rounded-md border-2 border-[var(--dg-color-border-divider)] flex items-center justify-center text-[12px] font-bold text-[var(--dg-color-text-low-emphasis)]">1</div>
        </div>
        <span class="dg-type-body">le garçon</span>
      </div>

      <!-- Card 2: Selected -->
      <div class="relative bg-[#DDF4FF] border-2 border-[#FFD700] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col items-center gap-[var(--dg-spacing-md)] shadow-[0px_2px_0px_0px_#84D8FF] cursor-pointer">
        <div class="absolute top-2 right-2 text-[#FFD700]"><i data-lucide="crown" class="w-4 h-4"></i></div>
        <div class="w-full aspect-square bg-[#E5F7FF] rounded-[12px] flex items-center justify-center relative overflow-hidden">
          <!-- Character Illustration Placeholder (The Woman) -->
          <div class="w-[80%] h-[80%] bg-[#FFADAD] rounded-full relative">
            <div class="absolute top-[30%] left-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute top-[30%] right-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute bottom-[25%] left-[30%] w-[40%] h-[15%] border-b-4 border-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute -top-2 w-full h-[40%] bg-[var(--dg-color-text-high-emphasis)] rounded-t-full"></div>
          </div>
          <div class="absolute top-2 left-2 w-[24px] h-[24px] rounded-md border-2 border-[var(--dg-color-border-focused)] bg-[var(--dg-color-border-focused)] flex items-center justify-center text-[12px] font-bold text-white">2</div>
        </div>
        <span class="dg-type-body text-[var(--dg-color-action-secondary)]">la femme</span>
      </div>

      <!-- Card 3: Unselected -->
      <div class="relative dg-surface-card border-2 border-[#FFD700] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col items-center gap-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] cursor-pointer active:bg-[var(--dg-color-background-secondary)] transition-colors">
        <div class="absolute top-2 right-2 text-[#FFD700]"><i data-lucide="crown" class="w-4 h-4"></i></div>
        <div class="w-full aspect-square bg-[#F0F0F0] rounded-[12px] flex items-center justify-center relative overflow-hidden">
          <!-- Character Illustration Placeholder (The Girl) -->
          <div class="w-[80%] h-[80%] bg-[#B9F2FF] rounded-full relative">
            <div class="absolute top-[30%] left-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute top-[30%] right-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute bottom-[25%] left-[35%] w-[30%] h-[10%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute -left-2 top-4 w-[30%] h-[30%] bg-[#FFADAD] rounded-full"></div>
            <div class="absolute -right-2 top-4 w-[30%] h-[30%] bg-[#FFADAD] rounded-full"></div>
          </div>
          <div class="absolute top-2 left-2 w-[24px] h-[24px] rounded-md border-2 border-[var(--dg-color-border-divider)] flex items-center justify-center text-[12px] font-bold text-[var(--dg-color-text-low-emphasis)]">3</div>
        </div>
        <span class="dg-type-body">la fille</span>
      </div>

      <!-- Card 4: Unselected -->
      <div class="relative dg-surface-card border-2 border-[#FFD700] rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col items-center gap-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] cursor-pointer active:bg-[var(--dg-color-background-secondary)] transition-colors">
        <div class="absolute top-2 right-2 text-[#FFD700]"><i data-lucide="crown" class="w-4 h-4"></i></div>
        <div class="w-full aspect-square bg-[#F0F0F0] rounded-[12px] flex items-center justify-center relative overflow-hidden">
          <!-- Character Illustration Placeholder (The Man) -->
          <div class="w-[80%] h-[80%] bg-[#C2FFD8] rounded-full relative">
            <div class="absolute top-[30%] left-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute top-[30%] right-[25%] w-[15%] h-[15%] bg-[var(--dg-color-text-high-emphasis)] rounded-full"></div>
            <div class="absolute bottom-[20%] left-[20%] w-[60%] h-[20%] bg-[var(--dg-color-text-high-emphasis)] rounded-md"></div>
          </div>
          <div class="absolute top-2 left-2 w-[24px] h-[24px] rounded-md border-2 border-[var(--dg-color-border-divider)] flex items-center justify-center text-[12px] font-bold text-[var(--dg-color-text-low-emphasis)]">4</div>
        </div>
        <span class="dg-type-body">l'homme</span>
      </div>
    </div>
  </main>

  <!-- Bottom Feedback Bar (Hidden/Inactive State) -->
  <!-- Note: In a real app, this would slide up and change color based on correctness -->
  <footer class="mt-auto border-t-2 border-[var(--dg-color-border-divider)] px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-spacing-md)] pb-[var(--dg-spacing-md)]">
    <button class="w-full h-[var(--dg-sizing-standard-button-height)] bg-[var(--dg-color-action-primary)] rounded-[12px] shadow-[0px_4px_0px_0px_#46A302] flex items-center justify-center active:translate-y-[2px] active:shadow-[0px_2px_0px_0px_#46A302] transition-all">
      <span class="dg-type-button-label text-white uppercase tracking-wider">Check</span>
    </button>
  </footer>

  <!-- Correct Feedback Overlay (Simulated State) -->
  <!-- This would be toggled visible on 'Check' if correct -->
  <div class="hidden absolute bottom-0 left-0 right-0 bg-[#D7FFB8] border-t-2 border-[#A5ED6E] px-[var(--dg-mobile-layout-screen-margin)] pt-[24px] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+16px)] flex flex-col gap-[var(--dg-mobile-layout-section-gap)] z-50">
    <div class="flex items-center gap-[var(--dg-spacing-md)]">
      <div class="w-[40px] h-[40px] bg-white rounded-full flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#58CC02" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2 class="text-[var(--dg-color-action-primary)] text-[24px] font-[800]">Excellent!</h2>
    </div>
    <button class="w-full h-[var(--dg-sizing-standard-button-height)] bg-[var(--dg-color-action-primary)] rounded-[12px] shadow-[0px_4px_0px_0px_#46A302] flex items-center justify-center">
      <span class="dg-type-button-label text-white uppercase tracking-wider">Continue</span>
    </button>
  </div>

  <!-- Content Clearance for Bottom Nav (if injected) -->
  <div class="h-[calc(var(--dg-mobile-layout-safe-area-bottom)+96px)]"></div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-0 left-0 right-0 w-full bg-[var(--dg-color-background-primary)] border-t-[var(--dg-border-widths-standard)] border-[var(--dg-color-border-divider)] z-[1000] select-none" style="border-color: var(--dg-color-border-divider)">
  <div class="flex flex-row items-stretch justify-around w-full max-w-[390px] mx-auto h-[var(--dg-sizing-bottom-nav-height)] px-[var(--dg-spacing-xs)]">
    
    <!-- Learn -->
    <button 
      data-nav-item-id="learn" 
      class="group relative flex flex-col items-center justify-center flex-1 transition-all duration-150 active:translate-y-[2px]">
      <div class="flex items-center justify-center w-full h-full py-[var(--dg-spacing-xs)] rounded-[var(--dg-radii-app)] group-data-[active=true]:bg-[rgba(88,204,2,0.1)]">
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)]">
          <i data-lucide="home" class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[2.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-action-primary)] transition-transform group-data-[active=true]:scale-110"></i>
          <span class="dg-type-caption uppercase tracking-[0.05em] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-action-primary)]"></span>
        </div>
      </div>
    </button>

    <!-- Practice -->
    <button 
      data-nav-item-id="practice" 
      class="group relative flex flex-col items-center justify-center flex-1 transition-all duration-150 active:translate-y-[2px]">
      <div class="flex items-center justify-center w-full h-full py-[var(--dg-spacing-xs)] rounded-[var(--dg-radii-app)] group-data-[active=true]:bg-[rgba(28,176,246,0.1)]">
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)]">

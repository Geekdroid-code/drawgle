  --dg-type-button-label-weight: 700;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-none: 0px;

  --dg-border-widths-standard: 2px;

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }

  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#B81D33] flex flex-col relative overflow-hidden" style="font-family: 'Inter', sans-serif">
  
  <!-- Organic Leaf Overlays -->
  <div class="absolute top-[-10%] left-[-10%] opacity-[0.08] pointer-events-none rotate-[-15deg]">
    <svg width="400" height="400" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="0.5">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1 0-2-.13-3-.4"></path>
      <path d="M11 20c-1.4 0-2.5-1.1-2.5-2.5S9.6 15 11 15s2.5 1.1 2.5 2.5S12.4 20 11 20z"></path>
    </svg>
  </div>
  <div class="absolute bottom-[20%] right-[-15%] opacity-[0.05] pointer-events-none rotate-[160deg]">
    <svg width="500" height="500" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="0.5">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1 0-2-.13-3-.4"></path>
      <path d="M11 20c-1.4 0-2.5-1.1-2.5-2.5S9.6 15 11 15s2.5 1.1 2.5 2.5S12.4 20 11 20z"></path>
    </svg>
  </div>

  <!-- Header -->
  <header class="relative z-[10] flex items-center justify-between px-[24px] pt-[16px] h-[64px]">
    <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-[rgba(255,255,255,0.15)] border border-[rgba(255,255,255,0.1)] backdrop-blur-sm">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    
    <div class="text-[#FFFFFF] text-[24px] font-[700] tracking-tight">xefag</div>
    
    <div class="flex gap-[12px]">
      <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-[rgba(255,255,255,0.15)] border border-[rgba(255,255,255,0.1)] backdrop-blur-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-[rgba(255,255,255,0.15)] border border-[rgba(255,255,255,0.1)] backdrop-blur-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
      </button>
    </div>
  </header>

  <!-- Category Tabs -->
  <nav class="flex justify-center gap-[32px] mt-[24px] relative z-[10]">
    <div class="flex flex-col items-center gap-[4px] opacity-[0.5]">
      <div class="w-[48px] h-[48px] flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </div>
      <span class="text-[#FFFFFF] text-[12px] font-[600] uppercase tracking-widest">Relax</span>
    </div>
    <div class="flex flex-col items-center gap-[4px]">
      <div class="w-[48px] h-[48px] flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </div>
      <span class="text-[#FFFFFF] text-[12px] font-[600] uppercase tracking-widest">Sleep</span>
      <div class="w-[4px] h-[4px] bg-white rounded-full mt-[2px]"></div>
    </div>
  </nav>

  <!-- Hero Section -->
  <main class="flex-1 flex items-center justify-center relative px-[24px] pb-[120px]">
    <!-- Floating Product Bottle -->
    <div class="relative w-[280px] h-[380px] flex items-center justify-center">
      <!-- Color-matched deep shadow -->
      <div class="absolute bottom-[20px] w-[180px] h-[40px] bg-[#640a16] blur-[30px] rounded-[100%] opacity-[0.6]"></div>
      
      <!-- Bottle Placeholder (Simulating a premium red bottle) -->
      <div class="relative z-[5] w-full h-full flex items-center justify-center animate-bounce-slow">
        <div class="w-[180px] h-[320px] bg-gradient-to-br from-[#D12D44] to-[#8B1526] rounded-[40px] shadow-2xl border border-[rgba(255,255,255,0.1)] flex flex-col items-center justify-center p-[24px]">
          <div class="w-[100px] h-[100px] rounded-full bg-[rgba(255,255,255,0.1)] flex items-center justify-center mb-[20px]">
             <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </div>
          <div class="text-white text-center">
            <div class="text-[24px] font-[700] leading-tight mb-1">SLEEP</div>
            <div class="text-[10px] font-[500] opacity-60 tracking-[4px] uppercase">Dissolvable Wafers</div>
          </div>
          <div class="mt-auto w-full h-[2px] bg-[rgba(255,255,255,0.1)]"></div>
          <div class="mt-[12px] text-white text-[12px] font-[600]">30 WAFERS</div>
        </div>
      </div>
    </div>

    <!-- Dosage Rail -->
    <div class="absolute right-[24px] top-1/2 -translate-y-1/2 flex flex-col gap-[16px] z-[20]">
      <button class="w-[56px] h-[56px] rounded-full bg-[#1A1A1A] text-white flex items-center justify-center text-[16px] font-[700] shadow-lg border border-[rgba(255,255,255,0.1)]">
        30
      </button>
      <button class="w-[56px] h-[56px] rounded-full bg-[rgba(255,255,255,0.2)] text-white flex items-center justify-center text-[16px] font-[600] backdrop-blur-md border border-[rgba(255,255,255,0.1)]">
        60
      </button>
      <button class="w-[56px] h-[56px] rounded-full bg-[rgba(255,255,255,0.2)] text-white flex items-center justify-center text-[16px] font-[600] backdrop-blur-md border border-[rgba(255,255,255,0.1)]">
        90
      </button>
    </div>
  </main>

  <!-- Bottom Sheet -->
  <div class="absolute bottom-0 left-0 w-full bg-[#FFFFFF] rounded-t-[40px] px-[24px] pt-[32px] pb-[40px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-[30]">
    <!-- Handle -->
    <div class="absolute top-[12px] left-1/2 -translate-x-1/2 w-[40px] h-[4px] bg-[#F2F2F2] rounded-full"></div>
    
    <div class="flex justify-between items-start mb-[24px]">
      <div>
        <h1 class="text-[#1A1A1A] text-[26px] font-[700] leading-[32px]">Sleep 30 Dissolvable Wafers</h1>
        <p class="text-[#666666] text-[16px] font-[500] mt-[4px]">250 mg</p>
      </div>
      <div class="text-right">
        <div class="text-[#1A1A1A] text-[28px] font-[700]">$25.50</div>
      </div>
    </div>

    <div class="flex items-center gap-[16px] mb-[32px]">
      <div class="flex items-center bg-[#F8F8F8] rounded-full p-[4px] border border-[#F2F2F2]">
        <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-white shadow-sm text-[#1A1A1A]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
        </button>
        <span class="px-[20px] text-[18px] font-[700] text-[#1A1A1A]">1</span>
        <button class="w-[48px] h-[48px] flex items-center justify-center rounded-full bg-white shadow-sm text-[#1A1A1A]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <div class="flex-1 text-[#999999] text-[14px] font-[500] leading-tight">
        Free shipping on orders over $50
      </div>
    </div>

    <button class="w-full h-[64px] bg-[#FFC82C] rounded-[20px] flex items-center justify-center gap-[12px] shadow-[0_8px_20px_rgba(255,200,44,0.3)] active:scale-[0.98] transition-transform">
      <span class="text-[#1A1A1A] text-[18px] font-[700]">Buy Now</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
    </button>
  </div>

  <style>
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .animate-bounce-slow {
      animation: bounce-slow 4s ease-in-out infinite;
    }
  </style>
</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>

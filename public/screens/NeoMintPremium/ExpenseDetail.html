<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #999999;
  --dg-color-text-high-emphasis: #000000;
  --dg-color-text-medium-emphasis: #666666;
  --dg-color-accent-income: #E55B5B;
  --dg-color-accent-texture-stripe: #E0E0E0;
  --dg-color-action-primary: #4ADE80;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #000000;
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: #EEEEEE;
  --dg-color-border-focused: #4ADE80;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #1A1A1A;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #000000;
  --dg-color-background-secondary: #F5F5F5;
  --dg-radii-app: 32px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 20px 40px rgba(0, 0, 0, 0.15);
  --dg-shadows-surface: 0px 10px 30px rgba(0, 0, 0, 0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: SF Pro Display, Inter, system-ui, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 34px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 41px;
  --dg-type-hero-title-size: 48px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 52px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 24px;
  --dg-type-metric-value-size: 42px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 48px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 400;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, SF Pro Display, Inter, system-ui, sans-serif)">
  <!-- Mint Green Header Block -->
  <div class="w-full h-[360px] bg-[var(--dg-color-action-primary)] rounded-b-[40px] relative flex flex-col px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)]">
    <!-- Top Navigation -->
    <div class="flex items-center justify-between w-full mt-4">
      <div class="flex items-center gap-3">
        <button class="w-12 h-12 rounded-full bg-black flex items-center justify-center text-white">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <span class="text-black font-semibold text-[17px]">Back</span>
      </div>
      <button class="w-12 h-12 rounded-full bg-black flex items-center justify-center text-white">
        <div class="grid grid-cols-2 gap-1">
          <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
          <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
          <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
          <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
        </div>
      </button>
    </div>

    <!-- Metric and Progress -->
    <div class="mt-auto mb-10">
      <div class="flex items-baseline justify-between mb-4">
        <h1 class="text-[64px] font-bold text-black leading-none tracking-tight">84%</h1>
        <span class="text-black font-medium text-[16px] opacity-80">Plan Expenses</span>
      </div>
      
      <!-- Custom Progress Bar -->
      <div class="w-full h-[64px] bg-white rounded-[24px] overflow-hidden flex p-1">
        <div class="h-full w-[70%] bg-black rounded-[20px]"></div>
        <div class="h-full flex-1 rounded-[20px] ml-1" style="background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px);"></div>
      </div>
    </div>
  </div>

  <!-- Transaction List Section -->
  <div class="flex-1 px-[var(--dg-mobile-layout-screen-margin)] pt-8 pb-4">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-white text-[20px] font-semibold">Expenses History</h2>
      <button class="text-white opacity-40">
        <i data-lucide="more-horizontal" class="w-6 h-6"></i>
      </button>
    </div>

    <!-- Transaction Items -->
    <div class="space-y-8">
      <!-- Item 1 -->
      <div class="flex items-start justify-between">
        <div class="space-y-1">
          <div class="flex items-baseline gap-1">
            <span class="text-white text-[32px] font-bold">$</span>
            <span class="text-white text-[32px] font-bold">420</span>
            <span class="text-white text-[20px] font-bold opacity-60">.00</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
            <span class="text-white opacity-60 text-[14px]">Entertainment</span>
          </div>
        </div>
        <div class="flex flex-col items-end gap-4">
          <div class="flex gap-4">
            <i data-lucide="share" class="w-5 h-5 text-white opacity-60"></i>
            <i data-lucide="arrow-up-right" class="w-5 h-5 text-white opacity-60"></i>
          </div>
          <span class="text-white opacity-40 text-[14px]">Today</span>
        </div>
      </div>

      <!-- Item 2 -->
      <div class="flex items-start justify-between">
        <div class="space-y-1">
          <div class="flex items-baseline gap-1">
            <span class="text-white text-[32px] font-bold">$</span>
            <span class="text-white text-[32px] font-bold">260</span>
            <span class="text-white text-[20px] font-bold opacity-60">.00</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-red-500"></div>
            <span class="text-white opacity-60 text-[14px]">Groceries</span>
          </div>
        </div>
        <div class="flex flex-col items-end gap-4">
          <div class="flex gap-4">
            <i data-lucide="share" class="w-5 h-5 text-white opacity-60"></i>
          </div>
          <span class="text-white opacity-40 text-[14px]">Yesterday</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Category Grid -->
  <div class="px-[var(--dg-mobile-layout-screen-margin)] pb-[var(--dg-mobile-layout-safe-area-bottom)] mt-4">
    <div class="grid grid-cols-2 gap-4">
      <!-- Food Card -->
      <div class="bg-[var(--dg-color-surface-modal)] rounded-[24px] p-5 h-[140px] flex flex-col justify-between relative">
        <div class="flex justify-between items-start">
          <div class="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center">
            <i data-lucide="utensils" class="w-5 h-5 text-white"></i>
          </div>
          <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
            <i data-lucide="arrow-up-right" class="w-4 h-4 text-white"></i>
          </button>
        </div>
        <span class="text-white text-[16px] font-medium">Food</span>
      </div>

      <!-- Income Card (Coral Red) -->
      <div class="bg-[var(--dg-color-accent-income)] rounded-[24px] p-5 h-[140px] flex flex-col justify-between relative">
        <div class="flex justify-between items-start">
          <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
            <i data-lucide="wallet" class="w-5 h-5 text-white"></i>
          </div>
          <button class="w-8 h-8 rounded-full bg-white flex items-center justify-center">
            <i data-lucide="arrow-up-right" class="w-4 h-4 text-black"></i>
          </button>
        </div>
        <span class="text-white text-[16px] font-medium">Income</span>
      </div>

      <!-- Car Card -->
      <div class="bg-[var(--dg-color-surface-modal)] rounded-[24px] p-5 h-[140px] flex flex-col justify-between relative">
        <div class="flex justify-between items-start">
          <div class="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center">
            <i data-lucide="car" class="w-5 h-5 text-white"></i>
          </div>
          <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
            <i data-lucide="arrow-up-right" class="w-4 h-4 text-white"></i>
          </button>
        </div>
        <span class="text-white text-[16px] font-medium">Transport</span>
      </div>

      <!-- Add Card -->
      <div class="bg-[var(--dg-color-surface-modal)] rounded-[24px] p-5 h-[140px] flex flex-col justify-between relative">
        <div class="flex justify-between items-start">
          <div class="w-10 h-10 rounded-full bg-black/40 flex items-center justify-center">
            <i data-lucide="plus" class="w-5 h-5 text-white"></i>
          </div>
          <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
            <i data-lucide="arrow-up-right" class="w-4 h-4 text-white"></i>
          </button>
        </div>
        <span class="text-white text-[16px] font-medium">Add Category</span>
      </div>
    </div>
  </div>
</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

    <style>

}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);

}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);

.dg-type-button-label {

      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }

  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, 'SF Pro Display', 'Inter', sans-serif)">
  
  <!-- Header -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <div class="w-[40px] h-[40px] rounded-full dg-bg-secondary flex items-center justify-center dg-shadow-surface" style="background-color: var(--dg-color-action-secondary)">
      <i data-lucide="user" class="w-[20px] h-[20px] text-[var(--dg-color-text-high-emphasis)]"></i>
    </div>
    <h1 class="text-[var(--dg-type-nav-title-size)] font-[var(--dg-type-nav-title-weight)] leading-[var(--dg-type-nav-title-line-height)]">Good morning, Kim!</h1>
    <div class="w-[40px] h-[40px] rounded-full dg-bg-secondary flex items-center justify-center dg-shadow-surface" style="background-color: var(--dg-color-action-secondary)">
      <i data-lucide="bell" class="w-[20px] h-[20px] text-[var(--dg-color-text-high-emphasis)]"></i>
    </div>
  </header>

  <!-- Main Scrollable Content -->
  <main class="flex-1 overflow-y-auto pb-[calc(var(--dg-sizing-bottom-nav-height)+32px)]">
    <div class="flex flex-col gap-[var(--dg-mobile-layout-section-gap)] px-[var(--dg-mobile-layout-screen-margin)]">
      
      <!-- Hero Card -->
      <section class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-xl)] dg-shadow-surface flex flex-col gap-[var(--dg-mobile-layout-element-gap)]" style="box-shadow: var(--dg-shadows-none); padding-top: var(--dg-spacing-md); padding-right: var(--dg-spacing-md); padding-bottom: var(--dg-spacing-md); padding-left: var(--dg-spacing-md); background-color: var(--dg-color-background-secondary)">
        <div class="flex flex-col gap-[var(--dg-spacing-xxs)]">
          <span class="text-[var(--dg-color-text-medium-emphasis)] text-[var(--dg-type-supporting-size)]">Total balance</span>
          <div class="flex items-center justify-between">
            <span class="text-[var(--dg-type-metric-value-size)] font-[var(--dg-type-metric-value-weight)] leading-[var(--dg-type-metric-value-line-height)]">$109,520.00</span>
            <div class="flex items-center gap-[var(--dg-spacing-xxs)] px-[var(--dg-spacing-xs)] py-[var(--dg-spacing-xxs)] rounded-[var(--dg-radii-pill)] bg-[#E8F8F0]">
              <i data-lucide="arrow-up-right" class="w-[12px] h-[12px] text-[var(--dg-color-action-success)]"></i>
              <span class="text-[var(--dg-color-action-success)] text-[var(--dg-type-caption-size)] font-bold">+14.5%</span>
            </div>
          </div>
        </div>

        <!-- Nested Sub-cards -->
        <div class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)] mt-[var(--dg-spacing-md)]">
          <div class="bg-[#F9F9F9] rounded-[20px] p-[var(--dg-spacing-md)] flex flex-col gap-[var(--dg-spacing-xxs)]" style="background-color: var(--dg-color-surface-card)">
            <span class="text-[var(--dg-color-text-low-emphasis)] text-[var(--dg-type-caption-size)]">Spending</span>
            <span class="text-[var(--dg-type-body-size)] font-bold">$2,750.00</span>
          </div>
          <div class="bg-[#F9F9F9] rounded-[20px] p-[var(--dg-spacing-md)] flex flex-col gap-[var(--dg-spacing-xxs)]" style="background-color: var(--dg-color-surface-card)">
            <span class="text-[var(--dg-color-text-low-emphasis)] text-[var(--dg-type-caption-size)]">Savings</span>
            <span class="text-[var(--dg-type-body-size)] font-bold">$15,000.00</span>
          </div>
        </div>
      </section>

      <!-- Action Rail -->
      <section class="flex overflow-x-auto no-scrollbar gap-[var(--dg-mobile-layout-element-gap)] -mx-[var(--dg-mobile-layout-screen-margin)] px-[var(--dg-mobile-layout-screen-margin)]" style="gap: var(--dg-spacing-md)">
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
          <div class="w-[60px] h-[40px] rounded-[var(--dg-radii-pill)] bg-[var(--dg-color-action-secondary)] flex items-center justify-center">
            <i data-lucide="send" class="w-[18px] h-[18px]"></i>
          </div>
          <span class="text-[var(--dg-type-caption-size)] font-medium">Send</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
          <div class="w-[60px] h-[40px] rounded-[var(--dg-radii-pill)] bg-[var(--dg-color-action-secondary)] flex items-center justify-center">
            <i data-lucide="download" class="w-[18px] h-[18px]"></i>
          </div>
          <span class="text-[var(--dg-type-caption-size)] font-medium">Request</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
          <div class="w-[60px] h-[40px] rounded-[var(--dg-radii-pill)] bg-[var(--dg-color-action-secondary)] flex items-center justify-center">
            <i data-lucide="credit-card" class="w-[18px] h-[18px]"></i>
          </div>
          <span class="text-[var(--dg-type-caption-size)] font-medium">Cards</span>
        </div>
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
          <div class="w-[60px] h-[40px] rounded-[var(--dg-radii-pill)] bg-[var(--dg-color-action-secondary)] flex items-center justify-center">
            <i data-lucide="more-horizontal" class="w-[18px] h-[18px]"></i>
          </div>
          <span class="text-[var(--dg-type-caption-size)] font-medium">More</span>
        </div>
      </section>

      <!-- Budget List -->
      <section class="flex flex-col gap-[var(--dg-mobile-layout-element-gap)]">
        <div class="flex items-center justify-between mb-[var(--dg-spacing-xxs)]">
          <h2 class="text-[var(--dg-type-section-title-size)] font-[var(--dg-type-section-title-weight)]">Monthly budget</h2>
          <span class="text-[var(--dg-color-text-low-emphasis)] text-[var(--dg-type-supporting-size)]">See all</span>
        </div>

        <!-- Budget Item 1 -->
        <div class="flex flex-col gap-[var(--dg-spacing-md)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[var(--dg-color-action-secondary)] flex items-center justify-center">
              <i data-lucide="shopping-bag" class="w-[20px] h-[20px] text-[var(--dg-color-text-medium-emphasis)]"></i>
            </div>
            <div class="flex-1 flex flex-col">
              <div class="flex justify-between items-center">
                <span class="text-[var(--dg-type-body-size)] font-semibold">Shopping</span>
                <span class="text-[var(--dg-type-body-size)] font-bold">$1,280</span>
              </div>
              <span class="text-[var(--dg-color-text-medium-emphasis)] text-[var(--dg-type-caption-size)]">$320 left from $1,600</span>
            </div>
          </div>
          <!-- Progress Bar with Red Glow -->
          <div class="w-full h-[12px] bg-[var(--dg-color-action-secondary)] rounded-full relative overflow-visible">
            <div class="absolute left-0 top-0 h-full w-[80%] bg-[var(--dg-color-action-error)] rounded-full" style="box-shadow: var(--dg-spacing-none) 0px 12px rgba(255, 59, 48, 0.6);"></div>
          </div>
        </div>

        <!-- Budget Item 2 -->
        <div class="flex flex-col gap-[var(--dg-spacing-md)] mt-[var(--dg-spacing-md)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[var(--dg-color-action-secondary)] flex items-center justify-center">
              <i data-lucide="car" class="w-[20px] h-[20px] text-[var(--dg-color-text-medium-emphasis)]"></i>
            </div>
            <div class="flex-1 flex flex-col">
              <div class="flex justify-between items-center">
                <span class="text-[var(--dg-type-body-size)] font-semibold">Transport</span>
                <span class="text-[var(--dg-type-body-size)] font-bold">$450</span>
              </div>
              <span class="text-[var(--dg-color-text-medium-emphasis)] text-[var(--dg-type-caption-size)]">$150 left from $600</span>
            </div>
          </div>
          <div class="w-full h-[12px] bg-[var(--dg-color-action-secondary)] rounded-full relative overflow-visible">
            <div class="absolute left-0 top-0 h-full w-[75%] bg-[var(--dg-color-action-error)] rounded-full" style="box-shadow: var(--dg-spacing-none) 0px 12px rgba(255, 59, 48, 0.6);"></div>
          </div>
        </div>

      </section>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-[24px] left-[20px] right-[20px] h-[72px] bg-white/70 backdrop-blur-2xl border border-white/40 rounded-[40px] flex items-center justify-around px-[var(--dg-spacing-md)] shadow-[0px_10px_30px_-5px_rgba(0,0,0,0.1),inset_0px_0px_0px_1px_rgba(255,255,255,0.5)]">
    <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] text-[var(--dg-color-text-high-emphasis)]">
      <i data-lucide="home" class="w-[24px] h-[24px]"></i>
      <span class="text-[10px] font-bold">Home</span>
    </div>
    <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] text-[var(--dg-color-text-low-emphasis)]">
      <i data-lucide="pie-chart" class="w-[24px] h-[24px]"></i>
      <span class="text-[10px] font-medium">Insights</span>
    </div>
    <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] text-[var(--dg-color-text-low-emphasis)]">
      <i data-lucide="credit-card" class="w-[24px] h-[24px]"></i>
      <span class="text-[10px] font-medium">Wallet</span>
    </div>
    <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] text-[var(--dg-color-text-low-emphasis)]">
      <i data-lucide="settings" class="w-[24px] h-[24px]"></i>
      <span class="text-[10px] font-medium">Settings</span>
    </div>
  </nav>

</div>

    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');

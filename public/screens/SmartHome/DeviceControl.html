<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
:root {
  --dg-color-text-low-emphasis: #BDBDBD;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #757575;
  --dg-color-action-primary: #E64A19;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #121212;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #EEEEEE;
  --dg-color-border-focused: #E64A19;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F8F8F8;
  --dg-color-background-secondary: #FFFFFF;
  --dg-radii-lg: 24px;
  --dg-radii-md: 16px;
  --dg-radii-sm: 8px;
  --dg-radii-xl: 32px;
  --dg-radii-pill: 9999px;
  --dg-radii-sharp: 0px;
  --dg-radii-app: 24px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-lg: 0 12px 32px rgba(0,0,0,0.08);
  --dg-shadows-md: 0 8px 24px rgba(0,0,0,0.06);
  --dg-shadows-sm: 0 2px 8px rgba(0,0,0,0.04);
  --dg-shadows-none: none;
  --dg-shadows-upward: 0 -4px 20px rgba(0,0,0,0.05);
  --dg-shadows-surface: 0 8px 24px rgba(0,0,0,0.06);
  --dg-shadows-overlay: 0 -4px 20px rgba(0,0,0,0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.10;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.40;
  --dg-typography-font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --dg-type-nav-title-size: 20px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 26px;
  --dg-type-screen-title-size: 20px;
  --dg-type-screen-title-weight: 600;
  --dg-type-screen-title-line-height: 26px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 26px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 34px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-none: 0px;
  --dg-border-widths-thin: 2px;
  --dg-border-widths-thick: 4px;
  --dg-border-widths-hairline: 1px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 16px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#F8F8F8] flex flex-col relative overflow-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  
  <!-- Header -->
  <header class="pt-[44px] px-[20px] flex items-center justify-between h-[100px]">
    <button class="w-[48px] h-[48px] flex items-center justify-start active:opacity-60 transition-opacity">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <h1 class="text-[20px] font-[600] text-[#1A1A1A] leading-[26px]">Air Conditioner</h1>
    <button class="w-[48px] h-[48px] flex items-center justify-end active:opacity-60 transition-opacity">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </header>

  <!-- Mode Segmented Control -->
  <section class="px-[20px] mt-[8px]">
    <div class="bg-[#EEEEEE] p-[4px] rounded-[16px] flex h-[52px]">
      <button class="flex-1 bg-[#FFFFFF] rounded-[12px] shadow-sm flex items-center justify-center gap-[8px] transition-all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E64A19" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20M12 2v20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/></svg>
        <span class="text-[14px] font-[600] text-[#1A1A1A]">Cool</span>
      </button>
      <button class="flex-1 flex items-center justify-center gap-[8px] active:opacity-60">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7z"/></svg>
        <span class="text-[14px] font-[500] text-[#757575]">Dry</span>
      </button>
      <button class="flex-1 flex items-center justify-center gap-[8px] active:opacity-60">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
        <span class="text-[14px] font-[500] text-[#757575]">Fan</span>
      </button>
    </div>
  </section>

  <!-- Temperature Dial Section -->
  <section class="flex-1 flex flex-col items-center justify-center py-[32px] relative">
    <div class="relative w-[280px] h-[280px] flex items-center justify-center">
      <!-- Arc SVG -->
      <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
        <!-- Background Track -->
        <circle cx="50" cy="50" r="42" fill="none" stroke="#EEEEEE" stroke-width="6" stroke-dasharray="132 264" stroke-linecap="round" transform="rotate(135 50 50)"/>
        <!-- Active Track -->
        <circle cx="50" cy="50" r="42" fill="none" stroke="#E64A19" stroke-width="6" stroke-dasharray="66 264" stroke-linecap="round" transform="rotate(135 50 50)"/>
        <!-- Handle -->
        <circle cx="50" cy="8" r="5" fill="#FFFFFF" stroke="#E64A19" stroke-width="2" transform="rotate(45 50 50)"/>
      </svg>
      
      <!-- Temperature Display -->
      <div class="text-center">
        <div class="text-[64px] font-[700] text-[#1A1A1A] leading-none tracking-tight">20°C</div>
        <div class="text-[16px] font-[500] text-[#757575] mt-[8px]">Cooling</div>
      </div>
    </div>

    <!-- Turn Off Slider -->
    <div class="mt-[32px] w-full px-[20px]">
      <div class="relative h-[64px] bg-[#121212] rounded-full flex items-center p-[6px] overflow-hidden">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <span class="text-[16px] font-[600] text-[#FFFFFF] opacity-90">Turn Off</span>
        </div>
        <div class="h-[52px] w-[52px] bg-[#FFFFFF] rounded-full flex items-center justify-center shadow-lg z-10">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#121212" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        </div>
        <div class="ml-auto pr-[16px] opacity-30">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>
    </div>
  </section>

  <!-- Schedule Card -->
  <section class="px-[20px] pb-[34px] mt-auto">
    <div class="bg-[#FFFFFF] rounded-[32px] p-[24px] shadow-sm">
      <div class="flex items-center justify-between mb-[24px]">
        <h2 class="text-[20px] font-[600] text-[#1A1A1A]">Schedule</h2>
        <!-- iOS Style Toggle -->
        <div class="w-[51px] h-[31px] bg-[#E64A19] rounded-full relative p-[2px] transition-colors">
          <div class="absolute right-[2px] top-[2px] w-[27px] h-[27px] bg-[#FFFFFF] rounded-full shadow-md"></div>
        </div>
      </div>

      <div class="space-y-[16px]">
        <!-- Lock At -->
        <div class="flex items-center justify-between py-[12px] border-b border-[#EEEEEE]">
          <div class="flex items-center gap-[12px]">
            <div class="w-[40px] h-[40px] bg-[#F8F8F8] rounded-[12px] flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <span class="text-[16px] font-[500] text-[#1A1A1A]">Lock at</span>
          </div>
          <div class="flex items-center gap-[8px]">
            <span class="text-[16px] font-[600] text-[#1A1A1A]">22:00</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </div>
        </div>

        <!-- Unlock From -->
        <div class="flex items-center justify-between py-[12px]">
          <div class="flex items-center gap-[12px]">
            <div class="w-[40px] h-[40px] bg-[#F8F8F8] rounded-[12px] flex items-center justify-center">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
            </div>
            <span class="text-[16px] font-[500] text-[#1A1A1A]">Unlock from</span>
          </div>
          <div class="flex items-center gap-[8px]">
            <span class="text-[16px] font-[600] text-[#1A1A1A]">07:00</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

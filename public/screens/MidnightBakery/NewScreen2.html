<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #666666;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #A1A1A1;
  --dg-color-action-primary: #E88D48;
  --dg-color-action-disabled: #2C2C2E;
  --dg-color-action-secondary: #FFFFFF;
  --dg-color-action-on-primary-text: #0F0F0F;
  --dg-color-border-divider: rgba(255, 255, 255, 0.08);
  --dg-color-border-focused: #E88D48;
  --dg-color-surface-card: #212124;
  --dg-color-surface-modal: #1C1C1E;
  --dg-color-surface-bottom-sheet: #161618;
  --dg-color-background-primary: #0F0F0F;
  --dg-color-background-secondary: #1A1A1A;
  --dg-radii-app: 28px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0 20px 50px rgba(0,0,0,0.8);
  --dg-shadows-surface: 0 10px 30px rgba(0,0,0,0.5);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.15;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: 'Outfit', 'Inter', sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 34px;
  --dg-type-screen-title-weight: 400;
  --dg-type-screen-title-line-height: 40px;
  --dg-type-hero-title-size: 48px;
  --dg-type-hero-title-weight: 500;
  --dg-type-hero-title-line-height: 52px;
  --dg-type-section-title-size: 24px;
  --dg-type-section-title-weight: 500;
  --dg-type-section-title-line-height: 30px;
  --dg-type-metric-value-size: 32px;
  --dg-type-metric-value-weight: 600;
  --dg-type-metric-value-line-height: 36px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 400;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 40px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, 'Outfit', 'Inter', sans-serif)">
  <!-- Header -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <h1 class="dg-type-screen-title">Your Bag</h1>
    <div class="w-12 h-12 rounded-full dg-bg-secondary flex items-center justify-center border border-[var(--dg-color-border-divider)]">
      <i data-lucide="shopping-bag" class="w-5 h-5 text-[var(--dg-color-action-primary)]"></i>
    </div>
  </header>

  <!-- Main Content Scroll Area -->
  <main class="flex-1 overflow-y-auto px-[var(--dg-mobile-layout-screen-margin)] pb-[calc(var(--dg-sizing-bottom-nav-height)+120px)]">
    <div class="flex flex-col gap-[var(--dg-mobile-layout-section-gap)]">
      
      <!-- Cart Items List -->
      <section class="flex flex-col gap-[var(--dg-mobile-layout-element-gap)]">
        <!-- Item 1 -->
        <div class="dg-surface-card dg-shadow-surface rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex gap-[var(--dg-spacing-md)] relative overflow-hidden">
          <div class="w-24 h-24 rounded-[20px] bg-[#2A2A2D] flex items-center justify-center overflow-hidden shrink-0">
            <img src="https://pub-7c8c3c7444724a39ba3eeb8accbbca4a.r2.dev/visual-assets/b8041495-1552-4079-9c20-80bd656e240f/display_1024.png" alt="Midnight Cocoa Cookie" class="w-20 h-20 object-contain rotate-12" />
          </div>
          <div class="flex flex-col justify-between flex-1 min-w-0">
            <div class="flex justify-between items-start">
              <div class="min-w-0">
                <h3 class="dg-type-body font-semibold truncate">Midnight Cocoa</h3>
                <p class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Double Dark Chocolate</p>
              </div>
              <button class="p-1 -mr-1 opacity-60 hover:opacity-100">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="flex items-center justify-between mt-2">
              <span class="dg-type-body font-bold text-[var(--dg-color-action-primary)]">$4.50</span>
              <div class="flex items-center bg-[var(--dg-color-background-primary)] rounded-full p-1 border border-[var(--dg-color-border-divider)]">
                <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[var(--dg-color-surface-card)]">
                  <i data-lucide="minus" class="w-3 h-3"></i>
                </button>
                <span class="px-3 dg-type-supporting">2</span>
                <button class="w-8 h-8 flex items-center justify-center rounded-full bg-[var(--dg-color-action-primary)] text-[var(--dg-color-action-on-primary-text)]">
                  <i data-lucide="plus" class="w-3 h-3"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Item 2 -->
        <div class="dg-surface-card dg-shadow-surface rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex gap-[var(--dg-spacing-md)] relative overflow-hidden">
          <div class="w-24 h-24 rounded-[20px] bg-[#2A2A2D] flex items-center justify-center overflow-hidden shrink-0">
            <img src="https://pub-7c8c3c7444724a39ba3eeb8accbbca4a.r2.dev/visual-assets/b8041495-1552-4079-9c20-80bd656e240f/display_1024.png" alt="Salted Caramel Cookie" class="w-20 h-20 object-contain -rotate-6 brightness-110 contrast-125" style="filter: hue-rotate(45deg);" />
          </div>
          <div class="flex flex-col justify-between flex-1 min-w-0">
            <div class="flex justify-between items-start">
              <div class="min-w-0">
                <h3 class="dg-type-body font-semibold truncate">Salted Caramel</h3>
                <p class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Sea Salt & Toffee</p>
              </div>
              <button class="p-1 -mr-1 opacity-60 hover:opacity-100">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
            <div class="flex items-center justify-between mt-2">
              <span class="dg-type-body font-bold text-[var(--dg-color-action-primary)]">$5.25</span>
              <div class="flex items-center bg-[var(--dg-color-background-primary)] rounded-full p-1 border border-[var(--dg-color-border-divider)]">
                <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[var(--dg-color-surface-card)]">
                  <i data-lucide="minus" class="w-3 h-3"></i>
                </button>
                <span class="px-3 dg-type-supporting">1</span>
                <button class="w-8 h-8 flex items-center justify-center rounded-full bg-[var(--dg-color-action-primary)] text-[var(--dg-color-action-on-primary-text)]">
                  <i data-lucide="plus" class="w-3 h-3"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Order Summary -->
      <section class="flex flex-col gap-[var(--dg-spacing-md)]">
        <h2 class="dg-type-section-title">Order Summary</h2>
        <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] flex flex-col gap-4">
          <div class="flex justify-between items-center">
            <span class="dg-type-body text-[var(--dg-color-text-medium-emphasis)]">Subtotal</span>
            <span class="dg-type-body font-medium">$14.25</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="dg-type-body text-[var(--dg-color-text-medium-emphasis)]">Delivery Fee</span>
            <span class="dg-type-body font-medium text-green-400">Free</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="dg-type-body text-[var(--dg-color-text-medium-emphasis)]">Estimated Tax</span>
            <span class="dg-type-body font-medium">$1.14</span>
          </div>
          <div class="h-px bg-[var(--dg-color-border-divider)] my-1"></div>
          <div class="flex justify-between items-center">
            <span class="dg-type-section-title text-[var(--dg-color-text-high-emphasis)]">Total</span>
            <span class="dg-type-metric-value text-[var(--dg-color-action-primary)]">$15.39</span>
          </div>
        </div>
      </section>

      <!-- Promo Code -->
      <section>
        <div class="flex items-center gap-3 bg-[var(--dg-color-background-secondary)] border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-app)] px-4 h-[var(--dg-sizing-standard-input-height)]">
          <i data-lucide="ticket" class="w-5 h-5 text-[var(--dg-color-text-low-emphasis)]"></i>
          <input type="text" placeholder="Promo code" class="bg-transparent border-none outline-none flex-1 dg-type-body text-[var(--dg-color-text-high-emphasis)] placeholder:text-[var(--dg-color-text-low-emphasis)]" />
          <button class="dg-type-button-label text-[var(--dg-color-action-primary)]">Apply</button>
        </div>
      </section>
    </div>
  </main>

  <!-- Bottom Action Bar (Floating Above Nav) -->
  <div class="fixed bottom-[calc(var(--dg-sizing-bottom-nav-height)+20px)] left-0 right-0 px-[var(--dg-mobile-layout-screen-margin)] z-20">
    <button class="w-full h-[var(--dg-sizing-standard-button-height)] bg-[var(--dg-color-action-primary)] text-[var(--dg-color-action-on-primary-text)] rounded-[var(--dg-radii-pill)] dg-shadow-overlay flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
      <span class="dg-type-button-label uppercase tracking-widest">Proceed to Checkout</span>
      <i data-lucide="arrow-right" class="w-5 h-5"></i>
    </button>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="fixed bottom-0 left-0 right-0 h-[var(--dg-sizing-bottom-nav-height)] bg-[var(--dg-color-action-on-primary-text)]/80 backdrop-blur-xl border-t border-[var(--dg-color-border-divider)] px-8 flex items-center justify-between z-30">
    <div class="flex flex-col items-center gap-1 opacity-40">
      <i data-lucide="home" class="w-6 h-6"></i>
      <span class="dg-type-caption">Home</span>
    </div>
    <div class="flex flex-col items-center gap-1 opacity-40">
      <i data-lucide="search" class="w-6 h-6"></i>
      <span class="dg-type-caption">Explore</span>
    </div>
    <div class="flex flex-col items-center gap-1 text-[var(--dg-color-action-primary)]">
      <div class="relative">
        <i data-lucide="shopping-bag" class="w-6 h-6"></i>
        <span class="absolute -top-1 -right-1 w-2 h-2 bg-[var(--dg-color-action-primary)] rounded-full"></span>
      </div>
      <span class="dg-type-caption font-bold">Cart</span>
    </div>
    <div class="flex flex-col items-center gap-1 opacity-40">
      <i data-lucide="star" class="w-6 h-6"></i>
      <span class="dg-type-caption">Premium</span>
    </div>
    <div class="flex flex-col items-center gap-1 opacity-40">
      <i data-lucide="user" class="w-6 h-6"></i>
      <span class="dg-type-caption">Profile</span>
    </div>
  </nav>
</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

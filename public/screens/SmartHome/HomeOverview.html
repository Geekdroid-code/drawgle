<!DOCTYPE html>
<html>
  <head>

    <style>
:root {
  --dg-color-text-low-emphasis: #BDBDBD;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #757575;
  --dg-color-action-primary: #E64A19;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #121212;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #EEEEEE;
  --dg-color-border-focused: #E64A19;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F8F8F8;
  --dg-color-background-secondary: #FFFFFF;
  --dg-radii-lg: 24px;
  --dg-radii-md: 16px;
  --dg-radii-sm: 8px;
  --dg-radii-xl: 32px;
  --dg-radii-pill: 9999px;
  --dg-radii-sharp: 0px;
  --dg-radii-app: 24px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-lg: 0 12px 32px rgba(0,0,0,0.08);
  --dg-shadows-md: 0 8px 24px rgba(0,0,0,0.06);
  --dg-shadows-sm: 0 2px 8px rgba(0,0,0,0.04);
  --dg-shadows-none: none;
  --dg-shadows-upward: 0 -4px 20px rgba(0,0,0,0.05);
  --dg-shadows-surface: 0 8px 24px rgba(0,0,0,0.06);
  --dg-shadows-overlay: 0 -4px 20px rgba(0,0,0,0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;

  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.40;
  --dg-typography-font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --dg-type-nav-title-size: 20px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 26px;
  --dg-type-screen-title-size: 20px;
  --dg-type-screen-title-weight: 600;
  --dg-type-screen-title-line-height: 26px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 26px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 34px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-none: 0px;
  --dg-border-widths-thin: 2px;
  --dg-border-widths-thick: 4px;
  --dg-border-widths-hairline: 1px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 16px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#F8F8F8] flex flex-col relative overflow-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  
  <!-- Header Section -->
  <header class="pt-[44px] px-[20px] flex items-center justify-between w-full">
    <div class="flex items-center gap-[12px]">
      <div class="w-[44px] h-[44px] rounded-full overflow-hidden bg-[#E0E0E0]">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=150&h=150" alt="User Avatar" class="w-full h-full object-cover" />
      </div>
      <div class="flex flex-col">
        <span class="text-[16px] font-[600] text-[#1A1A1A] leading-[20px]">Hi, Alex</span>
        <span class="text-[14px] font-[400] text-[#757575] leading-[20px]">Good evening</span>
      </div>
    </div>
    <div class="flex items-center gap-[12px]">
      <button class="w-[48px] h-[48px] flex items-center justify-center bg-white rounded-full shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>
      </button>
      <button class="w-[48px] h-[48px] flex items-center justify-center bg-white rounded-full shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
    </div>
  </header>

  <!-- Main Title -->
  <section class="mt-[24px] px-[20px]">
    <h1 class="text-[28px] font-[700] text-[#1A1A1A] leading-[34px] max-w-[240px]">
      Your Smart Home Overview
    </h1>
  </section>

  <!-- Room Tabs -->
  <section class="mt-[24px] overflow-x-auto no-scrollbar flex gap-[12px] px-[20px]">
    <button class="min-w-[60px] h-[48px] px-[20px] rounded-[9999px] bg-white text-[#757575] font-[600] text-[14px] flex items-center justify-center">
      All
    </button>
    <button class="min-w-[120px] h-[48px] px-[20px] rounded-[9999px] bg-[#E64A19] text-white font-[600] text-[14px] flex items-center justify-center">
      Living room
    </button>
    <button class="min-w-[100px] h-[48px] px-[20px] rounded-[9999px] bg-white text-[#757575] font-[600] text-[14px] flex items-center justify-center">
      Kitchen
    </button>
    <button class="min-w-[100px] h-[48px] px-[20px] rounded-[9999px] bg-white text-[#757575] font-[600] text-[14px] flex items-center justify-center">
      Bedroom
    </button>
  </section>

  <!-- Featured Device Card -->
  <section class="mt-[24px] px-[20px]">
    <div class="bg-white rounded-[32px] p-[24px] shadow-md relative overflow-hidden">
      <div class="flex justify-between items-start">
        <div>
          <h2 class="text-[20px] font-[600] text-[#1A1A1A] leading-[26px]">Living Room Light</h2>
          <p class="text-[14px] text-[#757575] mt-[4px]">Connected to Living Room</p>
        </div>
        <button class="w-[52px] h-[32px] bg-[#E64A19] rounded-full relative flex items-center px-[4px]">
          <div class="w-[24px] h-[24px] bg-white rounded-full ml-auto flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E64A19" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
          </div>
        </button>
      </div>

      <!-- Lamp Illustration -->
      <div class="flex justify-center my-[20px]">
        <div class="relative w-[160px] h-[180px] flex flex-col items-center">
          <!-- Lamp Shade -->
          <div class="w-[120px] h-[60px] bg-[#F5F1E6] rounded-t-[40px] rounded-b-[10px] border-b-[4px] border-[#E0D8C3] z-10"></div>
          <!-- Lamp Neck -->
          <div class="w-[4px] h-[80px] bg-[#1A1A1A]"></div>
          <!-- Lamp Base -->
          <div class="w-[60px] h-[10px] bg-[#1A1A1A] rounded-t-[10px]"></div>
          <!-- Glow Effect -->
          <div class="absolute top-[-10px] w-[140px] h-[140px] bg-[#E64A19] opacity-[0.05] blur-[40px] rounded-full"></div>
        </div>
      </div>

      <!-- Scene Presets -->
      <div class="flex justify-between items-center mt-[16px]">
        <div class="flex flex-col items-center gap-[8px]">
          <button class="w-[44px] h-[44px] rounded-full bg-[#F8F8F8] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
          <span class="text-[12px] font-[500] text-[#757575]">Morning</span>
        </div>
        <div class="flex flex-col items-center gap-[8px]">
          <button class="w-[44px] h-[44px] rounded-full bg-[#E64A19] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          </button>
          <span class="text-[12px] font-[500] text-[#1A1A1A]">Night Mood</span>
        </div>
        <div class="flex flex-col items-center gap-[8px]">
          <button class="w-[44px] h-[44px] rounded-full bg-[#F8F8F8] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a3.5 3.5 0 1 1-5.83-2.65 3.5 3.5 0 0 1-5.83-2.65 3.5 3.5 0 1 1 5.83-2.65 3.5 3.5 0 0 1 5.83 2.65A3.5 3.5 0 0 1 17.5 19z"></path></svg>
          </button>
          <span class="text-[12px] font-[500] text-[#757575]">Relax</span>
        </div>
        <div class="flex flex-col items-center gap-[8px]">
          <button class="w-[44px] h-[44px] rounded-full bg-[#F8F8F8] flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"></path><path d="m16.2 7.8 2.9-2.9"></path><path d="M18 12h4"></path><path d="m16.2 16.2 2.9 2.9"></path><path d="M12 18v4"></path><path d="m4.9 19.1 2.9-2.9"></path><path d="M2 12h4"></path><path d="m4.9 4.9 2.9 2.9"></path></svg>
          </button>
          <span class="text-[12px] font-[500] text-[#757575]">Focus</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Manage Devices Section -->
  <section class="mt-[32px] px-[20px] pb-[120px]">
    <div class="flex justify-between items-center mb-[16px]">
      <h3 class="text-[20px] font-[600] text-[#1A1A1A]">Manage your device</h3>
      <button class="w-[48px] h-[48px] bg-[#E64A19] rounded-full flex items-center justify-center shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>

    <!-- Device List Item -->
    <div class="bg-white rounded-[24px] p-[16px] flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-[16px]">
        <div class="w-[48px] h-[48px] bg-[#F8F8F8] rounded-[16px] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
        </div>
        <div>
          <h4 class="text-[16px] font-[600] text-[#1A1A1A]">Smart TV</h4>
          <p class="text-[14px] text-[#757575]">Samsung QLED 4K</p>
        </div>
      </div>
      <div class="flex items-center gap-[12px]">
        <span class="text-[14px] font-[600] text-[#1A1A1A]">84%</span>
        <button class="w-[44px] h-[24px] bg-[#E64A19] rounded-full relative flex items-center px-[3px]">
          <div class="w-[18px] h-[18px] bg-white rounded-full ml-auto"></div>
        </button>
      </div>
    </div>
  </section>

  <!-- Floating Bottom Navigation -->
  <nav class="fixed bottom-[34px] left-[20px] right-[20px] h-[72px] bg-[#121212] rounded-[32px] flex items-center justify-between px-[8px] z-[20] shadow-xl">

      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </button>
    <button class="w-[56px] h-[56px] flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>

    </button>
    <button class="w-[56px] h-[56px] flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </button>
  </nav>

  <!-- Custom Scrollbar Hide -->
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["var(--font-body)", "-apple-system", "BlinkMacSystemFont", "sans-serif"]
            },
            colors: {
              background: "var(--background)",
              muted: {
                DEFAULT: "var(--muted)",
                foreground: "var(--muted-foreground)"
              },
              card: {
                DEFAULT: "var(--card)",
                foreground: "var(--foreground)"
              },
              popover: {
                DEFAULT: "var(--popover)",
                foreground: "var(--foreground)"
              },
              foreground: "var(--foreground)",
              primary: {
                DEFAULT: "var(--primary)",
                foreground: "var(--primary-foreground)"
              },
              secondary: "var(--secondary)",
              border: "var(--border)",
              "low-foreground": "var(--low-foreground)",
              tint: {
                blue: "var(--tint-blue)",
                orange: "var(--tint-orange)",
                cyan: "var(--tint-cyan)",
                purple: "var(--tint-purple)",
                gray: "var(--surface-muted)"
              }
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)"
            },
            spacing: {
              "screen-margin": "var(--screen-margin)",
              "section-gap": "var(--section-gap)",
              "element-gap": "var(--element-gap)"
            },
            boxShadow: {
              surface: "var(--shadow-surface)",
              overlay: "var(--shadow-overlay)"
            },
            fontSize: {
              "nav-title": ["var(--nav-title-size)", { lineHeight: "var(--nav-title-line-height)" }],
              "screen-title": ["var(--screen-title-size)", { lineHeight: "var(--screen-title-line-height)" }],
              "hero-title": ["var(--hero-title-size)", { lineHeight: "var(--hero-title-line-height)" }],
              "section-title": ["var(--section-title-size)", { lineHeight: "var(--section-title-line-height)" }],
              "metric-value": ["var(--metric-value-size)", { lineHeight: "var(--metric-value-line-height)" }],
              body: ["var(--body-size)", { lineHeight: "var(--body-line-height)" }],
              supporting: ["var(--supporting-size)", { lineHeight: "var(--supporting-line-height)" }],
              caption: ["var(--caption-size)", { lineHeight: "var(--caption-line-height)" }],
              "button-label": ["var(--button-label-size)", { lineHeight: "var(--button-label-line-height)" }]
            },
            fontWeight: {
              "nav-title": "var(--nav-title-weight)",
              "screen-title": "var(--screen-title-weight)",
              "hero-title": "var(--hero-title-weight)",
              "section-title": "var(--section-title-weight)",
              "metric-value": "var(--metric-value-weight)",
              body: "var(--body-weight)",
              supporting: "var(--supporting-weight)",
              caption: "var(--caption-weight)",
              "button-label": "var(--button-label-weight)"
            }
          }
        }
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --low-foreground: #999999;
  --foreground: #000000;
  --muted-foreground: #666666;
  --primary: #10B981;
  --action-disabled: #E5E7EB;
  --secondary: #000000;
  --primary-foreground: #FFFFFF;
  --border: #E5E7EB;
  --ring: #10B981;
  --card: #FFFFFF;
  --popover: #FFFFFF;
  --card: #FFFFFF;
  --background: #F2F2F2;
  --muted: #F9F9F9;
  --radius: 24px;
  --radius-pill: 9999px;
  --icon-small: 18px;
  --icon-standard: 24px;
  --min-touch-target: 48px;
  --bottom-nav-height: 84px;
  --standard-input-height: 52px;
  --standard-button-height: 56px;
  --shadow-none: none;
  --shadow-overlay: 0px 20px 50px rgba(0, 0, 0, 0.12);
  --shadow-surface: 0px 18px 48px -18px rgba(15, 23, 42, 0.18);
  --spacing-none: 0px;
  --spacing-lg: 24px;
  --spacing-md: 16px;
  --spacing-sm: 12px;
  --spacing-xl: 32px;
  --spacing-xs: 8px;
  --spacing-xxl: 48px;
  --spacing-xxs: 4px;
  --z-index-base: 0;
  --z-index-bottom-nav: 20;
  --z-index-bottom-sheet: 30;
  --z-index-modal-dialog: 40;
  --z-index-sticky-header: 10;
  --z-index-toast-snackbar: 50;
  --opacity-opaque: 1;
  --opacity-pressed: 0.12;
  --opacity-disabled: 0.38;
  --opacity-transparent: 0;
  --opacity-scrim-overlay: 0.50;
  --font-body: SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif;
  --nav-title-size: 17px;
  --nav-title-weight: 600;
  --nav-title-line-height: 22px;
  --screen-title-size: 24px;
  --screen-title-weight: 700;
  --screen-title-line-height: 30px;
  --hero-title-size: 48px;
  --hero-title-weight: 700;
  --hero-title-line-height: 56px;
  --section-title-size: 18px;
  --section-title-weight: 600;
  --section-title-line-height: 24px;
  --metric-value-size: 14px;
  --metric-value-weight: 600;
  --metric-value-line-height: 18px;
  --body-size: 16px;
  --body-weight: 400;
  --body-line-height: 24px;
  --supporting-size: 14px;
  --supporting-weight: 500;
  --supporting-line-height: 20px;
  --caption-size: 12px;
  --caption-weight: 400;
  --caption-line-height: 16px;
  --button-label-size: 16px;
  --button-label-weight: 600;
  --button-label-line-height: 20px;
  --border-widths-standard: 1px;
  --element-gap: 16px;
  --section-gap: 32px;
  --safe-area-top: 16px;
  --screen-margin: 20px;
  --safe-area-bottom: 16px;
  --tint-blue: #F0F7FF;
  --tint-orange: #FFF7F0;
  --tint-cyan: #F0FBFF;
  --tint-purple: #F9F5FF;
  --surface-muted: #F5F5F5;
}

html, body { margin: 0; min-height: 100%; }
body {
  font-family: var(--font-body), -apple-system, sans-serif;
  background: var(--background);
  color: var(--foreground);
}
#drawgle-export-root {
  position: relative;
  min-height: 100vh;
  overflow-x: hidden;
  background: var(--background);
}
#drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
#drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-background text-foreground flex flex-col relative overflow-x-hidden">
  <!-- Header Section -->
  <header class="flex items-center justify-between px-[var(--screen-margin)] pt-[calc(var(--safe-area-top)+12px)] pb-[var(--element-gap)] bg-card">
    <h1 class="text-screen-title font-screen-title text-foreground">Welcome back, Hakim!</h1>
    <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-[#E8E8E8] shadow-inner">
      <i data-lucide="bell" class="w-[var(--supporting-line-height)] h-[var(--supporting-line-height)] text-foreground"></i>
    </button>
  </header>

  <!-- Main Content Scrollable Area -->
  <main class="flex-1 flex flex-col gap-[var(--section-gap)] px-[var(--screen-margin)] pb-[calc(var(--safe-area-bottom)+116px)] bg-card">
    
    <!-- Primary Timer Card -->
    <section class="rounded-lg p-[var(--spacing-md)] flex flex-col items-center shadow-none bg-muted">
      <!-- Task Header Row -->
      <div class="w-full flex items-center justify-between mb-[var(--spacing-xl)]">
        <div class="flex items-center gap-[var(--spacing-md)]">
          <div class="w-[40px] h-[40px] rounded-xl bg-[#EEF2FF] flex items-center justify-center">
            <i data-lucide="mouse-pointer-2" class="w-[var(--supporting-line-height)] h-[var(--supporting-line-height)] text-[#4F46E5]"></i>
          </div>
          <div class="flex flex-col">
            <span class="text-supporting font-supporting text-foreground font-semibold">Wireframing Crypto Wallet</span>
            <div class="flex items-center gap-[var(--spacing-xs)]">
              <div class="flex items-center gap-[2px]">
                <i data-lucide="refresh-cw" class="w-[10px] h-[10px] text-low-foreground"></i>
                <span class="text-caption font-caption text-low-foreground">3/5</span>
              </div>
              <div class="w-[3px] h-[3px] rounded-full bg-[var(--low-foreground)]"></div>
              <div class="flex items-center gap-[2px]">
                <i data-lucide="clock" class="w-[10px] h-[10px] text-low-foreground"></i>
                <span class="text-caption font-caption text-low-foreground">25/125 mins</span>
              </div>
            </div>
          </div>
        </div>
        <button class="w-[var(--spacing-xl)] h-[var(--spacing-xl)] flex items-center justify-center rounded-full bg-muted">
          <i data-lucide="chevron-down" class="w-[var(--spacing-md)] h-[var(--spacing-md)] text-muted-foreground"></i>
        </button>
      </div>

      <!-- Timer Gauge Visualization -->
      <div class="relative w-[240px] h-[240px] flex items-center justify-center mb-[var(--spacing-md)]">
        <!-- Background Track -->
        <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="44" fill="none" stroke="#F2F2F2" stroke-width="8" stroke-linecap="round"></circle>
          <!-- Active Progress Arc -->
          <circle cx="50" cy="50" r="44" fill="none" stroke="var(--primary)" stroke-width="8" stroke-linecap="round" stroke-dasharray="200 276"></circle>
          <!-- Progress Handle -->
          <circle cx="94" cy="50" r="4" fill="var(--primary)" transform="rotate(260 50 50)"></circle>
        </svg>
        
        <!-- Inner Dashed Clock Face -->
        <div class="absolute inset-[var(--screen-title-line-height)] rounded-full border-[var(--border-widths-standard)] border-dashed border-[var(--action-disabled)]"></div>
        
        <!-- Clock Markers (Manual SVG for precision) -->
        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
          <line x1="50" y1="12" x2="50" y2="16" stroke="#E5E7EB" stroke-width="1"></line>
          <line x1="50" y1="84" x2="50" y2="88" stroke="#E5E7EB" stroke-width="1"></line>
          <line x1="12" y1="50" x2="16" y2="50" stroke="#E5E7EB" stroke-width="1"></line>
          <line x1="84" y1="50" x2="88" y2="50" stroke="#E5E7EB" stroke-width="1"></line>
        </svg>

        <!-- Timer Value -->
        <div class="flex flex-col items-center z-10">
          <span class="text-[var(--min-touch-target)] font-bold tracking-tight leading-none text-foreground">14:32</span>
          <span class="text-caption font-caption text-low-foreground mt-2">Back to the Zone</span>
        </div>
      </div>

      <!-- Playback Controls -->
      <div class="w-full flex items-center justify-between px-[var(--spacing-md)] mt-[var(--spacing-md)]">
        <div class="flex items-center gap-[var(--spacing-md)]">
          <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-muted">
            <i data-lucide="maximize-2" class="w-[var(--icon-small)] h-[var(--icon-small)] text-muted-foreground"></i>
          </button>
          <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-muted">
            <i data-lucide="rotate-ccw" class="w-[var(--icon-small)] h-[var(--icon-small)] text-muted-foreground"></i>
          </button>
        </div>

        <button class="w-[64px] h-[64px] flex items-center justify-center rounded-full bg-primary shadow-[0_8px_20px_rgba(16,185,129,0.3)]">
          <i data-lucide="play" class="w-[28px] h-[28px] text-white fill-current"></i>
        </button>

        <div class="flex items-center gap-[var(--spacing-md)]">
          <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-muted">
            <i data-lucide="skip-forward" class="w-[var(--icon-small)] h-[var(--icon-small)] text-muted-foreground"></i>
          </button>
          <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-muted">
            <i data-lucide="music" class="w-[var(--icon-small)] h-[var(--icon-small)] text-muted-foreground"></i>
          </button>
        </div>
      </div>
    </section>

    <!-- Recents Task Section -->
    <section class="flex flex-col gap-[var(--element-gap)]">
      <div class="flex items-center justify-between">
        <h2 class="text-section-title font-section-title text-foreground">Recents Task</h2>
        <button class="text-supporting font-supporting text-[var(--primary)] font-semibold border-b border-primary">View All</button>
      </div>

      <!-- Task List -->
      <div class="flex flex-col gap-[var(--spacing-md)]">
        <!-- Task Item 1 -->
        <div class="rounded-lg p-[var(--spacing-md)] flex items-center justify-between shadow-none bg-muted">
          <div class="flex items-center gap-[var(--spacing-md)]">
            <div class="w-[44px] h-[44px] rounded-2xl bg-[#ECFDF5] flex items-center justify-center">
              <i data-lucide="layout" class="w-[var(--supporting-line-height)] h-[var(--supporting-line-height)] text-[var(--primary)]"></i>
            </div>
            <div class="flex flex-col">
              <span class="text-body font-body font-semibold text-foreground">Spark Pixel Branding Asset...</span>
              <div class="flex items-center gap-[var(--spacing-xs)]">
                <div class="flex items-center gap-[2px]">
                  <i data-lucide="refresh-cw" class="w-[10px] h-[10px] text-low-foreground"></i>
                  <span class="text-caption font-caption text-low-foreground">1/6</span>
                </div>
                <div class="w-[3px] h-[3px] rounded-full bg-[var(--low-foreground)]"></div>
                <div class="flex items-center gap-[2px]">
                  <i data-lucide="clock" class="w-[10px] h-[10px] text-low-foreground"></i>
                  <span class="text-caption font-caption text-low-foreground">20/120 mins</span>
                </div>
              </div>
            </div>
          </div>
          <button class="w-[var(--spacing-xl)] h-[var(--spacing-xl)] flex items-center justify-center rounded-full bg-muted">
            <i data-lucide="play" class="w-[var(--metric-value-size)] h-[var(--metric-value-size)] text-foreground fill-current"></i>
          </button>
        </div>

        <!-- Task Item 2 -->
        <div class="rounded-lg p-[var(--spacing-md)] flex items-center justify-between shadow-none bg-muted">
          <div class="flex items-center gap-[var(--spacing-md)]">
            <div class="w-[44px] h-[44px] rounded-2xl bg-[#FFF7ED] flex items-center justify-center">
              <i data-lucide="activity" class="w-[var(--supporting-line-height)] h-[var(--supporting-line-height)] text-[#F97316]"></i>
            </div>
            <div class="flex flex-col">
              <span class="text-body font-body font-semibold text-foreground">User Flow for Fitness App</span>
              <div class="flex items-center gap-[var(--spacing-xs)]">
                <div class="flex items-center gap-[2px]">
                  <i data-lucide="refresh-cw" class="w-[10px] h-[10px] text-low-foreground"></i>
                  <span class="text-caption font-caption text-low-foreground">1/4</span>
                </div>
                <div class="w-[3px] h-[3px] rounded-full bg-[var(--low-foreground)]"></div>
                <div class="flex items-center gap-[2px]">
                  <i data-lucide="clock" class="w-[10px] h-[10px] text-low-foreground"></i>
                  <span class="text-caption font-caption text-low-foreground">25/100 mins</span>
                </div>
              </div>
            </div>
          </div>
          <button class="w-[var(--spacing-xl)] h-[var(--spacing-xl)] flex items-center justify-center rounded-full bg-muted">
            <i data-lucide="play" class="w-[var(--metric-value-size)] h-[var(--metric-value-size)] text-foreground fill-current"></i>
          </button>
        </div>
      </div>
    </section>
  </main>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav="" class="dg-nav-shell">
<div class="dg-nav-shell-inner">
<button type="button" class="dg-nav-item" data-nav-item-id="home">Home</button>
</div>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === "function") window.lucide.createIcons();
      document.querySelectorAll("[data-nav-item-id]").forEach(function(item) {
        var active = item.getAttribute("data-nav-item-id") === "home";
        item.setAttribute("data-active", active ? "true" : "false");
        item.setAttribute("aria-current", active ? "page" : "false");
      });
    </script>
  </body>
</html>

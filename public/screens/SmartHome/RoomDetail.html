<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
:root {
  --dg-color-text-low-emphasis: #BDBDBD;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #757575;
  --dg-color-action-primary: #E64A19;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #121212;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #EEEEEE;
  --dg-color-border-focused: #E64A19;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F8F8F8;
  --dg-color-background-secondary: #FFFFFF;
  --dg-radii-lg: 24px;
  --dg-radii-md: 16px;
  --dg-radii-sm: 8px;
  --dg-radii-xl: 32px;
  --dg-radii-pill: 9999px;
  --dg-radii-sharp: 0px;
  --dg-radii-app: 24px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-lg: 0 12px 32px rgba(0,0,0,0.08);
  --dg-shadows-md: 0 8px 24px rgba(0,0,0,0.06);
  --dg-shadows-sm: 0 2px 8px rgba(0,0,0,0.04);
  --dg-shadows-none: none;
  --dg-shadows-upward: 0 -4px 20px rgba(0,0,0,0.05);
  --dg-shadows-surface: 0 8px 24px rgba(0,0,0,0.06);
  --dg-shadows-overlay: 0 -4px 20px rgba(0,0,0,0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.10;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.40;
  --dg-typography-font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --dg-type-nav-title-size: 20px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 26px;
  --dg-type-screen-title-size: 20px;
  --dg-type-screen-title-weight: 600;
  --dg-type-screen-title-line-height: 26px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 26px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 34px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-none: 0px;
  --dg-border-widths-thin: 2px;
  --dg-border-widths-thick: 4px;
  --dg-border-widths-hairline: 1px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 16px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#F8F8F8] flex flex-col relative overflow-hidden" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  
  <!-- Header -->
  <header class="pt-[44px] px-[20px] flex items-center justify-between bg-[#F8F8F8] z-[10]">
    <button class="min-w-[48px] min-h-[48px] flex items-center justify-start" aria-label="Go back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <h1 class="text-[20px] font-[600] text-[#1A1A1A] leading-[26px]">Living Room</h1>
    <button class="min-w-[48px] min-h-[48px] flex items-center justify-end" aria-label="More options">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
      </svg>
    </button>
  </header>

  <!-- Main Content Scrollable Area -->
  <main class="flex-1 overflow-y-auto px-[20px] pb-[34px]">
    
    <!-- Camera Preview Section -->
    <section class="mt-[24px]">
      <div class="relative w-full aspect-[4/3] rounded-[32px] overflow-hidden shadow-[0_8px_24px_rgba(0,0,0,0.06)] bg-[#121212]">
        <!-- Placeholder for Camera Stream -->
        <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&q=80&w=800" alt="Living Room Camera" class="w-full h-full object-cover opacity-90" />
        
        <!-- Camera Overlays -->
        <div class="absolute top-[16px] left-[16px]">
          <div class="bg-[#E64A19] text-white text-[10px] font-[700] px-[8px] py-[2px] rounded-[4px] flex items-center gap-[4px]">
            <span class="w-[6px] h-[6px] bg-white rounded-full animate-pulse"></span>
            LIVE
          </div>
        </div>

        <div class="absolute top-[16px] right-[16px] flex flex-col gap-[12px]">
          <button class="w-[36px] h-[36px] bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          </button>
          <button class="w-[36px] h-[36px] bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <div class="absolute bottom-[16px] right-[16px]">
          <div class="bg-black/30 backdrop-blur-md text-white text-[12px] px-[10px] py-[4px] rounded-full border border-white/10">
            1080p HD
          </div>
        </div>
      </div>
    </section>

    <!-- My Devices Section -->
    <section class="mt-[32px]">
      <div class="flex items-center justify-between mb-[16px]">
        <h2 class="text-[20px] font-[600] text-[#1A1A1A] leading-[26px]">My Devices</h2>
        <button class="text-[14px] font-[600] text-[#E64A19]">Add New</button>
      </div>

      <div class="grid grid-cols-2 gap-[16px]">
        
        <!-- Air Conditioner -->
        <div class="bg-[#FFFFFF] rounded-[32px] p-[16px] shadow-[0_8px_24px_rgba(0,0,0,0.04)] flex flex-col justify-between min-h-[160px]">
          <div class="flex justify-between items-start">
            <div class="w-[40px] h-[40px] bg-[#F8F8F8] rounded-[12px] flex items-center justify-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E64A19" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 3.5 3.5L18 14.4V17a2 2 0 0 1-2 2h-2.6l-3.2 3.2a2.5 2.5 0 1 1-3.5-3.5L9.9 15.5V13a2 2 0 0 1 2-2h2.6l3.2-3.3Z"/><path d="m9.5 14.5 5-5"/></svg>
            </div>
            <div class="w-[44px] h-[24px] bg-[#E64A19] rounded-full relative flex items-center px-[2px] cursor-pointer">
              <div class="w-[20px] h-[20px] bg-white rounded-full shadow-sm translate-x-[20px]"></div>
            </div>
          </div>
          <div class="mt-[12px]">
            <p class="text-[16px] font-[600] text-[#1A1A1A] leading-[22px]">Air Conditioner</p>
            <p class="text-[14px] text-[#757575] leading-[20px]">On - 24°C</p>
          </div>
        </div>

        <!-- Smart Light -->
        <div class="bg-[#FFFFFF] rounded-[32px] p-[16px] shadow-[0_8px_24px_rgba(0,0,0,0.04)] flex flex-col justify-between min-h-[160px]">
          <div class="flex justify-between items-start">
            <div class="w-[40px] h-[40px] bg-[#F8F8F8] rounded-[12px] flex items-center justify-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
            </div>
            <div class="w-[44px] h-[24px] bg-[#E0E0E0] rounded-full relative flex items-center px-[2px] cursor-pointer">
              <div class="w-[20px] h-[20px] bg-white rounded-full shadow-sm translate-x-0"></div>
            </div>
          </div>
          <div class="mt-[12px]">
            <p class="text-[16px] font-[600] text-[#1A1A1A] leading-[22px]">Smart Light</p>
            <p class="text-[14px] text-[#757575] leading-[20px]">Off</p>
          </div>
        </div>

        <!-- Door Lock -->
        <div class="bg-[#FFFFFF] rounded-[32px] p-[16px] shadow-[0_8px_24px_rgba(0,0,0,0.04)] flex flex-col justify-between min-h-[160px]">
          <div class="flex justify-between items-start">
            <div class="w-[40px] h-[40px] bg-[#F8F8F8] rounded-[12px] flex items-center justify-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E64A19" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div class="w-[44px] h-[24px] bg-[#E64A19] rounded-full relative flex items-center px-[2px] cursor-pointer">
              <div class="w-[20px] h-[20px] bg-white rounded-full shadow-sm translate-x-[20px]"></div>
            </div>
          </div>
          <div class="mt-[12px]">
            <p class="text-[16px] font-[600] text-[#1A1A1A] leading-[22px]">Door Lock</p>
            <p class="text-[14px] text-[#757575] leading-[20px]">Locked</p>
          </div>
        </div>

        <!-- Air Purifier -->
        <div class="bg-[#FFFFFF] rounded-[32px] p-[16px] shadow-[0_8px_24px_rgba(0,0,0,0.04)] flex flex-col justify-between min-h-[160px]">
          <div class="flex justify-between items-start">
            <div class="w-[40px] h-[40px] bg-[#F8F8F8] rounded-[12px] flex items-center justify-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E64A19" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="M2 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="M12 22v-4"/><path d="m19.07 19.07-2.83-2.83"/><path d="M22 12h-4"/><path d="m19.07 4.93-2.83 2.83"/></svg>
            </div>
            <div class="w-[44px] h-[24px] bg-[#E64A19] rounded-full relative flex items-center px-[2px] cursor-pointer">
              <div class="w-[20px] h-[20px] bg-white rounded-full shadow-sm translate-x-[20px]"></div>
            </div>
          </div>
          <div class="mt-[12px]">
            <p class="text-[16px] font-[600] text-[#1A1A1A] leading-[22px]">Air Purifier</p>
            <p class="text-[14px] text-[#757575] leading-[20px]">On - Auto</p>
          </div>
        </div>

      </div>
    </section>

    <!-- Scene Presets (Bonus for detail view depth) -->
    <section class="mt-[32px]">
      <h2 class="text-[20px] font-[600] text-[#1A1A1A] leading-[26px] mb-[16px]">Quick Scenes</h2>
      <div class="flex gap-[12px] overflow-x-auto pb-[8px] no-scrollbar">
        <button class="flex-shrink-0 px-[20px] py-[12px] bg-[#121212] text-white rounded-full text-[14px] font-[600]">Movie Night</button>
        <button class="flex-shrink-0 px-[20px] py-[12px] bg-white text-[#1A1A1A] border border-[#EEEEEE] rounded-full text-[14px] font-[600]">Reading</button>
        <button class="flex-shrink-0 px-[20px] py-[12px] bg-white text-[#1A1A1A] border border-[#EEEEEE] rounded-full text-[14px] font-[600]">Relaxing</button>
      </div>
    </section>

  </main>

  <!-- Bottom Safe Area Spacer -->
  <div class="h-[34px] w-full bg-[#F8F8F8]"></div>

</div>

<style>
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
</style>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

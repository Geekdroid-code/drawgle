<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
:root {
  --dg-color-text-low-emphasis: #A0A4AB;
  --dg-color-text-high-emphasis: #1A1C1E;
  --dg-color-text-medium-emphasis: #60646C;
  --dg-color-action-primary: #FFD93D;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #6BCBFF;
  --dg-color-action-on-primary-text: #1A1C1E;
  --dg-color-border-divider: #F0F0F0;
  --dg-color-border-focused: #FF6B6B;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #FDFCF8;
  --dg-color-background-secondary: #F5F7FA;
  --dg-radii-app: 28px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 20px 40px rgba(0, 0, 0, 0.08);
  --dg-shadows-surface: 0px 10px 30px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Quicksand', 'Comfortaa', sans-serif;
  --dg-type-nav-title-size: 18px;
  --dg-type-nav-title-weight: 700;
  --dg-type-nav-title-line-height: 24px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 32px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 40px;
  --dg-type-section-title-size: 16px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 22px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 34px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 500;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 700;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 28px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Quicksand', 'Comfortaa', sans-serif">
  <!-- Top Header / Safe Area -->
  <div class="pt-[var(--dg-mobile-layout-safe-area-top)] px-[var(--dg-mobile-layout-screen-margin)] flex justify-between items-center z-20">
    <div class="flex flex-col">
      <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Good morning!</span>
      <h1 class="dg-type-screen-title" style="font-family: 'Comfortaa', sans-serif;">Pet Base</h1>
    </div>
    <button class="w-[48px] h-[48px] flex items-center justify-center dg-surface-card border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)]">
      <i data-lucide="bell" class="w-6 h-6"></i>
    </button>
  </div>

  <!-- Main Content Scroll Area -->
  <div class="flex-1 flex flex-col px-[var(--dg-mobile-layout-screen-margin)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+112px)]">
    
    <!-- Hero Section with Organic Blob -->
    <div class="relative w-full flex flex-col items-center pt-8 pb-4">
      <!-- Organic Sky Blue Blob Background -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[320px] h-[280px] opacity-80 z-0" style="background-color: var(--dg-color-action-secondary); clip-path: url(#blob-shape); filter: blur(20px);">
        <svg width="0" height="0">
          <defs>
            <clipPath id="blob-shape" clipPathUnits="objectBoundingBox">
              <path d="M0.8,0.2 C0.9,0.4 1,0.6 0.9,0.8 C0.8,1 0.6,0.9 0.4,0.9 C0.2,0.9 0,0.8 0,0.6 C0,0.4 0.1,0.2 0.3,0.1 C0.5,-0.1 0.7,0 0.8,0.2"></path>
            </clipPath>
          </defs>
        </svg>
      </div>

      <!-- Bouncy Pet Avatar -->
      <div class="relative z-10 flex flex-col items-center group cursor-pointer">
        <div class="w-[220px] h-[220px] relative transition-transform duration-300 active:scale-95 active:skew-x-2">
          <img 
            src="https://pub-7c8c3c7444724a39ba3eeb8accbbca4a.r2.dev/user-image-assets/3a503767-6092-4e8e-973e-7f39ebf7e270/03705390-120d-4374-8a6f-0257e3dce934/69713c2d-7181-4fcc-98ed-faaff1b79a61-puppy.png.png" 
            alt="Happy Golden Retriever" 
            class="w-full h-full object-contain drop-shadow-[0_8px_0_rgba(0,0,0,0.05)]" />
        </div>
        <div class="mt-[-20px] px-6 py-2 dg-surface-card border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-pill)] shadow-[var(--dg-shadows-overlay)]">
          <h2 class="dg-type-hero-title text-[28px] leading-none" style="font-family: 'Comfortaa', sans-serif;">Cooper</h2>
        </div>
      </div>
    </div>

    <!-- Quick Stats Row -->
    <div class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)] mt-[var(--dg-mobile-layout-section-gap)]">
      <!-- Mood Meter Card -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] flex flex-col items-center gap-2" style="border-width: var(--dg-border-widths-standard)">
        <div class="relative w-16 h-16 flex items-center justify-center">
          <!-- Hand-drawn stroke progress ring -->
          <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#F0F0F0" stroke-width="3" stroke-linecap="round" />
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#FF6B6B" stroke-width="3" stroke-dasharray="85, 100" stroke-linecap="round" style="filter: drop-shadow(0px 0px 2px rgba(255,107,107,0.5));" />
          </svg>
          <span class="absolute dg-type-caption font-bold">85%</span>
        </div>
        <span class="dg-type-section-title text-sm">Mood Meter</span>
      </div>

      <!-- Smiling Food Bowl Status Card -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] flex flex-col items-center gap-2 relative overflow-hidden" style="border-width: var(--dg-border-widths-standard)">
        <!-- Wiggle animation container for overdue feeding -->
        <div class="animate-[bounce_2s_infinite] flex items-center justify-center">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 36C8 31.5817 11.5817 28 16 28H32C36.4183 28 40 31.5817 40 36V40H8V36Z" fill="#FFD93D" stroke="#1A1C1E" stroke-width="2"/>
            <circle cx="18" cy="34" r="1.5" fill="#1A1C1E"/>
            <circle cx="30" cy="34" r="1.5" fill="#1A1C1E"/>
            <path d="M21 37C21 37 22.5 38.5 24 38.5C25.5 38.5 27 37 27 37" stroke="#1A1C1E" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 28L14 22M36 28L34 22" stroke="#1A1C1E" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="dg-type-section-title text-sm">Hungry!</span>
        <!-- Overdue Badge -->
        <div class="absolute top-2 right-2 w-3 h-3 bg-[var(--dg-color-border-focused)] rounded-full border border-[var(--dg-color-text-high-emphasis)]"></div>
      </div>
    </div>

    <!-- Next Up Feed -->
    <div class="mt-[var(--dg-mobile-layout-section-gap)] flex flex-col gap-[var(--dg-mobile-layout-element-gap)]">
      <div class="flex justify-between items-end px-1">
        <h3 class="dg-type-section-title">Next Up</h3>
        <span class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">View All</span>
      </div>

      <!-- Task Card: Feeding -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] flex items-center gap-4" style="border-width: var(--dg-border-widths-standard)">
        <div class="w-12 h-12 rounded-2xl bg-[var(--dg-color-action-primary)] flex items-center justify-center border-2 border-[var(--dg-color-text-high-emphasis)]">
          <i data-lucide="utensils" class="w-6 h-6"></i>
        </div>
        <div class="flex-1">
          <p class="dg-type-body font-bold">Morning Kibble</p>
          <p class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Overdue by 15 mins</p>
        </div>
        <div class="w-8 h-8 border-2 border-[var(--dg-color-text-high-emphasis)] rounded-lg flex items-center justify-center cursor-pointer hover:bg-[var(--dg-color-border-divider)]">
          <!-- Placeholder for hand-drawn checkmark -->
        </div>
      </div>

      <!-- Task Card: Vet Appointment (Paw Print Style) -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] flex items-center gap-4 relative overflow-hidden" style="border-width: var(--dg-border-widths-standard)">
        <!-- Decorative Paw Print Background -->
        <div class="absolute -right-4 -bottom-4 opacity-10 rotate-12">
          <i data-lucide="paw-print" class="w-24 h-24"></i>
        </div>
        
        <div class="w-12 h-12 rounded-2xl bg-[var(--dg-color-action-secondary)] flex items-center justify-center border-2 border-[var(--dg-color-text-high-emphasis)]">
          <i data-lucide="stethoscope" class="w-6 h-6"></i>
        </div>
        <div class="flex-1">
          <p class="dg-type-body font-bold">Annual Checkup</p>
          <p class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Tomorrow at 10:30 AM</p>
        </div>
        <i data-lucide="chevron-right" class="w-5 h-5 text-[var(--dg-color-text-low-emphasis)]"></i>
      </div>

      <!-- Task Card: Walk -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] flex items-center gap-4" style="border-width: var(--dg-border-widths-standard)">
        <div class="w-12 h-12 rounded-2xl bg-[#C1FF72] flex items-center justify-center border-2 border-[var(--dg-color-text-high-emphasis)]">
          <i data-lucide="map-pin" class="w-6 h-6"></i>
        </div>
        <div class="flex-1">
          <p class="dg-type-body font-bold">Park Adventure</p>
          <p class="dg-type-caption text-[var(--dg-color-text-medium-emphasis)]">Scheduled for 4:00 PM</p>
        </div>
        <div class="w-8 h-8 border-2 border-[var(--dg-color-text-high-emphasis)] rounded-lg flex items-center justify-center"></div>
      </div>
    </div>

    <!-- Quick Action Floating Button (Local to Dashboard) -->
    <div class="mt-8 flex justify-center">
      <button class="px-8 h-[var(--dg-sizing-standard-button-height)] dg-action-primary border-[var(--dg-border-widths-standard)] border-[var(--dg-color-text-high-emphasis)] rounded-[var(--dg-radii-pill)] shadow-[var(--dg-shadows-overlay)] flex items-center gap-2 active:translate-y-1 transition-transform">
        <i data-lucide="plus" class="w-6 h-6"></i>
        <span class="dg-type-button-label">Log Activity</span>
      </button>
    </div>

  </div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-[350px] z-[100]" aria-label="Primary navigation">
  <style>
    [data-drawgle-primary-nav] .paws-shell {
      background: var(--dg-color-surface-card);
      border: 2px solid var(--dg-color-text-high-emphasis);
      border-radius: var(--dg-radii-app);
      box-shadow: 4px 6px 0px rgba(26, 28, 30, 0.1);
      padding: 8px 12px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: var(--dg-sizing-bottom-nav-height);
      /* Wobbly border effect */
      clip-path: polygon(2% 0%, 98% 1%, 100% 4%, 99% 95%, 97% 100%, 3% 99%, 0% 96%, 1% 5%);
    }

    [data-drawgle-primary-nav] .nav-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 4px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
    }

    [data-drawgle-primary-nav] .nav-item:active {
      transform: scale(0.9);
    }

    [data-drawgle-primary-nav] .icon-blob {
      position: absolute;
      top: -4px;
      width: 44px;
      height: 38px;
      background: #FF6B6B; /* Candy Pink */
      border: 2px solid var(--dg-color-text-high-emphasis);
      border-radius: 45% 55% 60% 40% / 40% 50% 50% 60%;
      z-index: 0;
      opacity: 0;
      transform: scale(0.5) rotate(-10deg);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    [data-drawgle-primary-nav] .nav-item[] .icon-blob {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    [data-drawgle-primary-nav] .nav-icon {
      position: relative;
      z-index: 1;
      color: var(--dg-color-text-high-emphasis);
      transition: color 0.2s ease;
    }

    [data-drawgle-primary-nav] .nav-item[] .nav-icon {
      color: #FFFFFF;
    }

    [data-drawgle-primary-nav] .nav-label {
      font-family: var(--dg-type-button-label-font-family, "Comic Sans MS", "Bubblegum Sans", sans-serif);
      font-size: var(--dg-type-caption-size);
      font-weight: 800;
      color: var(--dg-color-text-medium-emphasis);
      z-index: 1;
    }

    [data-drawgle-primary-nav] .nav-item[] .nav-label {
      color: var(--dg-color-text-high-emphasis);
    }

    /* Hand-drawn stroke simulation */
    [data-drawgle-primary-nav] svg {
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.5px;
    }
  </style>

  <div class="paws-shell">
    <button type="button" class="nav-item" data-nav-item-id="dashboard">
      <div class="icon-blob"></div>
      <span class="nav-icon"><i data-lucide="home" width="24" height="24"></i></span>
      <span class="nav-label">Home</span>
    </button>

    <button type="button" class="nav-item" data-nav-item-id="tasks">
      <div class="icon-blob"></div>
      <span class="nav-icon"><i data-lucide="check-circle" width="24" height="24"></i></span>
      <span class="nav-label">Care</span>
    </button>

<!DOCTYPE html>
<html>
  <head>

<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #555555;
  --dg-color-text-high-emphasis: #EBEBEB;
  --dg-color-text-medium-emphasis: #999999;
  --dg-color-accent-cyan: #5AC8FA;
  --dg-color-accent-amber: #FFCC00;
  --dg-color-accent-green: #34C759;
  --dg-color-accent-magenta: #FF2D55;
  --dg-color-action-primary: #FFFFFF;
  --dg-color-action-disabled: #242424;
  --dg-color-action-secondary: #2C2C2E;
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: #262626;
  --dg-color-border-focused: #404040;
  --dg-color-surface-card: #1A1A1A;
  --dg-color-surface-modal: #1C1C1C;
  --dg-color-surface-bottom-sheet: #161616;
  --dg-color-background-primary: #0D0D0D;
  --dg-color-background-secondary: #121212;
  --dg-radii-app: 24px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 54px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 20px 40px rgba(0, 0, 0, 0.8);
  --dg-shadows-surface: 0px 10px 30px rgba(0, 0, 0, 0.5), inset 0px 1px 1px rgba(255, 255, 255, 0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.15;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 30px;
  --dg-type-hero-title-size: 34px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 41px;
  --dg-type-section-title-size: 18px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 24px;
  --dg-type-metric-value-size: 32px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 38px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Header -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <div class="w-[40px]"></div> <!-- Spacer for centering -->
    <h1 class="text-[var(--dg-type-screen-title-size)] font-[var(--dg-type-screen-title-weight)] leading-[var(--dg-type-screen-title-line-height)]">Insights</h1>
    <button class="w-[40px] h-[40px] flex items-center justify-center dg-surface-card rounded-full border border-[var(--dg-color-border-divider)]" aria-label="Filter">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--dg-color-text-high-emphasis)]"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="2" y1="14" x2="6" y2="14"></line><line x1="10" y1="8" x2="14" y2="8"></line><line x1="18" y1="16" x2="22" y2="16"></line></svg>
    </button>
  </header>

  <!-- Main Content Scrollable Area -->
  <main class="flex-1 px-[var(--dg-mobile-layout-screen-margin)] pb-[100px]">
    
    <!-- Total Spent Card with Bar Chart -->
    <section class="mb-[var(--dg-mobile-layout-section-gap)]">
      <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] border border-[var(--dg-color-border-divider)]">
        <div class="flex flex-col mb-[var(--dg-spacing-xl)]">
          <span class="text-[var(--dg-type-supporting-size)] text-[var(--dg-color-text-medium-emphasis)] font-[var(--dg-type-supporting-weight)]">Total spent</span>
          <span class="text-[var(--dg-type-metric-value-size)] font-[var(--dg-type-metric-value-weight)] leading-[var(--dg-type-metric-value-line-height)]">$4,280.50</span>
        </div>

        <!-- Bar Chart Container -->
        <div class="flex items-end justify-between h-[160px] px-[var(--dg-spacing-xs)] relative">
          <!-- Mon -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1">
            <div class="w-[12px] h-[60px] bg-[var(--dg-color-action-secondary)] rounded-t-full"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-low-emphasis)]">M</span>
          </div>
          <!-- Tue -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1">
            <div class="w-[12px] h-[90px] bg-[var(--dg-color-action-secondary)] rounded-t-full"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-low-emphasis)]">T</span>
          </div>
          <!-- Wed -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1">
            <div class="w-[12px] h-[110px] bg-[var(--dg-color-action-secondary)] rounded-t-full"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-low-emphasis)]">W</span>
          </div>
          <!-- Thu (Active/Highlighted) -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1 relative">
            <!-- Glow Effect -->
            <div class="absolute top-[-20px] w-[32px] h-[140px] bg-cyan-400/20 blur-xl rounded-full"></div>
            <div class="w-[12px] h-[130px] bg-gradient-to-t from-blue-500 to-cyan-300 rounded-t-full shadow-[0_0_15px_rgba(34,211,238,0.5)] z-10"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-high-emphasis)] font-bold">T</span>
          </div>
          <!-- Fri -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1">
            <div class="w-[12px] h-[85px] bg-[var(--dg-color-action-secondary)] rounded-t-full"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-low-emphasis)]">F</span>
          </div>
          <!-- Sat -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1">
            <div class="w-[12px] h-[40px] bg-[var(--dg-color-action-secondary)] rounded-t-full"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-low-emphasis)]">S</span>
          </div>
          <!-- Sun -->
          <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)] flex-1">
            <div class="w-[12px] h-[55px] bg-[var(--dg-color-action-secondary)] rounded-t-full"></div>
            <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-low-emphasis)]">S</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Metric Grid -->
    <section class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)] mb-[var(--dg-mobile-layout-section-gap)]">
      <!-- Daily Average -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] border border-[var(--dg-color-border-divider)] flex flex-col items-center text-center">
        <div class="w-[40px] h-[40px] rounded-full bg-blue-500/10 flex items-center justify-center mb-[var(--dg-spacing-xs)]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </div>
        <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)] mb-[var(--dg-spacing-xxs)]">Daily average</span>
        <span class="text-[20px] font-bold text-[var(--dg-color-text-high-emphasis)]">$142.60</span>
      </div>
      <!-- Highest Spend -->
      <div class="dg-surface-card p-[var(--dg-spacing-md)] rounded-[var(--dg-radii-app)] border border-[var(--dg-color-border-divider)] flex flex-col items-center text-center">
        <div class="w-[40px] h-[40px] rounded-full bg-orange-500/10 flex items-center justify-center mb-[var(--dg-spacing-xs)]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-400"><circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path><line x1="7" y1="6" x2="7" y2="10"></line><line x1="17" y1="14" x2="17" y2="18"></line></svg>
        </div>
        <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)] mb-[var(--dg-spacing-xxs)]">Highest spend</span>
        <span class="text-[20px] font-bold text-[var(--dg-color-text-high-emphasis)]">$840.00</span>
      </div>
    </section>

    <!-- Top Categories -->
    <section>
      <div class="flex items-center justify-between mb-[var(--dg-spacing-md)]">
        <h2 class="text-[var(--dg-type-section-title-size)] font-[var(--dg-type-section-title-weight)]">Top categories</h2>
        <button class="text-[var(--dg-type-supporting-size)] text-[var(--dg-color-text-medium-emphasis)]">See all</button>
      </div>

      <!-- Segmented Pill Chart -->
      <div class="w-full h-[12px] flex rounded-full overflow-hidden mb-[var(--dg-spacing-xl)]">
        <div class="h-full bg-red-500" style="width: 45%"></div>
        <div class="h-full bg-orange-400" style="width: 25%"></div>
        <div class="h-full bg-purple-500" style="width: 15%"></div>
        <div class="h-full bg-blue-500" style="width: 15%"></div>
      </div>

      <!-- Category List -->
      <div class="space-y-[var(--dg-mobile-layout-element-gap)]">
        <div class="flex items-center justify-between p-[var(--dg-spacing-md)] dg-surface-card rounded-[var(--dg-radii-app)] border border-[var(--dg-color-border-divider)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[44px] h-[44px] rounded-full bg-red-500/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            </div>
            <div class="flex flex-col">
              <span class="text-[var(--dg-type-body-size)] font-semibold">Shopping</span>
              <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)]">45% of total spend</span>
            </div>
          </div>
          <span class="text-[var(--dg-type-body-size)] font-bold">$1,926.22</span>
        </div>

        <div class="flex items-center justify-between p-[var(--dg-spacing-md)] dg-surface-card rounded-[var(--dg-radii-app)] border border-[var(--dg-color-border-divider)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[44px] h-[44px] rounded-full bg-orange-500/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
            </div>
            <div class="flex flex-col">
              <span class="text-[var(--dg-type-body-size)] font-semibold">Food & Drink</span>
              <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)]">25% of total spend</span>
            </div>
          </div>
          <span class="text-[var(--dg-type-body-size)] font-bold">$1,070.12</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Bottom padding to account for floating nav dock -->
  <div class="h-[var(--dg-sizing-bottom-nav-height)]"></div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 z-[100] flex items-center justify-center p-1.5 bg-[var(--dg-color-background-primary)]/70 backdrop-blur-2xl border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] shadow-[0px_20px_40px_rgba(0,0,0,0.6),inset_0px_1px_0px_rgba(255,255,255,0.1)]">
  <style>
    [data-drawgle-primary-nav] {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    [data-drawgle-primary-nav] .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      min-width: 48px;
      padding: 0 14px;
      border-radius: var(--dg-radii-pill);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--dg-color-text-low-emphasis);
      overflow: hidden;
    }

    /* Active State: Sliding Pill Aesthetic */
    [data-drawgle-primary-nav] .nav-item[] {
      background-color: var(--dg-color-action-primary);
      color: var(--dg-color-action-on-primary-text);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
      padding: 0 20px;
    }

    [data-drawgle-primary-nav] .nav-item .label {
      max-width: 0;
      opacity: 0;
      white-space: nowrap;
      font-size: var(--dg-type-button-label-size);
      font-weight: var(--dg-type-button-label-weight);
      letter-spacing: -0.01em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      margin-left: 0;
    }

    [data-drawgle-primary-nav] .nav-item[] .label {
      max-width: 100px;
      opacity: 1;
      margin-left: 8px;
    }

    [data-drawgle-primary-nav] .nav-item i {
      width: var(--dg-sizing-icon-standard);
      height: var(--dg-sizing-icon-standard);
      flex-shrink: 0;
      stroke-width: 1.75px;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #A1A1A1;
  --dg-color-text-high-emphasis: #1A1A1A;
  --dg-color-text-medium-emphasis: #6B6B6B;
  --dg-color-action-primary: #1A1A1A;
  --dg-color-action-disabled: #E0E0E0;
  --dg-color-action-secondary: #E8F5E9;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: rgba(0, 0, 0, 0.05);
  --dg-color-border-focused: #1A1A1A;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F9F9F7;
  --dg-color-background-secondary: #FFFFFF;
  --dg-color-functional-sky: #D1EAF0;
  --dg-color-functional-mint: #E8F5E9;
  --dg-color-functional-amber: #FFE082;
  --dg-color-functional-lavender: #E8EAF6;
  --dg-radii-app: 32px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 10px 40px rgba(0, 0, 0, 0.08);
  --dg-shadows-surface: 0px 4px 20px rgba(0, 0, 0, 0.02);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.10;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.40;
  --dg-typography-font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 32px;
  --dg-type-screen-title-weight: 800;
  --dg-type-screen-title-line-height: 38px;
  --dg-type-hero-title-size: 40px;
  --dg-type-hero-title-weight: 800;
  --dg-type-hero-title-line-height: 44px;
  --dg-type-section-title-size: 22px;
  --dg-type-section-title-weight: 700;
  --dg-type-section-title-line-height: 28px;
  --dg-type-metric-value-size: 36px;
  --dg-type-metric-value-weight: 500;
  --dg-type-metric-value-line-height: 40px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 600;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, 'Plus Jakarta Sans', -apple-system, sans-serif)">
  <!-- Top Profile Header -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] h-[64px]">
    <div class="flex items-center gap-[var(--dg-spacing-xs)]">
      <div class="w-10 h-10 rounded-full overflow-hidden bg-gray-200">
        <img src="https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg?auto=compress&cs=tinysrgb&w=150" alt="User Avatar" class="w-full h-full object-cover" />
      </div>
      <div class="flex flex-col">
        <span class="text-[var(--dg-color-text-medium-emphasis)] text-[13px] font-medium">Hello, Jacob!</span>
      </div>
    </div>
    <button class="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-[var(--dg-color-border-divider)] relative">
      <i data-lucide="bell" class="w-5 h-5 text-[var(--dg-color-text-high-emphasis)]"></i>
      <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-orange-500 rounded-full border-2 border-white"></span>
    </button>
  </header>

  <!-- Main Content Scrollable Area -->
  <main class="flex-1 flex flex-col px-[var(--dg-mobile-layout-screen-margin)] gap-[var(--dg-mobile-layout-section-gap)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+112px)]">
    
    <!-- Hero Title -->
    <section class="mt-4">
      <h1 class="dg-type-screen-title max-w-[200px]">Tracking your heart</h1>
    </section>

    <!-- Split Grid: Battery & Device Photo -->
    <section class="grid grid-cols-[1fr_1.8fr] gap-[var(--dg-mobile-layout-element-gap)]">
      <!-- Battery Card -->
      <div class="dg-radius-app bg-[var(--dg-color-action-secondary)] p-[var(--dg-spacing-md)] flex flex-col justify-between min-h-[200px] cursor-pointer active:opacity-80 transition-opacity">
        <div>
          <div class="dg-type-metric-value">86%</div>
          <div class="text-[12px] font-semibold text-[var(--dg-color-text-medium-emphasis)] uppercase tracking-wider">battery</div>
        </div>
        <div class="flex flex-col gap-3">
          <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center">
            <i data-lucide="zap" class="w-4 h-4 text-black fill-black"></i>
          </div>
          <!-- Vertical Progress Bar -->
          <div class="flex flex-col gap-1">
            <div class="h-1.5 w-full bg-white/40 rounded-full overflow-hidden">
              <div class="h-full bg-black w-[86%]"></div>
            </div>
            <div class="h-1.5 w-full bg-white/40 rounded-full"></div>
            <div class="h-1.5 w-full bg-white/40 rounded-full"></div>
            <div class="h-1.5 w-full bg-white/40 rounded-full"></div>
          </div>
        </div>
      </div>

      <!-- Device Photo Card -->
      <div class="dg-radius-app bg-white overflow-hidden relative min-h-[200px]">
        <img src="https://images.pexels.com/photos/437037/pexels-photo-437037.jpeg?auto=compress&cs=tinysrgb&w=400" alt="Device on wrist" class="w-full h-full object-cover" />
        <!-- Subtle overlay for text legibility if needed, though reference is clean -->
      </div>
    </section>

    <!-- Customize Your Device Card -->
    <section class="dg-radius-app bg-[#E1F5FE] p-[var(--dg-spacing-md)] flex items-center justify-between relative overflow-hidden min-h-[140px]">
      <div class="flex flex-col gap-1 z-10 max-w-[140px]" style="color: var(--dg-color-action-on-primary-text)">
        <h3 class="text-[18px] font-bold leading-tight">Customize your device</h3>
      </div>
      
      <!-- Product Cutout (Placeholder for the black tracker band) -->
      <div class="absolute left-4 bottom-[-10px] w-24 h-32 rotate-[-15deg] opacity-90">
        <div class="w-full h-full bg-[var(--dg-color-text-high-emphasis)] rounded-[20px] border-4 border-gray-800 flex flex-col items-center pt-4">
          <div class="w-10 h-1 bg-gray-700 rounded-full mb-2"></div>
          <div class="w-12 h-16 bg-gray-900 rounded-lg"></div>
        </div>
      </div>

      <!-- Action Icons -->
      <div class="flex flex-col gap-2 z-10">
        <button class="w-10 h-10 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center border border-white/50">
          <i data-lucide="rss" class="w-5 h-5 text-black"></i>
        </button>
        <button class="w-10 h-10 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center border border-white/50">
          <i data-lucide="settings" class="w-5 h-5 text-black"></i>
        </button>
      </div>
    </section>

    <!-- Connect Action Bar -->
    <section class="bg-[#FFF9C4] dg-radius-app p-3 flex items-center justify-between cursor-pointer active:scale-[0.98] transition-transform">
      <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center border border-black/5">
        <i data-lucide="watch" class="w-5 h-5 text-black"></i>
      </div>
      
      <div class="flex items-center gap-2">
        <span class="dg-type-button-label text-black">Connect</span>
        <div class="flex items-center -space-x-1">
          <i data-lucide="chevron-right" class="w-4 h-4 text-black/30"></i>
          <i data-lucide="chevron-right" class="w-4 h-4 text-black/60"></i>
          <i data-lucide="chevron-right" class="w-4 h-4 text-black"></i>
        </div>
      </div>

      <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center border border-black/5">
        <i data-lucide="bluetooth" class="w-5 h-5 text-black"></i>
      </div>
    </section>

  </main>

  <!-- Floating Nav Dock Placeholder Space (Actual nav injected by system) -->
  <div class="fixed bottom-0 left-0 right-0 h-[calc(var(--dg-mobile-layout-safe-area-bottom)+96px)] pointer-events-none"></div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="dg-nav-shell" aria-label="Primary navigation">
<style>
[data-drawgle-primary-nav].dg-nav-shell {
  position: fixed;
  bottom: calc(var(--dg-mobile-layout-safe-area-bottom) + 12px);
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - (var(--dg-mobile-layout-screen-margin) * 2));
  max-width: 342px;
  height: 72px;
  background: var(--dg-color-background-secondary);
  border-radius: var(--dg-radii-pill);
  box-shadow: var(--dg-shadows-overlay);
  border: 1px solid var(--dg-color-border-divider);
  padding: 8px;
  box-sizing: border-box;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

[data-drawgle-primary-nav] .dg-nav-item {
  position: relative;
  flex: 1;
  height: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: var(--dg-radii-pill);
  padding: 0;
  color: var(--dg-color-text-low-emphasis);
}

[data-drawgle-primary-nav] .dg-nav-icon-wrapper {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--dg-radii-pill);
  transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

[data-drawgle-primary-nav] .dg-nav-item[] .dg-nav-icon-wrapper {
  background: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
}

[data-drawgle-primary-nav] .dg-nav-item[] {
  color: var(--dg-color-text-high-emphasis);
}

[data-drawgle-primary-nav] .dg-nav-icon {
  width: var(--dg-sizing-icon-standard);
  height: var(--dg-sizing-icon-standard);
}

[data-drawgle-primary-nav] .dg-nav-label {
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
  font-family: inherit;
  transition: opacity 0.2s ease;
}

[data-drawgle-primary-nav] .dg-nav-item[]:active .dg-nav-icon-wrapper {
  background: rgba(0, 0, 0, 0.05);
  transform: scale(0.92);
}
</style>

<button type="button" class="dg-nav-item" data-nav-item-id="home">
  <div class="dg-nav-icon-wrapper">
    <i data-lucide="home" class="dg-nav-icon"></i>
  </div>
  <span class="dg-nav-label">Home</span>
</button>

<button type="button" class="dg-nav-item" data-nav-item-id="health">
  <div class="dg-nav-icon-wrapper">
    <i data-lucide="activity" class="dg-nav-icon"></i>
  </div>
  <span class="dg-nav-label">Health</span>
</button>

<button type="button" class="dg-nav-item" data-nav-item-id="diagnostics">
  <div class="dg-nav-icon-wrapper">
    <i data-lucide="heart" class="dg-nav-icon"></i>
  </div>
  <span class="dg-nav-label">Analysis</span>
</button>

<button type="button" class="dg-nav-item" data-nav-item-id="profile">
  <div class="dg-nav-icon-wrapper">
    <i data-lucide="user" class="dg-nav-icon"></i>
  </div>
  <span class="dg-nav-label">Profile</span>
</button>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

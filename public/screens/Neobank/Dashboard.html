<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #555555;
  --dg-color-text-high-emphasis: #EBEBEB;
  --dg-color-text-medium-emphasis: #999999;
  --dg-color-accent-cyan: #5AC8FA;
  --dg-color-accent-amber: #FFCC00;
  --dg-color-accent-green: #34C759;
  --dg-color-accent-magenta: #FF2D55;
  --dg-color-action-primary: #FFFFFF;
  --dg-color-action-disabled: #242424;
  --dg-color-action-secondary: #2C2C2E;
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: #262626;
  --dg-color-border-focused: #404040;
  --dg-color-surface-card: #1A1A1A;
  --dg-color-surface-modal: #1C1C1C;
  --dg-color-surface-bottom-sheet: #161616;
  --dg-color-background-primary: #0D0D0D;
  --dg-color-background-secondary: #121212;
  --dg-radii-app: 24px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 54px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 20px 40px rgba(0, 0, 0, 0.8);
  --dg-shadows-surface: 0px 10px 30px rgba(0, 0, 0, 0.5), inset 0px 1px 1px rgba(255, 255, 255, 0.05);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.15;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 30px;
  --dg-type-hero-title-size: 34px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 41px;
  --dg-type-section-title-size: 18px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 24px;
  --dg-type-metric-value-size: 32px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 38px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif)">
  <!-- Header -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <div class="w-[44px] h-[44px] rounded-full dg-bg-secondary border border-[var(--dg-color-border-divider)] flex items-center justify-center overflow-hidden">
      <i data-lucide="user" class="w-[20px] h-[20px] text-[var(--dg-color-text-medium-emphasis)]"></i>
    </div>
    <h1 class="text-[var(--dg-type-nav-title-size)] font-[var(--dg-type-nav-title-weight)] leading-[var(--dg-type-nav-title-line-height)]">Good morning, Kim!</h1>
    <button class="w-[44px] h-[44px] rounded-full dg-bg-secondary border border-[var(--dg-color-border-divider)] flex items-center justify-center">
      <i data-lucide="bell" class="w-[20px] h-[20px] text-[var(--dg-color-text-high-emphasis)]"></i>
    </button>
  </header>

  <!-- Hero Card: Total Balance -->
  <section class="px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
    <div class="dg-surface-card rounded-[var(--dg-radii-app)] p-[var(--dg-spacing-md)] shadow-[var(--dg-shadows-surface)] border border-[var(--dg-color-border-divider)]" style="background-color: var(--dg-color-surface-card)">
      <div class="flex justify-between items-start mb-[var(--dg-spacing-xs)]">
        <span class="text-[var(--dg-type-supporting-size)] text-[var(--dg-color-text-medium-emphasis)]">Total balance</span>
        <div class="bg-[#1D3A2F] px-[var(--dg-spacing-xs)] py-[2px] rounded-full flex items-center gap-[var(--dg-spacing-xxs)]">
          <i data-lucide="arrow-up-right" class="w-[12px] h-[12px] text-[#4ADE80]"></i>
          <span class="text-[12px] font-bold text-[#4ADE80]">+14.5%</span>
        </div>
      </div>
      
      <div class="text-[var(--dg-type-metric-value-size)] font-[var(--dg-type-metric-value-weight)] leading-[var(--dg-type-metric-value-line-height)] mb-[var(--dg-spacing-xl)]">
        $109,520.00
      </div>

      <!-- Nested Sub-cards -->
      <div class="grid grid-cols-2 gap-[var(--dg-mobile-layout-element-gap)]">
        <div class="bg-[var(--dg-color-action-disabled)] rounded-[20px] p-[var(--dg-spacing-md)] border border-[var(--dg-color-border-divider)]">
          <span class="block text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)] mb-[var(--dg-spacing-xxs)]">Spending</span>
          <span class="text-[16px] font-bold">$2,750.00</span>
        </div>
        <div class="bg-[var(--dg-color-action-disabled)] rounded-[20px] p-[var(--dg-spacing-md)] border border-[var(--dg-color-border-divider)]">
          <span class="block text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)] mb-[var(--dg-spacing-xxs)]">Savings</span>
          <span class="text-[16px] font-bold">$15,000.00</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Action Row -->
  <section class="px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
    <div class="flex justify-between items-center">
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
        <button class="w-[56px] h-[56px] rounded-full dg-bg-secondary border border-[var(--dg-color-border-divider)] flex items-center justify-center">
          <i data-lucide="send" class="w-[24px] h-[24px]"></i>
        </button>
        <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)]">Send</span>
      </div>
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
        <button class="w-[56px] h-[56px] rounded-full dg-bg-secondary border border-[var(--dg-color-border-divider)] flex items-center justify-center">
          <i data-lucide="download" class="w-[24px] h-[24px]"></i>
        </button>
        <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)]">Request</span>
      </div>
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
        <button class="w-[56px] h-[56px] rounded-full dg-bg-secondary border border-[var(--dg-color-border-divider)] flex items-center justify-center">
          <i data-lucide="credit-card" class="w-[24px] h-[24px]"></i>
        </button>
        <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)]">Cards</span>
      </div>
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xs)]">
        <button class="w-[56px] h-[56px] rounded-full dg-bg-secondary border border-[var(--dg-color-border-divider)] flex items-center justify-center">
          <i data-lucide="more-horizontal" class="w-[24px] h-[24px]"></i>
        </button>
        <span class="text-[var(--dg-type-caption-size)] text-[var(--dg-color-text-medium-emphasis)]">More</span>
      </div>
    </div>
  </section>

  <!-- Monthly Budget List -->
  <section class="px-[var(--dg-mobile-layout-screen-margin)] flex-1 pb-[100px]">
    <div class="flex justify-between items-center mb-[var(--dg-spacing-md)]">
      <h2 class="text-[var(--dg-type-section-title-size)] font-[var(--dg-type-section-title-weight)]">Monthly budget</h2>
      <button class="text-[var(--dg-type-supporting-size)] text-[var(--dg-color-text-medium-emphasis)]">See all</button>
    </div>

    <div class="space-y-[var(--dg-mobile-layout-section-gap)]">
      <!-- Item 1: Shopping -->
      <div class="flex flex-col gap-[var(--dg-spacing-sm)]">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-[var(--dg-spacing-sm)]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[var(--dg-color-action-disabled)] flex items-center justify-center shadow-inner">
              <i data-lucide="shopping-bag" class="w-[20px] h-[20px]"></i>
            </div>
            <div>
              <div class="text-[16px] font-semibold">Shopping</div>
              <div class="text-[12px] text-[var(--dg-color-text-medium-emphasis)]">$320 left from $1,600</div>
            </div>
          </div>
          <div class="text-[16px] font-bold">$1,280</div>
        </div>
        <div class="h-[12px] w-full bg-[var(--dg-color-surface-card)] rounded-full overflow-hidden">
          <div class="h-full w-[80%] rounded-full" style="background: linear-gradient(90deg, #FF4B6E 0%, #FF2D55 100%); box-shadow: 0 0 12px rgba(255, 45, 85, 0.4);"></div>
        </div>
      </div>

      <!-- Item 2: Transport -->
      <div class="flex flex-col gap-[var(--dg-spacing-sm)]">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-[var(--dg-spacing-sm)]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[var(--dg-color-action-disabled)] flex items-center justify-center shadow-inner">
              <i data-lucide="car" class="w-[20px] h-[20px]"></i>
            </div>
            <div>
              <div class="text-[16px] font-semibold">Transport</div>
              <div class="text-[12px] text-[var(--dg-color-text-medium-emphasis)]">$55 left from $200</div>
            </div>
          </div>
          <div class="text-[16px] font-bold">$145</div>
        </div>
        <div class="h-[12px] w-full bg-[var(--dg-color-surface-card)] rounded-full overflow-hidden">
          <div class="h-full w-[72%] rounded-full" style="background: linear-gradient(90deg, #5AC8FA 0%, #007AFF 100%); box-shadow: 0 0 12px rgba(0, 122, 255, 0.4);"></div>
        </div>
      </div>

      <!-- Item 3: Bills & Utilities -->
      <div class="flex flex-col gap-[var(--dg-spacing-sm)]">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-[var(--dg-spacing-sm)]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[var(--dg-color-action-disabled)] flex items-center justify-center shadow-inner">
              <i data-lucide="file-text" class="w-[20px] h-[20px]"></i>
            </div>
            <div>
              <div class="text-[16px] font-semibold">Bills & Utilities</div>
              <div class="text-[12px] text-[var(--dg-color-text-medium-emphasis)]">$120 left from $900</div>
            </div>
          </div>
          <div class="text-[16px] font-bold">$780</div>
        </div>
        <div class="h-[12px] w-full bg-[var(--dg-color-surface-card)] rounded-full overflow-hidden">
          <div class="h-full w-[86%] rounded-full" style="background: linear-gradient(90deg, #AF52DE 0%, #5856D6 100%); box-shadow: 0 0 12px rgba(88, 86, 214, 0.4);"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Spacer for floating nav -->
  <div class="h-[var(--dg-sizing-bottom-nav-height)]"></div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 z-[100] flex items-center justify-center p-1.5 bg-[var(--dg-color-background-primary)]/70 backdrop-blur-2xl border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] shadow-[0px_20px_40px_rgba(0,0,0,0.6),inset_0px_1px_0px_rgba(255,255,255,0.1)]">
  <style>
    [data-drawgle-primary-nav] {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    [data-drawgle-primary-nav] .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      min-width: 48px;
      padding: 0 14px;
      border-radius: var(--dg-radii-pill);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--dg-color-text-low-emphasis);
      overflow: hidden;
    }

    /* Active State: Sliding Pill Aesthetic */
    [data-drawgle-primary-nav] .nav-item[] {
      background-color: var(--dg-color-action-primary);
      color: var(--dg-color-action-on-primary-text);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
      padding: 0 20px;
    }

    [data-drawgle-primary-nav] .nav-item .label {
      max-width: 0;
      opacity: 0;
      white-space: nowrap;
      font-size: var(--dg-type-button-label-size);
      font-weight: var(--dg-type-button-label-weight);
      letter-spacing: -0.01em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      margin-left: 0;
    }

    [data-drawgle-primary-nav] .nav-item[] .label {
      max-width: 100px;
      opacity: 1;
      margin-left: 8px;
    }

    [data-drawgle-primary-nav] .nav-item i {
      width: var(--dg-sizing-icon-standard);
      height: var(--dg-sizing-icon-standard);
      flex-shrink: 0;
      stroke-width: 1.75px;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-drawgle-primary-nav] .nav-item[] i {
      transform: scale(0.9);
    }

    /* Interaction Feedback */
    [data-drawgle-primary-nav] .nav-item:active {
      transform: scale(0.92);
    }

    [data-drawgle-primary-nav] .nav-item:not([]):active {
      background-color: rgba(255, 255, 255, 0.08);
      color: var(--dg-color-text-high-emphasis);
    }
  </style>

  <div class="flex items-center gap-1">
    <button 
      data-nav-item-id="home" 
      class="nav-item"
      aria-label="Home">
      <i data-lucide="home"></i>
      <span class="label">Home</span>
    </button>

    <button 
      data-nav-item-id="insights" 
      class="nav-item"
      aria-label="Insights">
      <i data-lucide="bar-chart-2"></i>
      <span class="label">Insights</span>
    </button>

    <button 
      data-nav-item-id="card" 
      class="nav-item"
      aria-label="Card Management">
      <i data-lucide="credit-card"></i>
      <span class="label">Card</span>
    </button>

    <button 
      data-nav-item-id="settings" 
      class="nav-item"
      aria-label="Settings">
      <i data-lucide="settings"></i>
      <span class="label">Settings</span>
    </button>
  </div>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

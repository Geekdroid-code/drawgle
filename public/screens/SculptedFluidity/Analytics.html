  <style>
    [data-drawgle-primary-nav].dg-nav-shell {
      position: fixed;
      bottom: var(--dg-mobile-layout-safe-area-bottom);
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - (var(--dg-mobile-layout-screen-margin) * 2));
      max-width: 342px;
      height: 76px;
      background: var(--dg-color-surface-modal); /* Midnight Onyx */
      border-radius: var(--dg-radii-app); /* 32pt Super-ellipse */
      box-shadow: var(--dg-shadows-overlay);
      padding: 8px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-around;
      box-sizing: border-box;
    }

    [data-drawgle-primary-nav] .dg-nav-item {
      position: relative;
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

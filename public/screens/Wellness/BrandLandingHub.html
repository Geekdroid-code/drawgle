      html, body { margin: 0; min-height: 100%; }

  <!-- Main Content Container -->

        <h1 class="text-[24px] font-serif font-bold text-white tracking-tight">xefag</h1>

  <!-- Lucide Icons Script -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    /* Custom Serif for Logo and Hero */
    @font-face {
      font-family: 'SerifDisplay';
      src: local('Times New Roman'), local('Georgia');
    }
    
    .font-serif {
      font-family: 'SerifDisplay', serif;
    }

    /* Subtle floating animation for bottles */
    @keyframes float {
      0% { transform: translateY(0px) rotate(-15deg); }
      50% { transform: translateY(-10px) rotate(-13deg); }
      100% { transform: translateY(0px) rotate(-15deg); }
    }
    @keyframes float-alt {
      0% { transform: translateY(0px) rotate(10deg); }
      50% { transform: translateY(10px) rotate(12deg); }
      100% { transform: translateY(0px) rotate(10deg); }
    }

    .absolute.left-\[10\%\] {
      animation: float 6s ease-in-out infinite;
    }
    .absolute.right-\[10\%\] {
      animation: float-alt 7s ease-in-out infinite;
    }
  </style>

    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #444444;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #888888;
  --dg-color-action-primary: #FFFFFF;
  --dg-color-action-disabled: #222222;
  --dg-color-action-secondary: #1A1A1A;
  --dg-color-action-on-primary-text: #0A0A0A;
  --dg-color-border-divider: #262626;
  --dg-color-border-focused: #FFFFFF;
  --dg-color-surface-card: #1A1A1A;
  --dg-color-surface-modal: #1A1A1A;
  --dg-color-surface-bottom-sheet: #121212;
  --dg-color-background-primary: #0A0A0A;
  --dg-color-background-secondary: #000000;
  --dg-radii-app: 12px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0 12px 32px rgba(0,0,0,0.8);
  --dg-shadows-surface: 0 4px 12px rgba(0,0,0,0.5);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.70;
  --dg-typography-font-family: 'Inter', -apple-system, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 28px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 34px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 40px;
  --dg-type-section-title-size: 12px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 16px;
  --dg-type-metric-value-size: 36px;
  --dg-type-metric-value-weight: 500;
  --dg-type-metric-value-line-height: 44px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 11px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 14px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: var(--dg-typography-font-family, 'Inter', -apple-system, sans-serif)">
  <!-- Top 40%: Brand Mark Section -->
  <div class="flex-none h-[40vh] flex items-center justify-center">
    <div class="relative">
      <!-- Subtle Glow Effect -->
      <div class="absolute inset-0 blur-[64px] bg-white/5 rounded-full"></div>
      <!-- Brand Icon -->
      <div class="relative flex items-center justify-center w-24 h-24">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield text-white">
          <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Middle 30%: Hero Text & Value Proposition -->
  <div class="flex-none px-[var(--dg-mobile-layout-screen-margin)] flex flex-col items-center text-center">
    <h1 class="dg-type-hero-title text-white mb-[var(--dg-mobile-layout-element-gap)]">
      Midnight Precision
    </h1>
    <p class="dg-type-body text-[var(--dg-color-text-medium-emphasis)] max-w-[280px]">
      Experience the next generation of premium finance management with surgical clarity.
    </p>
  </div>

  <!-- Spacer to maintain the 32px gap between hero text and action stack -->
  <div class="h-[var(--dg-mobile-layout-section-gap)]"></div>

  <!-- Bottom 30%: Primary Action Stack -->
  <div class="mt-auto px-[var(--dg-mobile-layout-screen-margin)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+16px)] flex flex-col gap-[var(--dg-mobile-layout-element-gap)]">
    
    <!-- Primary Action: Get Started -->
    <button class="w-full h-[var(--dg-sizing-standard-button-height)] bg-[var(--dg-color-action-primary)] rounded-[var(--dg-radii-app)] flex items-center justify-center active:scale-[0.98] transition-transform duration-100">
      <span class="dg-type-button-label text-[var(--dg-color-action-on-primary-text)]">
        Get Started
      </span>
    </button>

    <!-- Secondary Action: Sign In -->
    <button class="w-full h-[var(--dg-sizing-standard-button-height)] bg-transparent border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-app)] flex items-center justify-center active:bg-white/5 transition-colors duration-100">
      <span class="dg-type-button-label text-white">
        Sign In
      </span>
    </button>

    <!-- Optional: Legal/Terms Caption -->
    <p class="dg-type-caption text-[var(--dg-color-text-low-emphasis)] text-center mt-2">
      By continuing, you agree to our Terms of Service.
    </p>
  </div>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-0 left-0 right-0 flex justify-center items-end pb-[var(--dg-mobile-layout-safe-area-bottom)] pointer-events-none z-[100]">
  <div class="pointer-events-auto flex items-center justify-around w-[calc(100%-48px)] max-w-[342px] h-[68px] mb-[var(--dg-mobile-layout-safe-area-bottom)] px-2 bg-[var(--dg-color-surface-bottom-sheet)] border border-[var(--dg-color-border-divider)] rounded-[var(--dg-radii-pill)] shadow-[var(--dg-shadows-overlay)] backdrop-blur-2xl">
    
    <!-- Home / Dashboard -->
    <button data-nav-item-id="dashboard" class="group relative flex flex-col items-center justify-center min-w-[64px] h-full transition-all duration-300 ease-out active:scale-90">
      <div class="flex flex-col items-center gap-1">
        <i data-lucide="layout-dashboard" class="w-[22px] h-[22px] stroke-[1.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300"></i>
        <span class="text-[10px] uppercase tracking-wider font-[var(--dg-type-caption-weight)] leading-[var(--dg-type-caption-line-height)] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300">Home</span>
      </div>
      <div class="absolute bottom-1.5 w-1 h-1 rounded-full bg-[var(--dg-color-text-high-emphasis)] scale-0 opacity-0 group-data-[active=true]:scale-100 group-data-[active=true]:opacity-100 transition-all duration-300 ease-out"></div>
    </button>

    <!-- Portfolio -->
    <button data-nav-item-id="portfolio" class="group relative flex flex-col items-center justify-center min-w-[64px] h-full transition-all duration-300 ease-out active:scale-90">
      <div class="flex flex-col items-center gap-1">
        <i data-lucide="pie-chart" class="w-[22px] h-[22px] stroke-[1.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300"></i>
        <span class="text-[10px] uppercase tracking-wider font-[var(--dg-type-caption-weight)] leading-[var(--dg-type-caption-line-height)] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300">Assets</span>
      </div>
      <div class="absolute bottom-1.5 w-1 h-1 rounded-full bg-[var(--dg-color-text-high-emphasis)] scale-0 opacity-0 group-data-[active=true]:scale-100 group-data-[active=true]:opacity-100 transition-all duration-300 ease-out"></div>
    </button>

    <!-- Activity -->
    <button data-nav-item-id="activity" class="group relative flex flex-col items-center justify-center min-w-[64px] h-full transition-all duration-300 ease-out active:scale-90">
      <div class="flex flex-col items-center gap-1">
        <i data-lucide="arrow-up-right" class="w-[22px] h-[22px] stroke-[1.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300"></i>
        <span class="text-[10px] uppercase tracking-wider font-[var(--dg-type-caption-weight)] leading-[var(--dg-type-caption-line-height)] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300">History</span>
      </div>
      <div class="absolute bottom-1.5 w-1 h-1 rounded-full bg-[var(--dg-color-text-high-emphasis)] scale-0 opacity-0 group-data-[active=true]:scale-100 group-data-[active=true]:opacity-100 transition-all duration-300 ease-out"></div>
    </button>

    <!-- Settings -->
    <button data-nav-item-id="settings" class="group relative flex flex-col items-center justify-center min-w-[64px] h-full transition-all duration-300 ease-out active:scale-90">
      <div class="flex flex-col items-center gap-1">
        <i data-lucide="settings" class="w-[22px] h-[22px] stroke-[1.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300"></i>
        <span class="text-[10px] uppercase tracking-wider font-[var(--dg-type-caption-weight)] leading-[var(--dg-type-caption-line-height)] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-text-high-emphasis)] transition-colors duration-300">Config</span>
      </div>
      <div class="absolute bottom-1.5 w-1 h-1 rounded-full bg-[var(--dg-color-text-high-emphasis)] scale-0 opacity-0 group-data-[active=true]:scale-100 group-data-[active=true]:opacity-100 transition-all duration-300 ease-out"></div>
    </button>

  </div>
</nav>

<style>
  [data-drawgle-primary-nav] button[] {
    pointer-events: none;
  }
  /* Ensure icons and text respond to the data-active attribute set by the renderer */
  [data-drawgle-primary-nav] button[] i {
    color: var(--dg-color-text-high-emphasis) !important;
    transform: translateY(-2px);
  }
  [data-drawgle-primary-nav] button[] span {
    color: var(--dg-color-text-high-emphasis) !important;
    opacity: 1;
  }
  [data-drawgle-primary-nav] button[] .absolute {
    opacity: 1 !important;
    transform: scale(1) !important;
  }
</style></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

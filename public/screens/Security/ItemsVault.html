<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #9CA3AF;
  --dg-color-text-high-emphasis: #121212;
  --dg-color-text-medium-emphasis: #6B7280;
  --dg-color-action-primary: #121212;
  --dg-color-action-disabled: #D1D5DB;
  --dg-color-action-secondary: #E5E7EB;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #E5E7EB;
  --dg-color-border-focused: #121212;
  --dg-color-status-sky-bg: #EBF5FF;
  --dg-color-status-mint-bg: #EBF9F1;
  --dg-color-status-peach-bg: #FFF4ED;
  --dg-color-status-sky-text: #2563EB;
  --dg-color-status-mint-text: #059669;
  --dg-color-status-peach-text: #D97706;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F9F9F7;
  --dg-color-background-secondary: #F2F2F0;
  --dg-radii-app: 24px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 20px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 80px;
  --dg-sizing-standard-input-height: 56px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0 12px 40px rgba(0, 0, 0, 0.08);
  --dg-shadows-surface: 0 4px 20px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.10;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.40;
  --dg-typography-font-family: 'Inter', -apple-system, sans-serif;
  --dg-type-nav-title-size: 22px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 28px;
  --dg-type-screen-title-size: 22px;
  --dg-type-screen-title-weight: 600;
  --dg-type-screen-title-line-height: 28px;
  --dg-type-hero-title-size: 34px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 40px;
  --dg-type-section-title-size: 22px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 28px;
  --dg-type-metric-value-size: 34px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 40px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 24px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 600;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 16px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#F9F9F7] flex flex-col relative overflow-hidden" style="font-family: 'Inter', -apple-system, sans-serif">
  
  <!-- Top Bar -->
  <header class="pt-[16px] px-[24px] flex items-center justify-between w-full bg-[#F9F9F7] z-[10]">
    <div class="flex items-center gap-[16px]">
      <div class="w-[40px] h-[40px] rounded-full overflow-hidden border-[1px] border-[#E5E7EB]">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar" class="w-full h-full object-cover" />
      </div>
    </div>
    <h1 class="text-[34px] font-[700] text-[#121212] leading-[40px] flex-1 ml-[12px]">Items</h1>
    <button class="w-[48px] h-[48px] flex items-center justify-center bg-[#121212] rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.04)] active:scale-95 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
  </header>

  <!-- Main Content Scroll Area -->
  <main class="flex-1 overflow-y-auto px-[24px] pt-[32px] pb-[120px]">
    
    <!-- Category Grid -->
    <section class="grid grid-cols-2 gap-[12px]">
      <!-- Login Card -->
      <div class="bg-white p-[16px] rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col gap-[12px] active:bg-[#F2F2F0] transition-colors cursor-pointer">
        <div class="w-[48px] h-[48px] rounded-[16px] bg-[#F5F3FF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <div>
          <p class="text-[16px] font-[600] text-[#121212]">Login</p>
          <p class="text-[14px] font-[500] text-[#6B7280]">18 items</p>
        </div>
      </div>

      <!-- Secure Note Card -->
      <div class="bg-white p-[16px] rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col gap-[12px] active:bg-[#F2F2F0] transition-colors cursor-pointer">
        <div class="w-[48px] h-[48px] rounded-[16px] bg-[#FFF4ED] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div>
          <p class="text-[16px] font-[600] text-[#121212]">Secure Note</p>
          <p class="text-[14px] font-[500] text-[#6B7280]">12 items</p>
        </div>
      </div>

      <!-- Credit Card Card -->
      <div class="bg-white p-[16px] rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col gap-[12px] active:bg-[#F2F2F0] transition-colors cursor-pointer">
        <div class="w-[48px] h-[48px] rounded-[16px] bg-[#EBF5FF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
        </div>
        <div>
          <p class="text-[16px] font-[600] text-[#121212]">Credit Card</p>
          <p class="text-[14px] font-[500] text-[#6B7280]">4 items</p>
        </div>
      </div>

      <!-- Identity Card -->
      <div class="bg-white p-[16px] rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex flex-col gap-[12px] active:bg-[#F2F2F0] transition-colors cursor-pointer">
        <div class="w-[48px] h-[48px] rounded-[16px] bg-[#EBF9F1] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div>
          <p class="text-[16px] font-[600] text-[#121212]">Identity</p>
          <p class="text-[14px] font-[500] text-[#6B7280]">2 items</p>
        </div>
      </div>
    </section>

    <!-- Tags Section -->
    <section class="mt-[32px]">
      <h2 class="text-[22px] font-[600] text-[#121212] leading-[28px] mb-[16px]">Tags</h2>
      <div class="flex flex-wrap gap-[12px]">
        <button class="h-[40px] px-[16px] rounded-full bg-white border-[1px] border-[#E5E7EB] flex items-center gap-[8px] active:bg-[#F2F2F0] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          <span class="text-[14px] font-[600] text-[#121212]">Starter kits</span>
        </button>
        <button class="h-[40px] px-[16px] rounded-full bg-white border-[1px] border-[#E5E7EB] flex items-center gap-[8px] active:bg-[#F2F2F0] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
          <span class="text-[14px] font-[600] text-[#121212]">Archive</span>
        </button>
        <button class="h-[40px] px-[16px] rounded-full bg-white border-[1px] border-[#E5E7EB] flex items-center gap-[8px] active:bg-[#F2F2F0] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          <span class="text-[14px] font-[600] text-[#121212]">Recently deleted</span>
        </button>
      </div>
    </section>

    <!-- Vaults Section -->
    <section class="mt-[32px]">
      <h2 class="text-[22px] font-[600] text-[#121212] leading-[28px] mb-[16px]">Vaults</h2>
      <div class="flex flex-col gap-[12px]">
        <!-- Personal Vault -->
        <div class="bg-white p-[16px] rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex items-center justify-between active:bg-[#F2F2F0] transition-colors cursor-pointer">
          <div class="flex items-center gap-[16px]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[#F2F2F0] flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#121212" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>
            <span class="text-[16px] font-[600] text-[#121212]">Personal</span>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>

        <!-- Business Vault -->
        <div class="bg-white p-[16px] rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] flex items-center justify-between active:bg-[#F2F2F0] transition-colors cursor-pointer">
          <div class="flex items-center gap-[16px]">
            <div class="w-[48px] h-[48px] rounded-[16px] bg-[#F2F2F0] flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#121212" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            </div>
            <span class="text-[16px] font-[600] text-[#121212]">Business</span>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </section>
  </main>

  <!-- Floating Pill Dock -->
  <nav class="fixed bottom-[32px] left-1/2 -translate-x-1/2 z-[20]">
    <div class="bg-[#121212] rounded-full px-[8px] py-[8px] flex items-center gap-[4px] shadow-[0_12px_40px_rgba(0,0,0,0.15)] border-[1px] border-white/10">
      <!-- Nav Item 1 -->
      <button class="flex items-center gap-[8px] px-[16px] py-[10px] rounded-full transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span class="hidden text-[14px] font-[600] text-[#FFFFFF]">Watchtower</span>
      </button>
      
      <!-- Nav Item 2 (Active) -->
      <button class="flex items-center gap-[8px] px-[20px] py-[10px] rounded-full bg-[#FFFFFF]/10 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span class="text-[14px] font-[600] text-[#FFFFFF]">Items</span>
      </button>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DIN+Next+Round:wght@600;700;800;900&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #AFAFAF;
  --dg-color-text-high-emphasis: #4B4B4B;
  --dg-color-text-medium-emphasis: #777777;
  --dg-color-action-primary: #58CC02;
  --dg-color-action-disabled: #E5E5E5;
  --dg-color-action-secondary: #1CB0F6;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #E5E5E5;
  --dg-color-border-focused: #84D8FF;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #FFFFFF;
  --dg-color-background-secondary: #F7F7F7;
  --dg-radii-app: 16px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 72px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 50px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px -4px 0px 0px rgba(0,0,0,0.05);
  --dg-shadows-surface: 0px 2px 0px 0px #E5E5E5;
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'DIN Next Round', 'Nunito', sans-serif;
  --dg-type-nav-title-size: 18px;
  --dg-type-nav-title-weight: 800;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 800;
  --dg-type-screen-title-line-height: 28px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 900;
  --dg-type-hero-title-line-height: 36px;
  --dg-type-section-title-size: 20px;
  --dg-type-section-title-weight: 800;
  --dg-type-section-title-line-height: 24px;
  --dg-type-metric-value-size: 28px;
  --dg-type-metric-value-weight: 900;
  --dg-type-metric-value-line-height: 32px;
  --dg-type-body-size: 17px;
  --dg-type-body-weight: 600;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 15px;
  --dg-type-supporting-weight: 600;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 13px;
  --dg-type-caption-weight: 700;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 16px;
  --dg-type-button-label-weight: 800;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-standard: 2px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 24px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 16px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'DIN Next Round', 'Nunito', sans-serif">
  <!-- Status Header -->
  <header class="sticky top-0 z-50 dg-bg-primary border-b-2 dg-border-divider px-[var(--dg-mobile-layout-screen-margin)] h-[64px] flex items-center justify-between">
    <div class="flex items-center gap-[var(--dg-spacing-md)]">
      <!-- Flag/Language -->
      <div class="w-8 h-6 bg-[#FF4B4B] rounded-sm border-2 border-black/10 flex items-center justify-center overflow-hidden">
        <div class="w-full h-1/3 bg-[#FF4B4B]"></div>
        <div class="w-full h-1/3 bg-[#FFD700]"></div>
        <div class="w-full h-1/3 bg-[#000000]"></div>
      </div>
      <!-- Streak -->
      <div class="flex items-center gap-[var(--dg-spacing-xxs)]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF9600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-flame"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        <span class="dg-type-nav-title text-[#FF9600]">124</span>
      </div>
    </div>

    <div class="flex items-center gap-[var(--dg-spacing-md)]">
      <!-- Gems -->
      <div class="flex items-center gap-[var(--dg-spacing-xxs)]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1CB0F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-gem"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>
        <span class="dg-type-nav-title text-[var(--dg-color-action-secondary)]">1,420</span>
      </div>
      <!-- Hearts -->
      <div class="flex items-center gap-[var(--dg-spacing-xxs)]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF4B4B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        <span class="dg-type-nav-title text-[#FF4B4B]">5</span>
      </div>
    </div>
  </header>

  <!-- Main Scrollable Content -->
  <main class="flex-1 flex flex-col pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+96px)]">
    
    <!-- Unit Header -->
    <section class="w-full bg-[var(--dg-color-action-primary)] p-[var(--dg-mobile-layout-screen-margin)] flex flex-col gap-[var(--dg-spacing-xxs)] shadow-[0px_4px_0px_0px_#46A302]">
      <div class="flex items-center justify-between">
        <div class="flex flex-col">
          <h2 class="dg-type-section-title text-white uppercase tracking-wider opacity-80 text-[14px]">Section 1, Unit 1</h2>
          <h1 class="dg-type-section-title text-white">Order food and drink</h1>
        </div>
        <button class="w-12 h-12 rounded-[var(--dg-radii-app)] bg-white/20 flex items-center justify-center border-b-4 border-black/10 active:border-b-0 active:translate-y-[2px]">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </button>
      </div>
    </section>

    <!-- Path Container -->
    <div class="relative flex flex-col items-center py-[var(--dg-mobile-layout-section-gap)]">
      
      <!-- Vertical Connecting Line -->
      <div class="absolute top-0 bottom-0 w-3 bg-[var(--dg-color-action-disabled)] left-1/2 -translate-x-1/2 z-0"></div>

      <!-- Node 1: Active (Center) -->
      <div class="relative z-10 mb-8 flex flex-col items-center">
        <!-- Duo Mascot Floating -->
        <div class="absolute -top-12 left-14 animate-bounce">
          <div class="bg-white border-2 dg-border-divider px-3 py-1 rounded-xl relative shadow-sm">
            <span class="dg-type-caption text-[var(--dg-color-action-primary)]">START</span>
            <div class="absolute -bottom-2 left-2 w-3 h-3 bg-white border-r-2 border-b-2 dg-border-divider rotate-45"></div>
          </div>
          <div class="w-12 h-12 mt-1">
            <svg viewBox="0 0 100 100" class="w-full h-full">
              <circle cx="50" cy="50" r="40" fill="#58CC02" />
              <circle cx="35" cy="40" r="8" fill="white" />
              <circle cx="65" cy="40" r="8" fill="white" />
              <circle cx="35" cy="40" r="3" fill="black" />
              <circle cx="65" cy="40" r="3" fill="black" />
              <path d="M40 65 Q50 75 60 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
            </svg>
          </div>
        </div>
        <button class="w-[70px] h-[70px] rounded-full bg-[var(--dg-color-action-primary)] border-b-[6px] border-[#46A302] flex items-center justify-center active:border-b-0 active:translate-y-[4px] transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>

      <!-- Node 2: Locked (Right) -->
      <div class="relative z-10 mb-8 translate-x-12">
        <button class="w-[60px] h-[60px] rounded-full bg-[var(--dg-color-action-disabled)] border-b-[6px] border-[#CFCFCF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFAFAF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-headphones"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg>
        </button>
      </div>

      <!-- Node 3: Locked (Center) -->
      <div class="relative z-10 mb-8">
        <button class="w-[60px] h-[60px] rounded-full bg-[var(--dg-color-action-disabled)] border-b-[6px] border-[#CFCFCF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFAFAF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>

      <!-- Node 4: Locked (Left) -->
      <div class="relative z-10 mb-8 -translate-x-12">
        <button class="w-[60px] h-[60px] rounded-full bg-[var(--dg-color-action-disabled)] border-b-[6px] border-[#CFCFCF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFAFAF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-briefcase"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </button>
      </div>

      <!-- Node 5: Chest (Center) -->
      <div class="relative z-10 mb-8">
        <button class="w-[60px] h-[60px] rounded-full bg-[var(--dg-color-action-disabled)] border-b-[6px] border-[#CFCFCF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFAFAF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-package"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
        </button>
      </div>

      <!-- Node 6: Locked (Right) -->
      <div class="relative z-10 mb-8 translate-x-12">
        <button class="w-[60px] h-[60px] rounded-full bg-[var(--dg-color-action-disabled)] border-b-[6px] border-[#CFCFCF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFAFAF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>

      <!-- Unit 2 Preview -->
      <div class="w-full mt-12 px-[var(--dg-mobile-layout-screen-margin)]">
        <div class="w-full h-[2px] bg-[var(--dg-color-border-divider)] mb-12"></div>
        <section class="w-full bg-[var(--dg-color-action-secondary)] p-[var(--dg-mobile-layout-screen-margin)] rounded-[var(--dg-radii-app)] flex flex-col gap-[var(--dg-spacing-xxs)] shadow-[0px_4px_0px_0px_#1899D6]">
          <h2 class="dg-type-section-title text-white uppercase tracking-wider opacity-80 text-[14px]">Section 1, Unit 2</h2>
          <h1 class="dg-type-section-title text-white">Greet people, say goodbye</h1>
        </section>
      </div>

      <!-- Node 7: Locked (Center) -->
      <div class="relative z-10 mt-12 mb-8">
        <button class="w-[60px] h-[60px] rounded-full bg-[var(--dg-color-action-disabled)] border-b-[6px] border-[#CFCFCF] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AFAFAF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-star"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>

    </div>
  </main>

  <!-- Floating Action Button -->
  <div class="fixed bottom-[calc(var(--dg-sizing-bottom-nav-height)+24px)] right-[var(--dg-mobile-layout-screen-margin)] z-40">
    <button class="w-14 h-14 rounded-full bg-[var(--dg-color-action-primary)] shadow-[0px_4px_0px_0px_#46A302] flex items-center justify-center active:shadow-none active:translate-y-[4px] transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>

</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-0 left-0 right-0 w-full bg-[var(--dg-color-background-primary)] border-t-[var(--dg-border-widths-standard)] border-[var(--dg-color-border-divider)] z-[1000] select-none" style="border-color: var(--dg-color-border-divider)">
  <div class="flex flex-row items-stretch justify-around w-full max-w-[390px] mx-auto h-[var(--dg-sizing-bottom-nav-height)] px-[var(--dg-spacing-xs)]">
    
    <!-- Learn -->
    <button 
      data-nav-item-id="learn" 
      class="group relative flex flex-col items-center justify-center flex-1 transition-all duration-150 active:translate-y-[2px]">
      <div class="flex items-center justify-center w-full h-full py-[var(--dg-spacing-xs)] rounded-[var(--dg-radii-app)] group-data-[active=true]:bg-[rgba(88,204,2,0.1)]">
        <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)]">
          <i data-lucide="home" class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[2.5px] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-action-primary)] transition-transform group-data-[active=true]:scale-110"></i>
          <span class="dg-type-caption uppercase tracking-[0.05em] text-[var(--dg-color-text-low-emphasis)] group-data-[active=true]:text-[var(--dg-color-action-primary)]"></span>
        </div>
      </div>
    </button>

    <!-- Practice -->
    <button

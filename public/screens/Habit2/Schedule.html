<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #A1A1A1;
  --dg-color-text-high-emphasis: #000000;
  --dg-color-text-medium-emphasis: #6B6B6B;
  --dg-color-action-primary: #000000;
  --dg-color-action-disabled: #E5E5E5;
  --dg-color-action-secondary: #007AFF;
  --dg-color-action-on-primary-text: #FFFFFF;
  --dg-color-border-divider: #F0F0F0;
  --dg-color-border-focused: #000000;
  --dg-color-surface-card: #FFFFFF;
  --dg-color-surface-modal: #FFFFFF;
  --dg-color-surface-bottom-sheet: #FFFFFF;
  --dg-color-background-primary: #F8F8F8;
  --dg-color-background-secondary: #FFFFFF;
  --dg-color-functional-gym: #42A5F5;
  --dg-color-functional-work: #FF8A65;
  --dg-color-functional-academics: #66BB6A;
  --dg-color-functional-nutrition: #FF5252;
  --dg-radii-app: 24px;
  --dg-radii-pill: 9999px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 64px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 52px;
  --dg-shadows-none: none;
  --dg-shadows-overlay: 0px 10px 30px rgba(0, 0, 0, 0.12);
  --dg-shadows-surface: 0px 4px 20px rgba(0, 0, 0, 0.04);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: 'Inter', -apple-system, sans-serif;
  --dg-type-nav-title-size: 17px;
  --dg-type-nav-title-weight: 600;
  --dg-type-nav-title-line-height: 22px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 32px;
  --dg-type-hero-title-size: 28px;
  --dg-type-hero-title-weight: 500;
  --dg-type-hero-title-line-height: 34px;
  --dg-type-section-title-size: 16px;
  --dg-type-section-title-weight: 600;
  --dg-type-section-title-line-height: 20px;
  --dg-type-metric-value-size: 22px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 28px;
  --dg-type-body-size: 15px;
  --dg-type-body-weight: 400;
  --dg-type-body-line-height: 20px;
  --dg-type-supporting-size: 13px;
  --dg-type-supporting-weight: 500;
  --dg-type-supporting-line-height: 18px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 400;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 14px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 18px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 24px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 20px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen dg-bg-primary dg-text-high flex flex-col relative overflow-x-hidden" style="font-family: 'Inter', -apple-system, sans-serif">
  <!-- Top Bar -->
  <header class="flex items-center justify-between px-[var(--dg-mobile-layout-screen-margin)] pt-[var(--dg-mobile-layout-safe-area-top)] pb-[var(--dg-spacing-md)]">
    <h1 class="dg-type-screen-title">Schedule</h1>
    <button class="w-[48px] h-[48px] flex items-center justify-end" aria-label="Calendar View">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-days"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
    </button>
  </header>

  <!-- Horizontal Calendar Strip -->
  <div class="w-full overflow-x-hidden no-scrollbar px-[var(--dg-mobile-layout-screen-margin)] mb-[var(--dg-mobile-layout-section-gap)]">
    <div class="flex items-center justify-between min-w-full gap-[var(--dg-spacing-xs)]">
      <!-- Sunday -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-low uppercase tracking-wider">S</span>
        <span class="dg-type-body font-medium">8</span>
      </div>
      <!-- Monday -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-low uppercase tracking-wider">M</span>
        <span class="dg-type-body font-medium">9</span>
      </div>
      <!-- Tuesday -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-low uppercase tracking-wider">T</span>
        <span class="dg-type-body font-medium">10</span>
      </div>
      <!-- Wednesday -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-low uppercase tracking-wider">W</span>
        <span class="dg-type-body font-medium">11</span>
      </div>
      <!-- Thursday -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-low uppercase tracking-wider">T</span>
        <span class="dg-type-body font-medium">12</span>
      </div>
      <!-- Friday (Active) -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-high font-bold uppercase tracking-wider">F</span>
        <div class="w-[36px] h-[36px] dg-bg-primary bg-black rounded-full flex items-center justify-center">
          <span class="text-white dg-type-body font-bold">13</span>
        </div>
      </div>
      <!-- Saturday -->
      <div class="flex flex-col items-center gap-[var(--dg-spacing-xxs)] min-w-[40px]">
        <span class="dg-type-caption dg-text-low uppercase tracking-wider">S</span>
        <span class="dg-type-body font-medium">14</span>
      </div>
    </div>
  </div>

  <!-- Main Content Area -->
  <main class="flex-1 px-[var(--dg-mobile-layout-screen-margin)] flex flex-col gap-[var(--dg-mobile-layout-section-gap)] pb-[calc(var(--dg-mobile-layout-safe-area-bottom)+116px)]" style="background-color: var(--dg-color-background-primary)">
    
    <!-- Section Header -->
    <div class="flex items-center justify-between">
      <h2 class="dg-type-section-title">To-do</h2>
      <button class="flex items-center gap-[var(--dg-spacing-xxs)] dg-text-medium hover:opacity-70 transition-opacity">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        <span class="dg-type-button-label">New</span>
      </button>
    </div>

    <!-- Daily Timeline Card -->
    <div class="dg-surface-card rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] p-[var(--dg-spacing-md)] flex flex-col">
      <!-- Card Date Header -->
      <div class="mb-[var(--dg-spacing-md)]">
        <h3 class="dg-type-section-title">Friday 13, 2026</h3>
      </div>

      <!-- Timeline List -->
      <div class="flex flex-col">
        <!-- Task 1 -->
        <div class="flex items-center justify-between py-[var(--dg-spacing-md)] border-b dg-border-divider">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-[#F2F2F7] flex items-center justify-center text-black">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-briefcase"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <span class="dg-type-body font-medium">Morning Standup</span>
          </div>
          <span class="dg-type-supporting dg-text-medium">09:00 AM</span>
        </div>

        <!-- Task 2 -->
        <div class="flex items-center justify-between py-[var(--dg-spacing-md)] border-b dg-border-divider">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-[#E5F1FF] flex items-center justify-center text-[var(--dg-color-action-secondary)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-dumbbell"><path d="M6.5 6.5 4 9"/><path d="m15 15 2.5 2.5"/><path d="m3 21 2-2"/><path d="m19 5 2-2"/><path d="M14.5 14.5 19 10"/><path d="M10 19 5.5 14.5"/><path d="M12.4 15.8c.3-.3.8-.3 1.1 0l2.7 2.7c.3.3.3.8 0 1.1l-1.2 1.2c-.3.3-.8.3-1.1 0l-2.7-2.7c-.3-.3-.3-.8 0-1.1l1.2-1.2Z"/><path d="M15.8 12.4c-.3.3-.3.8 0 1.1l2.7 2.7c.3.3.8.3 1.1 0l1.2-1.2c.3-.3.3-.8 0-1.1l-2.7-2.7c-.3-.3-.8-.3-1.1 0l-1.2 1.2Z"/><path d="M4.2 7.4c-.3.3-.3.8 0 1.1l2.7 2.7c.3.3.8.3 1.1 0l1.2-1.2c.3-.3.3-.8 0-1.1L6.5 6.3c-.3-.3-.8-.3-1.1 0L4.2 7.4Z"/><path d="M7.4 4.2c-.3-.3-.8-.3-1.1 0L5.1 5.4c-.3.3-.3.8 0 1.1l2.7 2.7c.3.3.8.3 1.1 0l1.2-1.2c.3-.3.3-.8 0-1.1L7.4 4.2Z"/></svg>
            </div>
            <span class="dg-type-body font-medium">Gym Session</span>
          </div>
          <span class="dg-type-supporting dg-text-medium">12:30 PM</span>
        </div>

        <!-- Task 3 -->
        <div class="flex items-center justify-between py-[var(--dg-spacing-md)] border-b dg-border-divider">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-[#FFF9E5] flex items-center justify-center text-[#FF9500]">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-utensils"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
            </div>
            <span class="dg-type-body font-medium">Lunch with Sarah</span>
          </div>
          <span class="dg-type-supporting dg-text-medium">01:45 PM</span>
        </div>

        <!-- Task 4 -->
        <div class="flex items-center justify-between py-[var(--dg-spacing-md)]">
          <div class="flex items-center gap-[var(--dg-spacing-md)]">
            <div class="w-[40px] h-[40px] rounded-full bg-[#F2F2F7] flex items-center justify-center text-black">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-code-2"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            </div>
            <span class="dg-type-body font-medium">Deep Work: UI Design</span>
          </div>
          <span class="dg-type-supporting dg-text-medium">03:00 PM</span>
        </div>
      </div>
    </div>

    <!-- Insight Card -->
    <div class="dg-surface-card rounded-[var(--dg-radii-app)] shadow-[var(--dg-shadows-surface)] p-[var(--dg-spacing-md)] bg-black flex items-center gap-[var(--dg-spacing-md)]">
      <div class="w-[48px] h-[48px] rounded-full bg-white/10 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles"><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
      </div>
      <div class="flex flex-col">
        <span class="text-white dg-type-supporting font-semibold">Daily Insight</span>
        <p class="text-white/70 dg-type-caption">You're most productive between 10 AM and 1 PM. Try scheduling deep work then.</p>
      </div>
    </div>

  </main>
</div>
      <div id="drawgle-export-navigation"><nav data-drawgle-primary-nav class="fixed bottom-[var(--dg-mobile-layout-safe-area-bottom)] left-1/2 -translate-x-1/2 flex items-center justify-center w-fit h-[var(--dg-sizing-bottom-nav-height)] bg-[var(--dg-color-surface-card)] dg-radius-pill dg-shadow-overlay border border-[var(--dg-color-border-divider)] px-[var(--dg-spacing-xs)] z-[100] backdrop-blur-md">
  <div class="flex items-center justify-center gap-[var(--dg-spacing-xs)]">
    
    <!-- Home Item -->
    <button 
      data-nav-item-id="home" 
      class="group relative flex items-center justify-center w-[56px] h-[48px] dg-radius-pill transition-all duration-300 ease-out data-[active=true]:bg-[var(--dg-color-action-primary)] active:scale-95">
      <i 
        data-lucide="home" 
        class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1.5px] transition-colors duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] text-[var(--dg-color-text-medium-emphasis)]"
      ></i>
      <span class="sr-only">Home</span>
    </button>

    <!-- Analytics Item -->
    <button 
      data-nav-item-id="analytics" 
      class="group relative flex items-center justify-center w-[56px] h-[48px] dg-radius-pill transition-all duration-300 ease-out data-[active=true]:bg-[var(--dg-color-action-primary)] active:scale-95">
      <i 
        data-lucide="bar-chart-2" 
        class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1.5px] transition-colors duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] text-[var(--dg-color-text-medium-emphasis)]"
      ></i>
      <span class="sr-only">Analytics</span>
    </button>

    <!-- Schedule Item -->
    <button 
      data-nav-item-id="schedule" 
      class="group relative flex items-center justify-center w-[56px] h-[48px] dg-radius-pill transition-all duration-300 ease-out data-[active=true]:bg-[var(--dg-color-action-primary)] active:scale-95">
      <i 
        data-lucide="calendar" 
        class="w-[var(--dg-sizing-icon-standard)] h-[var(--dg-sizing-icon-standard)] stroke-[1.5px] transition-colors duration-300 group-data-[active=true]:text-[var(--dg-color-action-on-primary-text)] text-[var(--dg-color-text-medium-emphasis)]"
      ></i>
      <span class="sr-only">Schedule</span>
    </button>

  </div>
</nav></div>
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="drawgle-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&amp;display=swap">
    <style>
:root {
  --dg-color-text-low-emphasis: #555555;
  --dg-color-text-high-emphasis: #FFFFFF;
  --dg-color-text-medium-emphasis: #999999;
  --dg-color-action-primary: #A5D6B7;
  --dg-color-action-disabled: #333333;
  --dg-color-action-secondary: #E8B4B8;
  --dg-color-action-accent-sand: #E9D3A3;
  --dg-color-action-on-primary-text: #000000;
  --dg-color-border-divider: #262626;
  --dg-color-border-focused: #FFFFFF;
  --dg-color-surface-card: #1A1A1A;
  --dg-color-surface-modal: #2C2C2E;
  --dg-color-surface-bottom-sheet: #1C1C1E;
  --dg-color-background-primary: #000000;
  --dg-color-background-secondary: #121212;
  --dg-radii-lg: 24px;
  --dg-radii-md: 16px;
  --dg-radii-sm: 8px;
  --dg-radii-xl: 32px;
  --dg-radii-app: 24px;
  --dg-radii-pill: 9999px;
  --dg-radii-sharp: 0px;
  --dg-sizing-icon-small: 18px;
  --dg-sizing-icon-standard: 24px;
  --dg-sizing-min-touch-target: 48px;
  --dg-sizing-bottom-nav-height: 84px;
  --dg-sizing-standard-input-height: 52px;
  --dg-sizing-standard-button-height: 56px;
  --dg-shadows-lg: 0 12px 24px rgba(0,0,0,0.6);
  --dg-shadows-md: 0 4px 12px rgba(0,0,0,0.5);
  --dg-shadows-sm: 0 2px 4px rgba(0,0,0,0.3);
  --dg-shadows-none: none;
  --dg-shadows-upward: 0 -4px 16px rgba(0,0,0,0.4);
  --dg-shadows-overlay: 0 -4px 16px rgba(0,0,0,0.4);
  --dg-shadows-surface: 0 4px 12px rgba(0,0,0,0.5);
  --dg-spacing-none: 0px;
  --dg-spacing-lg: 24px;
  --dg-spacing-md: 16px;
  --dg-spacing-sm: 12px;
  --dg-spacing-xl: 32px;
  --dg-spacing-xs: 8px;
  --dg-spacing-xxl: 48px;
  --dg-spacing-xxs: 4px;
  --dg-z-index-base: 0;
  --dg-z-index-bottom-nav: 20;
  --dg-z-index-bottom-sheet: 30;
  --dg-z-index-modal-dialog: 40;
  --dg-z-index-sticky-header: 10;
  --dg-z-index-toast-snackbar: 50;
  --dg-opacities-opaque: 1;
  --dg-opacities-pressed: 0.12;
  --dg-opacities-disabled: 0.38;
  --dg-opacities-transparent: 0;
  --dg-opacities-scrim-overlay: 0.50;
  --dg-typography-font-family: SF Pro Display, Inter, system-ui, sans-serif;
  --dg-type-nav-title-size: 24px;
  --dg-type-nav-title-weight: 700;
  --dg-type-nav-title-line-height: 28px;
  --dg-type-screen-title-size: 24px;
  --dg-type-screen-title-weight: 700;
  --dg-type-screen-title-line-height: 28px;
  --dg-type-hero-title-size: 32px;
  --dg-type-hero-title-weight: 700;
  --dg-type-hero-title-line-height: 38px;
  --dg-type-section-title-size: 24px;
  --dg-type-section-title-weight: 700;
  --dg-type-section-title-line-height: 28px;
  --dg-type-metric-value-size: 32px;
  --dg-type-metric-value-weight: 700;
  --dg-type-metric-value-line-height: 38px;
  --dg-type-body-size: 16px;
  --dg-type-body-weight: 500;
  --dg-type-body-line-height: 22px;
  --dg-type-supporting-size: 14px;
  --dg-type-supporting-weight: 400;
  --dg-type-supporting-line-height: 20px;
  --dg-type-caption-size: 12px;
  --dg-type-caption-weight: 500;
  --dg-type-caption-line-height: 16px;
  --dg-type-button-label-size: 15px;
  --dg-type-button-label-weight: 600;
  --dg-type-button-label-line-height: 20px;
  --dg-border-widths-none: 0px;
  --dg-border-widths-thin: 1px;
  --dg-border-widths-thick: 2px;
  --dg-border-widths-hairline: 0.5px;
  --dg-border-widths-standard: 1px;
  --dg-mobile-layout-element-gap: 12px;
  --dg-mobile-layout-section-gap: 32px;
  --dg-mobile-layout-safe-area-top: 16px;
  --dg-mobile-layout-screen-margin: 24px;
  --dg-mobile-layout-safe-area-bottom: 16px;
}

#root {
  --dg-preview-background: var(--dg-color-background-primary, #ffffff);
  background: var(--dg-preview-background);
}

.dg-bg-primary { background-color: var(--dg-color-background-primary); }
.dg-bg-secondary { background-color: var(--dg-color-background-secondary); }
.dg-surface-card { background-color: var(--dg-color-surface-card); }
.dg-surface-bottom-sheet { background-color: var(--dg-color-surface-bottom-sheet); }
.dg-surface-modal { background-color: var(--dg-color-surface-modal); }
.dg-text-high { color: var(--dg-color-text-high-emphasis); }
.dg-text-medium { color: var(--dg-color-text-medium-emphasis); }
.dg-text-low { color: var(--dg-color-text-low-emphasis); }
.dg-action-primary {
  background-color: var(--dg-color-action-primary);
  color: var(--dg-color-action-on-primary-text);
}
.dg-action-secondary { background-color: var(--dg-color-action-secondary); }
.dg-border-divider { border-color: var(--dg-color-border-divider); }
.dg-border-focused { border-color: var(--dg-color-border-focused); }
.dg-radius-app { border-radius: var(--dg-radii-app); }
.dg-radius-pill { border-radius: var(--dg-radii-pill); }
.dg-shadow-surface { box-shadow: var(--dg-shadows-surface); }
.dg-shadow-overlay { box-shadow: var(--dg-shadows-overlay); }
.dg-screen-padding { padding-left: var(--dg-mobile-layout-screen-margin); padding-right: var(--dg-mobile-layout-screen-margin); }
.dg-section-gap { gap: var(--dg-mobile-layout-section-gap); }
.dg-element-gap { gap: var(--dg-mobile-layout-element-gap); }

.dg-type-nav-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-nav-title-size);
  font-weight: var(--dg-type-nav-title-weight);
  line-height: var(--dg-type-nav-title-line-height);
}

.dg-type-screen-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-screen-title-size);
  font-weight: var(--dg-type-screen-title-weight);
  line-height: var(--dg-type-screen-title-line-height);
}

.dg-type-hero-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-hero-title-size);
  font-weight: var(--dg-type-hero-title-weight);
  line-height: var(--dg-type-hero-title-line-height);
}

.dg-type-section-title {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-section-title-size);
  font-weight: var(--dg-type-section-title-weight);
  line-height: var(--dg-type-section-title-line-height);
}

.dg-type-metric-value {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-metric-value-size);
  font-weight: var(--dg-type-metric-value-weight);
  line-height: var(--dg-type-metric-value-line-height);
}

.dg-type-body {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-body-size);
  font-weight: var(--dg-type-body-weight);
  line-height: var(--dg-type-body-line-height);
}

.dg-type-supporting {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-supporting-size);
  font-weight: var(--dg-type-supporting-weight);
  line-height: var(--dg-type-supporting-line-height);
}

.dg-type-caption {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-caption-size);
  font-weight: var(--dg-type-caption-weight);
  line-height: var(--dg-type-caption-line-height);
}

.dg-type-button-label {
  font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  font-size: var(--dg-type-button-label-size);
  font-weight: var(--dg-type-button-label-weight);
  line-height: var(--dg-type-button-label-line-height);
}
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#000000] flex flex-col relative overflow-hidden" style="font-family: SF Pro Display, Inter, system-ui, sans-serif">
  
  <!-- Header Section -->
  <header class="pt-[16px] px-[24px] flex items-center justify-between z-[10]">
    <div class="flex flex-col">
      <div class="flex items-center gap-[12px] mb-[4px]">
        <button class="w-[40px] h-[40px] bg-[#1A1A1A] rounded-[14px] flex items-center justify-center border border-[#262626] active:scale-95 transition-transform" aria-label="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <h1 class="text-[24px] font-[700] text-[#FFFFFF] leading-[28px]">Monthly Profits</h1>
      </div>
      <p class="text-[#A5D6B7] text-[14px] font-[500] ml-[52px]">Total Profit Growth of 26%</p>
    </div>
    <button class="w-[48px] h-[48px] bg-[#1A1A1A] rounded-[16px] flex items-center justify-center border border-[#262626] active:scale-95 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </header>

  <!-- Hero Visualization: Donut Chart -->
  <section class="relative flex flex-col items-center justify-center py-[32px] min-h-[340px]">
    <!-- Donut SVG -->
    <div class="relative w-[240px] h-[240px]">
      <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
        <!-- Background Track -->
        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#1A1A1A" stroke-width="12"/>
        
        <!-- Mint Segment (Giveaway 60%) -->
        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#A5D6B7" stroke-width="12" 
                stroke-dasharray="150.8 251.3" stroke-dashoffset="0" stroke-linecap="round"/>
        
        <!-- Peach Segment (Affiliate 21%) -->
        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#E8B4B8" stroke-width="12" 
                stroke-dasharray="52.8 251.3" stroke-dashoffset="-150.8" stroke-linecap="round"/>
        
        <!-- Sand Segment (Offline 19%) -->
        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#E9D3A3" stroke-width="12" 
                stroke-dasharray="47.7 251.3" stroke-dashoffset="-203.6" stroke-linecap="round"/>
      </svg>
      
      <!-- Central Metric -->
      <div class="absolute inset-0 flex flex-col items-center justify-center">
        <span class="text-[#999999] text-[12px] font-[500] uppercase tracking-wider">Total</span>
        <span class="text-[#FFFFFF] text-[28px] font-[700]">$94,475</span>
      </div>
    </div>

    <!-- Floating Price Tags -->
    <!-- Tag 1: Mint ($56,685) -->
    <div class="absolute top-[60px] left-[40px] bg-[#1A1A1A] border border-[#262626] px-[12px] py-[8px] rounded-[16px] shadow-lg flex items-center gap-[6px] animate-pulse">
      <div class="w-[8px] h-[8px] rounded-full bg-[#A5D6B7]"></div>
      <span class="text-[#FFFFFF] text-[14px] font-[600]">$56,685</span>
    </div>

    <!-- Tag 2: Peach ($19,839) -->
    <div class="absolute top-[80px] right-[30px] bg-[#1A1A1A] border border-[#262626] px-[12px] py-[8px] rounded-[16px] shadow-lg flex items-center gap-[6px]">
      <div class="w-[8px] h-[8px] rounded-full bg-[#E8B4B8]"></div>
      <span class="text-[#FFFFFF] text-[14px] font-[600]">$19,839</span>
    </div>

    <!-- Tag 3: Sand ($17,950) -->
    <div class="absolute bottom-[60px] right-[50px] bg-[#1A1A1A] border border-[#262626] px-[12px] py-[8px] rounded-[16px] shadow-lg flex items-center gap-[6px]">
      <div class="w-[8px] h-[8px] rounded-full bg-[#E9D3A3]"></div>
      <span class="text-[#FFFFFF] text-[14px] font-[600]">$17,950</span>
    </div>
  </section>

  <!-- Channel Stats Section -->
  <section class="px-[24px] mb-[32px]">
    <h2 class="text-[#FFFFFF] text-[18px] font-[700] mb-[20px]">Channel Stats</h2>
    <div class="space-y-[20px]">
      <!-- Giveaway -->
      <div class="flex flex-col gap-[8px]">
        <div class="flex justify-between items-center">
          <span class="text-[#999999] text-[14px] font-[500]">Giveaway</span>
          <span class="text-[#FFFFFF] text-[14px] font-[600]">60%</span>
        </div>
        <div class="h-[10px] w-full bg-[#1A1A1A] rounded-full overflow-hidden">
          <div class="h-full bg-[#A5D6B7] rounded-full" style="width: 60%"></div>
        </div>
      </div>
      
      <!-- Affiliate -->
      <div class="flex flex-col gap-[8px]">
        <div class="flex justify-between items-center">
          <span class="text-[#999999] text-[14px] font-[500]">Affiliate</span>
          <span class="text-[#FFFFFF] text-[14px] font-[600]">21%</span>
        </div>
        <div class="h-[10px] w-full bg-[#1A1A1A] rounded-full overflow-hidden">
          <div class="h-full bg-[#E8B4B8] rounded-full" style="width: 21%"></div>
        </div>
      </div>

      <!-- Offline Sales -->
      <div class="flex flex-col gap-[8px]">
        <div class="flex justify-between items-center">
          <span class="text-[#999999] text-[14px] font-[500]">Offline Sales</span>
          <span class="text-[#FFFFFF] text-[14px] font-[600]">19%</span>
        </div>
        <div class="h-[10px] w-full bg-[#1A1A1A] rounded-full overflow-hidden">
          <div class="h-full bg-[#E9D3A3] rounded-full" style="width: 19%"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Recent Sales Section -->
  <section class="px-[24px] pb-[24px]">
    <div class="flex justify-between items-center mb-[16px]">
      <h2 class="text-[#FFFFFF] text-[18px] font-[700]">Recent Sales</h2>
      <button class="text-[#A5D6B7] text-[14px] font-[600]">View All</button>
    </div>
    <div class="space-y-[12px]">
      <!-- Sale Item 1 -->
      <div class="bg-[#1A1A1A] p-[16px] rounded-[24px] flex items-center justify-between border border-[#262626]">
        <div class="flex items-center gap-[16px]">
          <div class="w-[48px] h-[48px] bg-[#262626] rounded-[16px] flex items-center justify-center overflow-hidden">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="w-full h-full object-cover" />
          </div>
          <div class="flex flex-col">
            <span class="text-[#FFFFFF] text-[16px] font-[600]">Apple Store</span>
            <span class="text-[#555555] text-[12px]">12 Oct, 2023 • 14:20</span>
          </div>
        </div>
        <span class="text-[#A5D6B7] text-[16px] font-[700]">+$1,240.00</span>
      </div>

      <!-- Sale Item 2 -->
      <div class="bg-[#1A1A1A] p-[16px] rounded-[24px] flex items-center justify-between border border-[#262626]">
        <div class="flex items-center gap-[16px]">
          <div class="w-[48px] h-[48px] bg-[#262626] rounded-[16px] flex items-center justify-center overflow-hidden">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Stripe" alt="Avatar" class="w-full h-full object-cover" />
          </div>
          <div class="flex flex-col">
            <span class="text-[#FFFFFF] text-[16px] font-[600]">Stripe Payout</span>
            <span class="text-[#555555] text-[12px]">11 Oct, 2023 • 09:45</span>
          </div>
        </div>
        <span class="text-[#A5D6B7] text-[16px] font-[700]">+$4,500.00</span>
      </div>
    </div>
  </section>

  <!-- Persistent Bottom Navigation Dock -->

</div>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
</html>

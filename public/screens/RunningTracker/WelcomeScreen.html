      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: var(--dg-typography-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
        background: var(--dg-color-background-primary, #ffffff);
        color: var(--dg-color-text-high-emphasis, #111827);
      }
      #drawgle-export-root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background: var(--dg-color-background-primary, #ffffff);
      }
      #drawgle-export-navigation { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; pointer-events: none; }
      #drawgle-export-navigation [data-drawgle-primary-nav] { pointer-events: auto; }

  <body>
    <div id="drawgle-export-root">
<div class="w-full min-h-screen bg-[#F4F4F4] flex flex-col relative overflow-hidden" style="font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif">
  
  <!-- Header Section -->
  <div class="pt-[44px] px-[32px] flex flex-col">
    <h1 class="text-[34px] font-[600] leading-[42px] tracking-tight">
      <span class="text-[#999999]">Let's Start</span><br/>
      <span class="text-[#E86B41]">Strong!</span>
    </h1>
  </div>

  <!-- Athlete Image Section -->
  <div class="flex-1 relative flex items-end justify-center mt-[20px]">
    <!-- Decorative Background Shape -->
    <div class="absolute bottom-0 w-[280px] h-[380px] bg-[#E86B41] rounded-t-[140px] rounded-b-[32px]"></div>
    
    <!-- Athlete Cutout -->
    <!-- Using a high-quality placeholder for a male athlete lifting weights -->
    <img 
      src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1000&auto=format&fit=crop" 
      alt="Athlete" 
      class="relative z-10 w-full h-full object-contain object-bottom scale-110 translate-y-[20px]"
      style="filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));"
    />
  </div>

  <!-- Bottom Content Card -->
  <div class="bg-white rounded-t-[32px] px-[32px] pt-[32px] pb-[34px] shadow-[0_-8px_30px_rgba(0,0,0,0.04)] relative z-20">
    <div class="flex flex-col gap-[8px] mb-[32px]">
      <div class="flex items-center gap-[8px]">
        <h2 class="text-[34px] font-[600] leading-[42px] text-[#1A1A1A]">Train Hard</h2>
        <span class="text-[28px]">🔥</span>
      </div>
      <h3 class="text-[34px] font-[600] leading-[42px] text-[#1A1A1A] -mt-[8px]">Improve Every Day</h3>
      <p class="text-[14px] font-[400] leading-[20px] text-[#666666] mt-[8px] max-w-[280px]">
        Join our athletic club for exclusive workouts, challenges, and sports.
      </p>
    </div>

    <!-- Swipe To Start Slider -->
    <div class="relative w-full h-[64px] bg-[#E86B41] rounded-full p-[6px] flex items-center group cursor-pointer overflow-hidden">
      <!-- Handle -->
      <div class="h-[52px] w-[52px] bg-white rounded-full flex items-center justify-center shadow-md z-10">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E86B41" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 .5-.5"/><path d="m15 19 .5-.5"/><path d="m19 15 .5-.5"/><path d="m22 18 .5-.5"/><path d="m9 27.1.5-.5"/><path d="m6 24.1.5-.5"/><path d="m10 20.1.5-.5"/><path d="m13 17.1.5-.5"/>
          <path d="M14.4 14.4 9.6 9.6"/><path d="M18.6 18.6 13.8 13.8"/><path d="M10.2 10.2 5.4 5.4"/><path d="M15 15 10.2 10.2"/>
          <circle cx="4.5" cy="4.5" r="2.5"/><circle cx="19.5" cy="19.5" r="2.5"/>
        </svg>
      </div>

      <!-- Label -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <span class="text-white text-[16px] font-[600] tracking-wide ml-[20px]">Swipe To Start</span>
      </div>

      <!-- Chevron Arrows -->
      <div class="ml-auto pr-[16px] flex items-center gap-[-4px] opacity-60">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"/>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="-ml-[10px]">
          <path d="m9 18 6-6-6-6"/>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="-ml-[10px]">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </div>

      <!-- Animated Shine Effect -->
      <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out"></div>
    </div>

  <!-- Background Decorative Elements -->
  <div class="absolute top-[-100px] right-[-100px] w-[300px] h-[300px] bg-white/40 rounded-full blur-[80px] pointer-events-none"></div>
  <div class="absolute bottom-[20%] left-[-50px] w-[200px] h-[200px] bg-[#E86B41]/5 rounded-full blur-[60px] pointer-events-none"></div>

</div>

<script>
  // Simple interaction for the slider
  document.addEventListener('DOMContentLoaded', () => {
    const slider = document.querySelector('.group');
    const handle = slider.querySelector('.bg-white');
    let isDragging = false;
    let startX = 0;
    let currentX = 0;

    const onStart = (e) => {
      isDragging = true;
      startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
      handle.style.transition = 'none';
    };

    const onMove = (e) => {
      if (!isDragging) return;
      const x = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
      const walk = x - startX;
      const maxWalk = slider.offsetWidth - handle.offsetWidth - 12;
      
      currentX = Math.max(0, Math.min(walk, maxWalk));
      handle.style.transform = `translateX(${currentX}px)`;
      
      // Fade out text as we slide
      const opacity = 1 - (currentX / maxWalk);
      slider.querySelector('.pointer-events-none').style.opacity = opacity;
    };

    const onEnd = () => {
      if (!isDragging) return;
      isDragging = false;
      const maxWalk = slider.offsetWidth - handle.offsetWidth - 12;
      
      if (currentX > maxWalk * 0.8) {
        handle.style.transition = 'transform 0.2s ease-out';
        handle.style.transform = `translateX(${maxWalk}px)`;
        // Trigger start action
        setTimeout(() => {
          alert('Starting your journey!');
          reset();
        }, 300);
      } else {
        reset();
      }
    };

    const reset = () => {
      handle.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
      handle.style.transform = 'translateX(0px)';
      slider.querySelector('.pointer-events-none').style.opacity = 1;
      currentX = 0;
    };

    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);
  });
</script>
      
    </div>
    <script>
      if (window.lucide && typeof window.lucide.createIcons === 'function') window.lucide.createIcons();
      document.querySelectorAll('[data-nav-item-id]').forEach(function(item) {
        var active = item.getAttribute('data-nav-item-id') === "home";
        item.setAttribute('data-active', active ? 'true' : 'false');
        item.setAttribute('aria-current', active ? 'page' : 'false');
      });
    </script>
  </body>
